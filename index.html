流程机制上，而非审核人的专业能力。</p>\n<table>\n<thead>\n<tr>\n<th>痛点</th>\n<th>具体表现</th>\n<th>影响</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>串行阻塞</strong></td>\n<td>财务 → 法务 → 商务，邮件串行传递，任一环节卡住则全链路停滞</td>\n<td>审核周期最长 3 周</td>\n</tr>\n<tr>\n<td><strong>标准不一</strong></td>\n<td>审核结论依赖个人经验，A 律师说行、B 律师说不行</td>\n<td>人员变动导致审核标准波动</td>\n</tr>\n<tr>\n<td><strong>回溯困难</strong></td>\n<td>历史评审意见散落在数百封邮件中，翻一份去年的意见要花 20 分钟</td>\n<td>重复评审相同条款</td>\n</tr>\n<tr>\n<td><strong>版本混乱</strong></td>\n<td>\"终稿\"\"终稿2\"\"最终版\"\"最终版(1)\"，永远不知道哪个是最新版本</td>\n<td>信息错位，可能基于旧版本进行审核</td>\n</tr>\n<tr>\n<td><strong>重复答疑</strong></td>\n<td>业务部门频繁咨询\"这条格式有没有模板\"\"分成比例通常怎么写\"</td>\n<td>法务 30% 的时间花在重复性咨询上</td>\n</tr>\n</tbody>\n</table>\n<blockquote>\n<p><strong>[待补充配图]</strong>：此处需要一张展示传统合同审核串行流程的示意图，突出邮件传递、环节阻塞、版本混乱三个痛点。</p>\n</blockquote>\n<p>这些痛点的本质是：<strong>流程和信息没有结构化。</strong> 审核该严还得严，但信息流转、版本管理、标准沉淀这些事，AI 完全可以代劳。</p>\n<hr />\n<h2 id=\"282-ai\">28.2 解决方案：AI 预审 + 人工复核</h2>\n<p>Comate 的合同审核方案是四条线并行推进：</p>\n<h3 id=\"2821-ai\">28.2.1 并行预审：三类角色 AI 同步审</h3>\n<p>传统审核是串行的：财务过了才到法务，法务过了才到商务。任何一环卡住，后面的全部等着。</p>\n<p>Comate 改成了<strong>并行预审</strong>：</p>\n<ol>\n<li>合同上传后，AI 同时从<strong>财务、法务、商务</strong>三个视角进行预审</li>\n<li>基于 2495 条预置审核规则，自动生成带批注的审核意见</li>\n<li>三个角色的预审意见在同一时间呈现，不存在\"等谁审完\"的问题</li>\n<li>人工复核作为质量保障层，对 AI 意见进行确认、调整、补充</li>\n</ol>\n<blockquote>\n<p><strong>[待补充配图]</strong>：此处需要一张 Comate 合同审核界面截图，展示 AI 自动生成的批注和三个角色的审核结果并行展示。</p>\n</blockquote>\n<table>\n<thead>\n<tr>\n<th>对比维度</th>\n<th>传统方式</th>\n<th>Comate 方式</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>审核模式</td>\n<td>财务→法务→商务串行</td>\n<td>三类角色 AI 并行预审</td>\n</tr>\n<tr>\n<td>审核标准</td>\n<td>依赖个人经验</td>\n<td>2495 条规则统一标准</td>\n</tr>\n<tr>\n<td>批注生成</td>\n<td>人工逐条手写</td>\n<td>AI 自动生成，人工复核确认</td>\n</tr>\n<tr>\n<td>堵点风险</td>\n<td>任一环节卡全链停</td>\n<td>无串行依赖，互不阻塞</td>\n</tr>\n</tbody>\n</table>\n<h3 id=\"2822-1-3\">28.2.2 云端协作：合稿从 1 小时到 3 分钟</h3>\n<p>合同审核中的\"合稿\"是最让人崩溃的环节：三位审核人返回三份带修订的文件，你要把三份修订合并成一份——还要确保没有遗漏、没有冲突。</p>\n<p>Comate 的方案：</p>\n<ol>\n<li><strong>所有相关方基于同一份云文档协作</strong>，不再通过邮件附加多份副本传递</li>\n<li><strong>AI 自动完成稿件合并</strong>，将多人的修订意见智能合并到一份文档中</li>\n<li>合并结果自动标记冲突项，人工只需处理冲突，无需从头比对</li>\n</ol>\n<blockquote>\n<p><strong>[待补充配图]</strong>：此处需要一张展示云端协作合稿流程的截图，突出\"一份文档多人协作\"和\"AI 自动合并修订\"。</p>\n</blockquote>\n<h3 id=\"2823\">28.2.3 轻量级审批：自动匹配、自动加签</h3>\n<p>大部分合同的审批不需要单独跑 OA 流程，但在企业里\"不走流程就是不规范\"。</p>\n<p>Comate 提供的轻量审批能力：</p>\n<ul>\n<li><strong>自动匹配审批人</strong>：根据合同类型、金额、部门，系统自动匹配对应的审批人</li>\n<li><strong>自动加签</strong>：审批过程中涉及跨部门条款，自动加签相关部门负责人</li>\n<li><strong>升级审批</strong>：超时未处理时自动升级至上级审批人，防止流程卡死</li>\n</ul>\n<blockquote>\n<p><strong>[待补充配图]</strong>：此处需要一张展示审批流程自动匹配和加签的界面截图。</p>\n</blockquote>\n<h3 id=\"2824\">28.2.4 历史评审检索与复用</h3>\n<p>一份新合同来了，审核人常常在想：\"这个条款上次遇到类似情况，当时是怎么审的？\"</p>\n<p>传统方式是翻邮件、搜关键词，找到之后还得确认这是不是\"最终版意见\"。Comate 的做法：</p>\n<ul>\n<li><strong>26.5 万条历史评审数据全文检索</strong></li>\n<li>AI 智能匹配最相似的历史条款及对应评审意见</li>\n<li>检索结果直接关联原始合同和最终评审结论，无需二次验证</li>\n</ul>\n<blockquote>\n<p><strong>[待补充配图]</strong>：此处需要一张展示历史评审数据检索界面的截图，突出智能匹配和结果关联。</p>\n</blockquote>\n<hr />\n<h2 id=\"283\">28.3 标准沉淀：让规则成为组织资产</h2>\n<p>审核标准如果只在资深法务的脑子里，这不可持续。人走了，标准就没了。</p>\n<p>Comate 将审核标准做了三件事：</p>\n<table>\n<thead>\n<tr>\n<th>沉淀方式</th>\n<th>内容</th>\n<th>作用</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>审核规则库</strong></td>\n<td>2495 条结构化规则</td>\n<td>AI 预审的知识底座，新人也按同一标准审核</td>\n</tr>\n<tr>\n<td><strong>审核清单</strong></td>\n<td>29 套场景化审核清单</td>\n<td>不同合同类型用不同清单，确保不遗漏关键风险点</td>\n</tr>\n<tr>\n<td><strong>合同模板</strong></td>\n<td>25 套标准化模板</td>\n<td>业务部门直接选用，减少法务的重复性咨询</td>\n</tr>\n</tbody>\n</table>\n<p>这背后是\"<strong>人把经验写成规则，AI 用规则替代重复</strong>\"的逻辑。资深法务的价值从\"逐份审合同\"转变为\"维护和优化规则库\"——这是典型的知识杠杆效应。</p>\n<blockquote>\n<p><strong>[待补充配图]</strong>：此处需要一张展示审核规则库和合同模板管理界面的截图。</p>\n</blockquote>\n<hr />\n<h2 id=\"284\">28.4 效果对比：从\"等三周\"到\"当天回复\"</h2>\n<table>\n<thead>\n<tr>\n<th>指标</th>\n<th>传统方式</th>\n<th>Comate 方式</th>\n<th>提升</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>审核周期</td>\n<td>1-3 周</td>\n<td>1-2 天</td>\n<td><strong>缩短 90%</strong></td>\n</tr>\n<tr>\n<td>单份合同审核耗时</td>\n<td>1.5 小时</td>\n<td>3 分钟</td>\n<td><strong>压缩 97%</strong></td>\n</tr>\n<tr>\n<td>多方合稿耗时</td>\n<td>1 小时</td>\n<td>3 分钟</td>\n<td><strong>压缩 95%</strong></td>\n</tr>\n<tr>\n<td>复审对比耗时</td>\n<td>20 分钟</td>\n<td>3 分钟</td>\n<td><strong>压缩 85%</strong></td>\n</tr>\n<tr>\n<td>审核标准一致性</td>\n<td>依赖个人经验</td>\n<td>2495 条规则统一</td>\n<td><strong>100% 标准化</strong></td>\n</tr>\n<tr>\n<td>历史意见查找</td>\n<td>翻邮件手动检索</td>\n<td>AI 智能匹配秒级返回</td>\n<td><strong>效率提升数十倍</strong></td>\n</tr>\n<tr>\n<td>业务重复咨询</td>\n<td>法务日均多次应对</td>\n<td>29 套清单 + 25 套模板自助使用</td>\n<td><strong>减少 60% 重复劳动</strong></td>\n</tr>\n</tbody>\n</table>\n<blockquote>\n<p><strong>[待补充配图]</strong>：此处需要一张对比图，展示传统审核与 Comate 审核在时间效率和流程标准化上的差异。</p>\n</blockquote>\n<hr />\n<h2 id=\"285\">28.5 常见问题</h2>\n<p><strong>Q：AI 预审的准确性够不够？会不会漏掉关键风险？</strong></p>\n<p>A：AI 预审的定位是\"第一轮筛查\"，不是\"最终决策\"。它负责把 2495 条规则覆盖的常见风险点自动标注出来，让人工复核聚焦在 AI 可能判断不准的灰色地带。经验表明，规则覆盖的显性风险点，AI 的识别准确率远高于人工——因为 AI 不会疲劳、不会因为看多了就跳过去。</p>\n<p><strong>Q：规则库需要多久更新一次？谁负责维护？</strong></p>\n<p>A：法务负责人作为规则库维护者，建议每月做一次规则审查和更新。每次审核中人工发现的新风险点，就是下一次规则更新的素材。维护规则库本身就是一种\"知识资产积累\"的过程。</p>\n<p><strong>Q：和现有的 OA 审批系统是什么关系？</strong></p>\n<p>A：不是替代关系，是增强关系。Comate 的轻量审批适用于日常合同的快速流程，重大合同仍走 OA 完整审批流程。两者的数据可以打通，确保审批记录统一管理。</p>\n<hr />\n<h2 id=\"_1\">本章小结</h2>\n<p>合同审核这件事，Comate 的思路不是让 AI 替代法务，而是让 AI 替代法务<strong>不该手动做</strong>的那部分工作：</p>\n<ul>\n<li><strong>重复性的规则检查</strong>——AI 预审，2495 条规则自动跑</li>\n<li><strong>低价值的合稿比对</strong>——AI 自动合并，3 分钟搞定</li>\n<li><strong>机械性的流程流转</strong>——AI 自动匹配审批人、自动加签</li>\n</ul>\n<p>人留在什么位置？留在<strong>规则覆盖不到的灰色地带</strong>、需要<strong>商业判断的风险权衡</strong>、需要<strong>经验积累的条款协商</strong>——这些才是法务不可替代的核心价值。</p>\n<p>从\"人审 AI 看\"到\"AI 审人把关\"，不是替换，是升级。</p>\n<hr />\n<blockquote>\n<p><strong>待补充配图汇总</strong></p>\n<p>本章 assets 目录当前为空，以下位置需要补充截图/示意图：</p>\n<ol>\n<li><strong>28.1 痛点</strong>：传统合同审核串行流程示意图，突出邮件传递、环节阻塞、版本混乱</li>\n<li><strong>28.2.1 并行预审</strong>：Comate 合同审核界面截图，展示 AI 自动批注和三类角色审核结果并行展示</li>\n<li><strong>28.2.2 云端协作</strong>：云端协作合稿流程截图，突出\"一份文档多人协作\"和\"AI 自动合并修订\"</li>\n<li><strong>28.2.3 轻量审批</strong>：审批流程自动匹配和加签的界面截图</li>\n<li><strong>28.2.4 历史检索</strong>：历史评审数据检索界面截图，突出智能匹配和结果关联</li>\n<li><strong>28.3 标准沉淀</strong>：审核规则库和合同模板管理界面截图</li>\n<li><strong>28.4 效果对比</strong>：传统审核与 Comate 审核在时间效率和流程标准化的对比图</li>\n</ol>\n</blockquote>", "part": "第三篇 进阶篇：把场景变成自己的工作系统", "chapter_num": 28, "prev": "第_29_章_售后跟进看板", "next": "第_30_章_岗位路线图"}, "第_30_章_岗位路线图": {"title": "第 30 章 岗位路线图", "html": "<p>岗位应用不应从\"这个岗位有哪些提示词\"开始，而应从三个问题开始：哪些工作重复发生，哪些产物有稳定标准，哪些决定必须由人承担责任。</p>\n<p>Comate 的专家数字员工、技能市场和团队空间，为岗位落地提供了三层支撑：专家承接岗位级 SOP，技能沉淀可复用的工作方法，团队空间让一个人的好做法成为整个团队的标准动作。但工具能力不等于岗位能力——真正决定落地深度的，是每个岗位能否把\"个人经验\"转化为\"组织资产\"。</p>\n<blockquote>\n<p><strong>[待补充配图]</strong>：岗位应用成熟度模型示意图，展示 L1 到 L4 的递进关系与典型形态。</p>\n</blockquote>\n<h2 id=\"_1\">岗位应用的四级成熟度</h2>\n<table>\n<thead>\n<tr>\n<th>等级</th>\n<th>工作方式</th>\n<th>典型形态</th>\n<th>进入下一级的条件</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>L1 单次辅助</td>\n<td>人给完整材料，AI 生成草稿</td>\n<td>纪要、摘要、表格、PPT</td>\n<td>输出可验收，连续成功 3 次</td>\n</tr>\n<tr>\n<td>L2 固定模板</td>\n<td>使用技能和标准输出</td>\n<td>周报、复盘、客户简报</td>\n<td>输入字段和验收规则稳定</td>\n</tr>\n<tr>\n<td>L3 工作流</td>\n<td>技能 + 知识库 + 连接器协作</td>\n<td>内容流、知识流、报表流</td>\n<td>有负责人、日志和异常处理</td>\n</tr>\n<tr>\n<td>L4 团队能力</td>\n<td>专家数字员工 + 团队空间 + 自动化</td>\n<td>部门级数字员工</td>\n<td>权限、成本和资产治理到位</td>\n</tr>\n</tbody>\n</table>\n<p>每个岗位都应从 L1 的低风险任务开始。不是所有任务都需要进入 L4；低频、差异大或责任重的工作，保持\"AI 辅助 + 人工决策\"更合理。</p>\n<p>Comate 的能力对应关系如下：</p>\n<table>\n<thead>\n<tr>\n<th>成熟度</th>\n<th>Comate 能力</th>\n<th>说明</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>L1</td>\n<td>任务执行（自然语言对话）</td>\n<td>直接在对话框输入需求，上传文件即可</td>\n</tr>\n<tr>\n<td>L2</td>\n<td>技能（/ 唤起技能选择器）</td>\n<td>把高频任务封装为技能，输入字段固定</td>\n</tr>\n<tr>\n<td>L3</td>\n<td>专家数字员工 + 连接器 + Wiki</td>\n<td>专家连接业务系统，Wiki 提供知识底座</td>\n</tr>\n<tr>\n<td>L4</td>\n<td>团队空间 + 自动化引擎 + 数据治理</td>\n<td>团队共享技能和资产，自动化 7×24 运转</td>\n</tr>\n</tbody>\n</table>\n<h2 id=\"_2\">产品经理</h2>\n<p>产品经理的核心工作是决策：做什么、不做什么、先做什么。Comate 能缩短信息处理时间，但产品判断仍属于人。</p>\n<table>\n<thead>\n<tr>\n<th>场景</th>\n<th>输入</th>\n<th>交付物</th>\n<th>推荐能力</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>用户反馈聚类</td>\n<td>工单导出、评论、埋点摘要</td>\n<td>问题分类、影响范围、证据表</td>\n<td>任务执行 + Excel 分析</td>\n</tr>\n<tr>\n<td>竞品证据库</td>\n<td>官网截图、定价页、更新日志</td>\n<td>可追溯对比表和定期简报</td>\n<td>Wiki + 自动化定时更新</td>\n</tr>\n<tr>\n<td>PRD 辅助</td>\n<td>需求描述、会议纪要、用户反馈</td>\n<td>PRD 草稿（含背景、目标、功能列表）</td>\n<td>技能（PRD 模板）+ @会议纪要</td>\n</tr>\n<tr>\n<td>版本复盘</td>\n<td>版本数据、用户反馈、bug 列表</td>\n<td>复盘报告（含结论和待办）</td>\n<td>技能 + Wiki 历史版本</td>\n</tr>\n</tbody>\n</table>\n<p><strong>从 L1 到 L3 的路径</strong>：先用对话生成竞品对比表（L1），再把对比表结构化为技能（L2），最后由竞品分析专家自动抓取官网更新并写入 Wiki（L3）。</p>\n<pre class=\"codehilite\"><code class=\"language-text\">// PRD 辅助指令示例\n@产品需求会议纪要 @用户反馈汇总表\n请基于上述材料生成 PRD 草稿。\n包含：需求背景、目标用户、核心功能列表（按优先级排序）、验收标准、风险点。\n保留原文中的关键数据，不要虚构指标。\n</code></pre>\n\n<p><strong>真实调研中的典型用法</strong>：写 PRD 初稿和产品方案文档、分析竞品文档提炼差异点、整理用户反馈自动分类汇总、生成需求管理看板自动识别版本风险、几秒总结长文档或 PDF 核心要点。有产品团队用 Comate 直接生成可交互的 HTML 产品原型，快速出 demo 验证想法。</p>\n<blockquote>\n<p>真实案例：<a href=\"https://365.kdocs.cn/l/ccSvVEcgfWgR?source=wiki\">产品原型设计：让 AI 生成可交互的产品原型，快速出 demo</a></p>\n</blockquote>\n<h2 id=\"_3\">项目经理</h2>\n<p>项目经理的核心痛点是多项目并行时的信息汇聚和风险预警。Comate 能把散落在会议、群聊和任务系统中的进展自动汇总，让项目经理把时间花在风险研判而非信息收集上。</p>\n<table>\n<thead>\n<tr>\n<th>场景</th>\n<th>输入</th>\n<th>交付物</th>\n<th>推荐能力</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>会后纪要</td>\n<td>会议录音/记录</td>\n<td>提炼纪要（含待办和负责人）</td>\n<td>@会议纪要 + 技能</td>\n</tr>\n<tr>\n<td>会前预告</td>\n<td>项目文档、议程链接</td>\n<td>预告通知（一键发送）</td>\n<td>任务执行 + 自动化</td>\n</tr>\n<tr>\n<td>项目进展汇总</td>\n<td>多个项目群聊/任务/文档</td>\n<td>每日进展和风险清单</td>\n<td>自动化 + 连接器</td>\n</tr>\n<tr>\n<td>重点项目推送</td>\n<td>关键项目数据</td>\n<td>每日推送、次要项目每周推送</td>\n<td>自动化 + @任务</td>\n</tr>\n</tbody>\n</table>\n<p><strong>从 L1 到 L3 的路径</strong>：先在会后用对话生成纪要（L1），再把纪要格式封装为技能（L2），最后由项目管理专家自动监控关键群聊并定期输出摘要（L3）。</p>\n<p><strong>真实调研中的典型用法</strong>：会后自动提炼纪要确认一下就能转发到群、会前从文档提取议程和链接生成预告一键通知、每天自动汇总十几个项目的进展和风险、重点项目每天推送次要项目每周推送、监控关键群聊定期输出关键摘要。</p>\n<blockquote>\n<p>真实案例：<a href=\"https://365.kdocs.cn/l/cqkB7ZoefR2I\">怎样让 AI 把方案完成度从 60% 提到 90%？</a></p>\n</blockquote>\n<h2 id=\"_4\">运营与市场</h2>\n<p>运营与市场岗位的特点是高频产出、多平台适配、效果可量化。Comate 最适合在内容生产和效果复盘两个环节切入。</p>\n<table>\n<thead>\n<tr>\n<th>场景</th>\n<th>输入</th>\n<th>交付物</th>\n<th>推荐能力</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>内容改写与素材盘点</td>\n<td>已审长文、图片目录</td>\n<td>平台草稿、素材清单</td>\n<td>任务执行</td>\n</tr>\n<tr>\n<td>选题评分</td>\n<td>资讯源、评论、历史内容数据</td>\n<td>候选池、评分表、内容日历</td>\n<td>技能 + Wiki</td>\n</tr>\n<tr>\n<td>多平台适配</td>\n<td>已审事实包、品牌规范</td>\n<td>公众号草稿、小红书长图、口播稿</td>\n<td>技能（格式模板）</td>\n</tr>\n<tr>\n<td>活动复盘</td>\n<td>活动数据、用户反馈、投放报表</td>\n<td>复盘报告（含 ROI 和改进项）</td>\n<td>Excel 分析 + 任务执行</td>\n</tr>\n</tbody>\n</table>\n<p><strong>风险点</strong>：内容改写最容易出现的问题是\"事实漂移\"——AI 在改写过程中悄悄改变了原始数据的含义。每次改写后，检查数字、名称和结论是否与原文一致。</p>\n<p><strong>真实调研中的典型用法</strong>：定时收集行业新闻和产品更新每天推送、活动数据导出后几分钟整理成表、搭建 H5 活动页面和轻应用、把想法和素材丢进去快速生成文章初稿。有运营团队用 Comate 搭建了活动落地页。</p>\n<blockquote>\n<p>真实案例：<a href=\"https://o.wpsgo.com/app/41000207/Je0lTH5HpdWn/\">企业事业部 AI 应用大赛成果落地页</a></p>\n</blockquote>\n<h2 id=\"_5\">销售与售前</h2>\n<p>第 27 章的售前客户拜访场景，展示了从\"人工跨系统检索\"到\"AI 整合输出方案\"的完整路径。岗位落地的关键是把销冠经验变成可复用的技能。</p>\n<table>\n<thead>\n<tr>\n<th>场景</th>\n<th>交付物</th>\n<th>风险点</th>\n<th>推荐能力</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>客户调研</td>\n<td>画像、公开动态、机会假设</td>\n<td>使用过时或同名公司资料</td>\n<td>专家（连接 CRM + 天眼查）</td>\n</tr>\n<tr>\n<td>方案生成</td>\n<td>方案大纲、演示脚本、FAQ</td>\n<td>虚构能力、价格和案例</td>\n<td>技能（方案模板）+ Wiki（案例库）</td>\n</tr>\n<tr>\n<td>会后纪要</td>\n<td>需求、异议、待办、负责人</td>\n<td>把推测写成客户承诺</td>\n<td>@会议纪要 + 技能</td>\n</tr>\n<tr>\n<td>跟进工作流</td>\n<td>CRM 草稿、提醒、材料更新</td>\n<td>未确认写入和外发</td>\n<td>连接器 + 自动化</td>\n</tr>\n</tbody>\n</table>\n<p><strong>从 L1 到 L4 的路径</strong>：</p>\n<pre class=\"codehilite\"><code class=\"language-mermaid\">flowchart LR\n    A[&quot;L1: 对话生成&lt;br/&gt;会后纪要&quot;] --&gt; B[&quot;L2: 纪要技能&lt;br/&gt;固定格式输出&quot;]\n    B --&gt; C[&quot;L3: 售前专家&lt;br/&gt;连接CRM+知识库&quot;]\n    C --&gt; D[&quot;L4: 销售团队空间&lt;br/&gt;共享技能+自动化推送&quot;]\n</code></pre>\n\n<p><strong>必须控制</strong>：方案中的价格、交付周期和案例引用必须由销售确认后再外发。AI 生成的方案草稿不等于客户承诺。</p>\n<p><strong>真实调研中的典型用法</strong>：自动生成客户 360° 画像（组织架构、历史采购、竞品生态）、自动识别客户盲区（未触达的决策人、没卖进的产品线）并推送任务、拜访客户前自动推送客户画像和话术建议、把行业话术做成轻应用一键复制发客户、整理投标材料和控标参数。</p>\n<blockquote>\n<p>真实案例：<a href=\"https://365.kdocs.cn/l/cjR97An2kVBB\">用 AI 打造团队的\"作战地图\"</a>、<a href=\"https://365.kdocs.cn/l/chg9G8P0Iu8R?source=wiki\">用 AI 搭建团队的\"数据驾驶舱\"</a></p>\n</blockquote>\n<h2 id=\"_6\">客服与技术支持</h2>\n<p>客服岗位的特点是工单量大、响应时效要求高、历史记录分散。Comate 能在风险预警和自动催办两个环节显著降低漏单率。</p>\n<table>\n<thead>\n<tr>\n<th>场景</th>\n<th>输入</th>\n<th>交付物</th>\n<th>推荐能力</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>高风险工单预警</td>\n<td>工单数据、风险规则</td>\n<td>预警通知（@相关人）</td>\n<td>自动化 + 专家</td>\n</tr>\n<tr>\n<td>待响应催办</td>\n<td>工单状态</td>\n<td>每天三次提醒待响应/处理中工单</td>\n<td>自动化 + 连接器</td>\n</tr>\n<tr>\n<td>来访记录筛选</td>\n<td>5000+ 条来访记录</td>\n<td>需回访清单（含判断依据）</td>\n<td>任务执行 + Excel 分析</td>\n</tr>\n<tr>\n<td>来电历史抓取</td>\n<td>Chrome 插件 + 历史工单</td>\n<td>来电时自动弹出历史处理记录</td>\n<td>连接器 + 本机引擎</td>\n</tr>\n</tbody>\n</table>\n<p><strong>从 L1 到 L3 的路径</strong>：先手动导出工单让 AI 筛选（L1），再把筛选规则封装为技能（L2），最后由客服专家连接工单系统实现自动预警和催办（L3）。</p>\n<p><strong>真实调研中的典型用法</strong>：高风险工单自动预警并 @ 相关人、每天三次自动提醒待响应和处理中的工单、自动筛选 5000+ 条来访记录判断哪些要回访、来电时用 Chrome 插件自动抓取历史处理记录、总结群聊最新进展生成简练状态摘要。</p>\n<blockquote>\n<p>真实案例：<a href=\"https://365.kdocs.cn/l/cnUDolLGz0D0\">每天 500+ 工单，他用 AI 搭了一套\"风险预警+自动催办\"系统</a></p>\n</blockquote>\n<h2 id=\"hr\">HR 与行政</h2>\n<p>HR 岗位的特殊性在于处理员工数据，隐私合规是第一红线。Comate 的数据分级体系（L0 公开 → L3 机密）和行列权限控制，为 HR 场景提供了安全保障。</p>\n<table>\n<thead>\n<tr>\n<th>场景</th>\n<th>推荐做法</th>\n<th>必须控制</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>制度问答</td>\n<td>基于批准文件生成 FAQ，发布到 Wiki</td>\n<td>版本日期和适用范围</td>\n</tr>\n<tr>\n<td>入职指引</td>\n<td>生成学习路径、课件和清单</td>\n<td>员工数据最小化，不泄露他人信息</td>\n</tr>\n<tr>\n<td>培训材料</td>\n<td>从制度文档生成课件、题库</td>\n<td>内容与最新制度版本一致</td>\n</tr>\n<tr>\n<td>考勤整理</td>\n<td>专家连接考勤系统，生成统计和异常预警</td>\n<td>不自动做雇佣决策</td>\n</tr>\n</tbody>\n</table>\n<p><strong>典型场景</strong>：HR 部署考勤专家后，部门负责人可在协作群 @该专家查询\"本月研发团队加班趋势及异常预警\"，专家自动调取考勤数据生成可视化报告。这是 L3 到 L4 的典型形态。</p>\n<h2 id=\"_7\">财务与法务</h2>\n<p>财务与法务岗位的核心是准确性和合规性。Comate 的 DataHub 语义层能统一指标口径，连接器能接入 ERP/OA 系统，但最终签字权在人。</p>\n<table>\n<thead>\n<tr>\n<th>财务场景</th>\n<th>法务场景</th>\n<th>人工关口</th>\n<th>推荐能力</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>发票识别、账单整理</td>\n<td>条款提取、版本对照</td>\n<td>金额与原文复核</td>\n<td>任务执行 + Excel</td>\n</tr>\n<tr>\n<td>预算差异、异常清单</td>\n<td>标准条款偏离清单</td>\n<td>口径和风险判断</td>\n<td>数据治理 + 专家</td>\n</tr>\n<tr>\n<td>月结材料流水线</td>\n<td>合同知识库、审阅工作台</td>\n<td>专业人员签字</td>\n<td>自动化 + Wiki</td>\n</tr>\n<tr>\n<td>经营分析、指标下钻</td>\n<td>合同流程提醒</td>\n<td>付款、申报、签署确认</td>\n<td>专家 + 连接器</td>\n</tr>\n</tbody>\n</table>\n<p><strong>第 28 章案例</strong>：合同审核场景中，AI 基于 2,495 条审核规则完成并行预审，单份合同审核从 1.5 小时压缩至 3 分钟（AI 预审 + 人工复核）。这是 L3 工作流的典型形态——规则沉淀为技能，审核流程由专家驱动，人工只做复核和兜底。</p>\n<p><strong>真实调研中的典型用法（法务方向）</strong>：审合同要点提取关键条款和风险项、整理法规变更对比新旧版本差异、把散落的文档/群聊/多维表数据串联分析。</p>\n<h2 id=\"it\">研发与 IT</h2>\n<table>\n<thead>\n<tr>\n<th>场景</th>\n<th>交付物</th>\n<th>检查点</th>\n<th>推荐能力</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>代码理解、技术文档</td>\n<td>架构图、README、模块清单</td>\n<td>与实际代码一致</td>\n<td>任务执行 + @云文档</td>\n</tr>\n<tr>\n<td>测试与缺陷分析</td>\n<td>测试矩阵、复现步骤、修复建议</td>\n<td>测试通过、代码评审</td>\n<td>技能 + 任务执行</td>\n</tr>\n<tr>\n<td>CI 诊断</td>\n<td>构建日志分析、修复建议</td>\n<td>合并和部署确认</td>\n<td>任务执行 + 连接器</td>\n</tr>\n<tr>\n<td>IT 知识库</td>\n<td>巡检报告、告警摘要、运维手册</td>\n<td>生产权限和事故响应</td>\n<td>Wiki + 自动化</td>\n</tr>\n</tbody>\n</table>\n<p><strong>适合本机引擎</strong>：代码文件操作、本地脚本执行、隐私敏感的配置文件处理，使用本机引擎确保数据不出端。</p>\n<p><strong>真实调研中的典型用法</strong>：每小时自动总结未读消息一眼看到被 @ 的重要信息、每晚自动生成当日日报写周报时再根据日报总结、生成 HTML 界面原型和看板再交给 Cursor 精修代码、分析本地日志文件快速排查线上问题、自动收集团队周报并 @ 提醒未提交成员。有研发同学用定时任务做了一个专属\"数字秘书\"。</p>\n<blockquote>\n<p>真实案例：<a href=\"https://365.kdocs.cn/l/crD4KR0va3QJ\">他用定时任务做了一个专属\"数字秘书\"</a></p>\n</blockquote>\n<h2 id=\"_8\">解决方案与知识库</h2>\n<p>解决方案和知识库岗位的核心工作是维护文档资产的健康度和时效性。Comate 能自动化链接检查、变更监控和内容辅助撰写。</p>\n<table>\n<thead>\n<tr>\n<th>场景</th>\n<th>输入</th>\n<th>交付物</th>\n<th>推荐能力</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>链接健康检查</td>\n<td>知识库 URL 列表</td>\n<td>失效链接报告</td>\n<td>自动化 + 任务执行</td>\n</tr>\n<tr>\n<td>知识库变更监控</td>\n<td>知识库更新日志</td>\n<td>变更报告通知全员</td>\n<td>自动化 + Wiki</td>\n</tr>\n<tr>\n<td>内容辅助撰写</td>\n<td>素材、主题、品牌规范</td>\n<td>公众号文章/方案 PPT 草稿</td>\n<td>技能 + 任务执行</td>\n</tr>\n<tr>\n<td>散落数据串联</td>\n<td>文档、群聊、表格</td>\n<td>串联分析报告</td>\n<td>任务执行 + 数据治理</td>\n</tr>\n</tbody>\n</table>\n<p><strong>从 L1 到 L3 的路径</strong>：先手动让 AI 检查链接（L1），再封装为定时检查技能（L2），最后由知识库专家自动监控并推送健康度报告（L3）。</p>\n<p><strong>真实调研中的典型用法</strong>：定时检查知识库链接是否失效推送健康度报告、监控知识库更新自动生成变更报告通知全员、辅助撰写公众号文章和方案 PPT、把散落的文档/群聊/表格数据串起来分析。</p>\n<h2 id=\"_9\">管理层</h2>\n<p>管理层场景的核心不是\"生成报告\"，而是\"缩短从提问到决策的距离\"。Comate 的高管问数专家展示了这一路径：管理层用自然语言提问，专家基于 DataHub 语义层直接返回数据。</p>\n<table>\n<thead>\n<tr>\n<th>场景</th>\n<th>输入</th>\n<th>交付物</th>\n<th>推荐能力</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>经营分析</td>\n<td>自然语言提问（如\"各事业部 Q2 预算执行率\"）</td>\n<td>秒级出数 + 可下钻分析</td>\n<td>高管问数专家 + 数据治理</td>\n</tr>\n<tr>\n<td>异常预警</td>\n<td>业务数据、阈值规则</td>\n<td>风险清单、催办建议</td>\n<td>自动化 + 专家</td>\n</tr>\n<tr>\n<td>战略提案</td>\n<td>行业数据、竞品动态、内部经营数据</td>\n<td>机会地图、决策材料</td>\n<td>Wiki + 任务执行</td>\n</tr>\n<tr>\n<td>周报生成</td>\n<td>本周任务、会议、数据</td>\n<td>一键成稿的工作简报</td>\n<td>自动化 + @会议/@任务</td>\n</tr>\n</tbody>\n</table>\n<p><strong>关键价值</strong>：管理层的查询耗时从数小时缩短至秒级，复杂分析 10-15 分钟内完成。决策会议无需提前筹备数据，可直接聚焦策略讨论。</p>\n<h2 id=\"_10\">所有人通用</h2>\n<p>无论什么岗位，以下场景大概率都用得上：</p>\n<table>\n<thead>\n<tr>\n<th>场景</th>\n<th>怎么做</th>\n<th>推荐能力</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>会议纪要</td>\n<td>会后自动提炼重点，确认后转发</td>\n<td>@会议纪要 + 任务执行</td>\n</tr>\n<tr>\n<td>日报周报</td>\n<td>每天汇总聊天和会议生成日报，周报基于日报汇总</td>\n<td>自动化 + @任务 + @会议</td>\n</tr>\n<tr>\n<td>总结长文档</td>\n<td>直接丢进去，几秒出核心要点</td>\n<td>任务执行</td>\n</tr>\n<tr>\n<td>头脑风暴</td>\n<td>让多个模型分别给建议，挑最好的</td>\n<td>任务执行</td>\n</tr>\n<tr>\n<td>快速做页面</td>\n<td>描述需求，直接生成 HTML 页面或轻应用</td>\n<td>应用开发</td>\n</tr>\n<tr>\n<td>定时执行重复工作</td>\n<td>一次梳理，批量创建定时任务</td>\n<td>自动化引擎</td>\n</tr>\n</tbody>\n</table>\n<p><strong>关键提示</strong>：日报周报场景中，先每天生成日报、周报基于日报汇总，幻觉会少很多。直接写周报时 AI 容易把\"计划\"写成\"完成\"。</p>\n<blockquote>\n<p>真实案例：<a href=\"https://365.kdocs.cn/l/cdQUQKJRiFUG?source=wiki\">日报周报：让 AI 去会议、文档、消息里记录 &amp; 总结你的工作</a>、<a href=\"https://365.kdocs.cn/l/cg39sJK93MUF?source=wiki\">智能会议助手：让 AI 帮你约时间、做记录、追待办</a>、<a href=\"https://365.kdocs.cn/l/cbs8A95CZdTk?source=wiki\">团队周报监督：AI 自动统计谁没交，到点群里 @ 提醒</a>、<a href=\"https://365.kdocs.cn/l/chyENVP44iWi?source=wiki\">群消息总结：让 AI 出日报、整 FAQ、抓反馈，不用再爬楼</a></p>\n</blockquote>\n<h2 id=\"0-1\">部门推广模板：如何从 0 到 1 落地</h2>\n<p>每个岗位先选一个场景，填写下面这张推广卡：</p>\n<table>\n<thead>\n<tr>\n<th>项目</th>\n<th>填写内容</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>原流程</td>\n<td>谁在什么时间，用哪些系统，花多久</td>\n</tr>\n<tr>\n<td>输入</td>\n<td>文件、字段、权限、质量问题</td>\n</tr>\n<tr>\n<td>输出</td>\n<td>文件、系统记录、通知对象</td>\n</tr>\n<tr>\n<td>验收</td>\n<td>准确性、完整性、时效和风险</td>\n</tr>\n<tr>\n<td>人工关口</td>\n<td>谁确认，什么情况下必须暂停</td>\n</tr>\n<tr>\n<td>指标</td>\n<td>基线、目标值、观察周期</td>\n</tr>\n<tr>\n<td>负责人</td>\n<td>业务负责人、技术对接人、资产维护人</td>\n</tr>\n</tbody>\n</table>\n<h3 id=\"_11\">推广的三个阶段</h3>\n<pre class=\"codehilite\"><code class=\"language-mermaid\">flowchart LR\n    A[&quot;阶段一：试点&lt;br/&gt;1个场景 · 1个人&lt;br/&gt;L1 单次辅助&quot;] --&gt; B[&quot;阶段二：标准化&lt;br/&gt;1个岗位 · 1个技能&lt;br/&gt;L2 固定模板&quot;]\n    B --&gt; C[&quot;阶段三：部门级&lt;br/&gt;1个部门 · 1个专家&lt;br/&gt;L3-L4 工作流&quot;]\n</code></pre>\n\n<p><strong>阶段一（试点）</strong>：选一个低风险、高频次、易验收的场景。比如运营岗位的\"会议纪要整理\"。一个人用，连续成功 3 次后进入下一阶段。</p>\n<p><strong>阶段二（标准化）</strong>：把试点场景封装为技能，固定输入字段和输出格式。同岗位的其他人可以直接用 <code>/</code> 唤起技能，不需要重新写指令。</p>\n<p><strong>阶段三（部门级）</strong>：把技能升级为专家数字员工，连接业务系统，在团队空间中共享。新成员加入即可继承团队能力资产。</p>\n<h3 id=\"_12\">推广的常见误区</h3>\n<table>\n<thead>\n<tr>\n<th>误区</th>\n<th>现象</th>\n<th>正确做法</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>贪大求全</td>\n<td>一上来就想覆盖整个部门所有场景</td>\n<td>先选一个场景做透</td>\n</tr>\n<tr>\n<td>只用不沉淀</td>\n<td>每次都从头写指令，不封装技能</td>\n<td>连续做 3 次的任务就封装为技能</td>\n</tr>\n<tr>\n<td>跳过验收</td>\n<td>AI 产出直接外发，不检查事实和数字</td>\n<td>每次设人工关口</td>\n</tr>\n<tr>\n<td>忽视权限</td>\n<td>专家能访问的数据超出岗位需要</td>\n<td>按最小权限原则配置</td>\n</tr>\n</tbody>\n</table>\n<p>岗位落地的终点不是\"每个人都会问 AI\"，而是形成一批能被新人复用、由负责人维护、出了问题能追溯的标准工作流。Comate 的专家数字员工、技能市场和团队空间，提供了从个人效率到组织能力的完整工具链——但工具只是条件，落地靠的是每个岗位的负责人把经验沉淀下来。</p>", "part": "第四篇 岗位与行业落地", "chapter_num": 30, "prev": "第_28_章_企业合同审核", "next": "第_31_章_行业路线图"}, "第_31_章_行业路线图": {"title": "第 31 章 行业路线图", "html": "<p>行业方案不是把\"生成周报、做 PPT\"换一个行业名称。真正的行业化至少包含四层：行业对象、专业流程、系统与数据、责任和监管边界。</p>\n<p>Comate 的四大中枢为行业化提供了底层支撑：DataHub 治理行业数据并构建语义层，APIHub 接入行业系统，AIHub 管理模型调度，TrustHub 保障合规边界。但行业化能否落地，取决于能否回答\"这个行业的哪些工作最值得用 AI 承接\"。</p>\n<blockquote>\n<p><strong>[待补充配图]</strong>：行业化四层结构示意图，从下到上依次为系统与数据、专业流程、行业对象、责任和监管边界。</p>\n</blockquote>\n<h2 id=\"_1\">行业化的四层</h2>\n<table>\n<thead>\n<tr>\n<th>层级</th>\n<th>含义</th>\n<th>Comate 对应能力</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>行业对象</td>\n<td>订单、设备、病例、合同、课程还是内容素材</td>\n<td>DataHub 语义建模（定义业务实体）</td>\n</tr>\n<tr>\n<td>专业流程</td>\n<td>行业特有的 SOP、审批链、合规要求</td>\n<td>专家数字员工 + 技能（固化流程）</td>\n</tr>\n<tr>\n<td>系统与数据</td>\n<td>ERP、CRM、HIS、LIMS 等行业系统及其数据</td>\n<td>连接器 + 数据治理</td>\n</tr>\n<tr>\n<td>责任和监管边界</td>\n<td>谁拥有最终责任，哪些环节不可自动完成</td>\n<td>TrustHub 权限管控 + 人工关口</td>\n</tr>\n</tbody>\n</table>\n<p>四层缺一不可。只有行业对象而没有专业流程，AI 只能做表单填充；有流程但没有系统接入，AI 只能做文案生成；有系统但没有责任边界，AI 产出无法用于实际业务。</p>\n<h2 id=\"_2\">识别行业场景的五个问题</h2>\n<ol>\n<li><strong>工作对象是什么</strong>：订单、设备、病例、合同、课程还是内容素材？</li>\n<li><strong>流程由哪些岗位和系统共同完成</strong>：涉及哪些角色，数据从哪个系统来，结果写回哪个系统？</li>\n<li><strong>哪些字段、口径或版本必须保持一致</strong>：\"毛利率\"在不同部门是否同义？合同版本如何管理？</li>\n<li><strong>错误会造成什么后果，谁拥有最终责任</strong>：财务数据错误影响决策，合同条款错误导致法律风险。</li>\n<li><strong>哪一步最重复、最耗时，又最容易人工验收</strong>：这是 AI 试点的人口。</li>\n</ol>\n<p>只有第五类步骤适合作为首批 AI 试点。前四类问题定义了行业的边界和约束，第五类问题找到了切入点。</p>\n<h2 id=\"_3\">制造业</h2>\n<p>制造业的核心是\"数据来自多系统、口径必须一致、安全操作不可自动完成\"。</p>\n<pre class=\"codehilite\"><code class=\"language-mermaid\">flowchart LR\n    A[&quot;设备/生产/质检记录&quot;] --&gt; B[&quot;连接器归集&lt;br/&gt;+ 字段校验&quot;]\n    B --&gt; C[&quot;异常与趋势分析&lt;br/&gt;（专家数字员工）&quot;]\n    C --&gt; D[&quot;日报/周报/质量报告&quot;]\n    D --&gt; E[&quot;人工确认与闭环&quot;]\n</code></pre>\n\n<table>\n<thead>\n<tr>\n<th>场景</th>\n<th>输入</th>\n<th>交付物</th>\n<th>专业约束</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>生产报表</td>\n<td>ERP 导出、班组表、停机记录</td>\n<td>产量、良率、停机原因</td>\n<td>班次、物料、工序口径一致</td>\n</tr>\n<tr>\n<td>质量记录</td>\n<td>检验表、图片、标准规范</td>\n<td>缺陷分类、异常批次、报告草稿</td>\n<td>不代替质量放行</td>\n</tr>\n<tr>\n<td>设备知识</td>\n<td>手册、维修记录、故障代码</td>\n<td>排障建议、备件清单</td>\n<td>安全操作和停机权限</td>\n</tr>\n<tr>\n<td>供应链周报</td>\n<td>订单、库存、交期</td>\n<td>风险清单、催办建议</td>\n<td>数据时点和供应商权限</td>\n</tr>\n</tbody>\n</table>\n<p><strong>落地路径</strong>：先用连接器接入 ERP 和 MES 数据（DataHub 语义建模统一口径），再部署生产报表专家自动生成日报（L3），最后在团队空间中共享给生产管理团队（L4）。</p>\n<p><strong>必须控制</strong>：质量放行、设备停机操作、安全相关指令，必须由持证人员确认，AI 不自动执行。</p>\n<h2 id=\"_4\">跨境电商</h2>\n<p>跨境电商的难点不是单一内容生成，而是多平台、多语言、多币种、多时区和多规则并存。</p>\n<table>\n<thead>\n<tr>\n<th>场景</th>\n<th>Comate 工作流</th>\n<th>验收重点</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>商品上新</td>\n<td>产品资料 → 卖点提取 → 多语种草稿 → 平台格式</td>\n<td>参数、禁用词、商标和本地表达</td>\n</tr>\n<tr>\n<td>客服与评价</td>\n<td>工单聚类 → 回复草稿 → FAQ 更新</td>\n<td>订单事实、退款承诺、语气</td>\n</tr>\n<tr>\n<td>经营复盘</td>\n<td>订单/广告/库存 → 统一口径 → 利润与异常</td>\n<td>汇率、时区、归因窗口</td>\n</tr>\n<tr>\n<td>供应链协同</td>\n<td>采购、交期、物流 → 风险清单</td>\n<td>单号、时间、责任人</td>\n</tr>\n</tbody>\n</table>\n<p><strong>关键约束</strong>：多币种场景下，DataHub 语义层必须统一定义汇率口径（实时汇率还是结算汇率），否则利润计算会出现偏差。多时区场景下，所有时间字段必须标注时区。</p>\n<h2 id=\"_5\">金融与财税</h2>\n<p>这类行业的核心资产是证据、分析口径和专业判断。AI 适合缩短资料处理时间，不适合隐藏来源后直接给结论。</p>\n<table>\n<thead>\n<tr>\n<th>场景</th>\n<th>基础版</th>\n<th>进阶版</th>\n<th>人工关口</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>行业研究</td>\n<td>来源表和资料摘要</td>\n<td>证据矩阵、定期跟踪</td>\n<td>观点与投资含义</td>\n</tr>\n<tr>\n<td>财税材料</td>\n<td>单据识别、字段核对</td>\n<td>申报资料清单、差异检查</td>\n<td>申报和税务判断</td>\n</tr>\n<tr>\n<td>经营分析</td>\n<td>多表汇总</td>\n<td>指标解释、异常归因、层层下钻</td>\n<td>会计口径和管理决策</td>\n</tr>\n<tr>\n<td>风险管控</td>\n<td>规则匹配、偏离清单</td>\n<td>风险评分、催办建议</td>\n<td>风险定性和处置决策</td>\n</tr>\n</tbody>\n</table>\n<p><strong>第 25 章案例</strong>：高管问数专家将 300 余条业务语义规则注入 Skill Reference，查询准确率从 60% 提升至 99.99%。这展示了金融财税行业的关键需求——不是 AI 更聪明，而是 AI 按企业真实口径工作。</p>\n<p><strong>核心原则</strong>：AI 产出的数据和分析必须可溯源。DataHub 的数据血缘追溯能力支持从 AI 生成结果反向溯源至原始数据源，保障结论可验证。</p>\n<h2 id=\"_6\">医疗医药</h2>\n<p>医疗医药强调证据等级、版本控制、隐私和专业资质。首批场景应避开诊断和治疗决定。</p>\n<table>\n<thead>\n<tr>\n<th>场景</th>\n<th>可由 AI 辅助</th>\n<th>不应自动完成</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>文献整理</td>\n<td>检索结果去重、摘要、证据表</td>\n<td>临床结论和治疗建议</td>\n</tr>\n<tr>\n<td>生产质量</td>\n<td>批记录完整性检查、培训材料</td>\n<td>批次放行和偏差定责</td>\n</tr>\n<tr>\n<td>知识管理</td>\n<td>制度问答、版本定位、SOP 检索</td>\n<td>超权限访问患者或试验数据</td>\n</tr>\n<tr>\n<td>医学材料</td>\n<td>来源核对、禁用表述提示</td>\n<td>宣传合规最终批准</td>\n</tr>\n</tbody>\n</table>\n<p><strong>数据安全要求</strong>：患者数据属于 L3 机密级别，TrustHub 的行列权限和动态脱敏机制确保不同角色只能看到对应精度的数据。私有化部署可满足医疗行业的数据主权要求。</p>\n<p><strong>落地建议</strong>：从文献整理和内部知识管理切入（L1-L2），这两类场景风险低、频次高、验收容易。生产质量场景需要连接 LIMS 系统（L3），但放行决策必须由 QA 人员签字。</p>\n<h2 id=\"_7\">教育与培训</h2>\n<table>\n<thead>\n<tr>\n<th>场景</th>\n<th>输入</th>\n<th>交付物</th>\n<th>约束</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>企业培训</td>\n<td>制度、课程、案例</td>\n<td>学习路径、课件、题库</td>\n<td>版本和适用人群</td>\n</tr>\n<tr>\n<td>教学备课</td>\n<td>课程标准、教材、学情</td>\n<td>教案、活动设计、练习题</td>\n<td>知识准确和年龄适配</td>\n</tr>\n<tr>\n<td>学习反馈</td>\n<td>作业、评分规则</td>\n<td>共性问题、反馈草稿</td>\n<td>不用敏感特征贴标签</td>\n</tr>\n<tr>\n<td>招生内容</td>\n<td>批准的课程资料</td>\n<td>页面和咨询话术草稿</td>\n<td>不夸大效果和承诺</td>\n</tr>\n</tbody>\n</table>\n<p><strong>Comate 应用开发能力</strong>可将培训材料快速转化为可分享的网页应用：上传课程文档，AI 自动生成在线学习页面，发布到应用广场供团队成员访问。</p>\n<h2 id=\"_8\">文化传媒与广告</h2>\n<p>视频团队和内容团队是 Comate 多 Agent 协同的典型场景。行业落地时，还需要在创作效率之外加入版权、品牌和发布控制。</p>\n<pre class=\"codehilite\"><code class=\"language-mermaid\">flowchart LR\n    A[&quot;热点与客户 brief&quot;] --&gt; B[&quot;选题评分&lt;br/&gt;（技能）&quot;]\n    B --&gt; C[&quot;脚本与分镜&lt;br/&gt;（专家）&quot;]\n    C --&gt; D[&quot;素材与制作&lt;br/&gt;（多 Agent 协同）&quot;]\n    D --&gt; E[&quot;事实/版权/品牌审核&quot;]\n    E --&gt; F[&quot;人工发布&quot;]\n    F --&gt; G[&quot;数据复盘&lt;br/&gt;（自动化）&quot;]\n</code></pre>\n\n<p><strong>可沉淀资产</strong>：品牌语气规范、禁用词表、事实来源库、授权素材库、平台格式模板、选题评分表、脚本技能、分镜模板和复盘指标。</p>\n<p><strong>团队空间价值</strong>：内容团队的编导、文案、设计可以在同一团队空间中与多个专家 Agent 协同工作。人类负责创意决策和审核，AI 负责资料整理、草稿生成和格式适配。任务完成后资产自动归档。</p>\n<h2 id=\"_9\">行业落地的通用路径</h2>\n<h3 id=\"_10\">从单点试点到部门级工作流</h3>\n<pre class=\"codehilite\"><code class=\"language-mermaid\">flowchart TD\n    A[&quot;第 1 步：选场景&lt;br/&gt;五个问题筛选&quot;] --&gt; B[&quot;第 2 步：接入数据&lt;br/&gt;连接器 + DataHub&quot;]\n    B --&gt; C[&quot;第 3 步：封装技能&lt;br/&gt;高频任务标准化&quot;]\n    C --&gt; D[&quot;第 4 步：部署专家&lt;br/&gt;连接系统 + 知识库&quot;]\n    D --&gt; E[&quot;第 5 步：团队空间&lt;br/&gt;共享资产 + 自动化&quot;]\n</code></pre>\n\n<table>\n<thead>\n<tr>\n<th>步骤</th>\n<th>做什么</th>\n<th>用什么能力</th>\n<th>验收标准</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>选场景</td>\n<td>用五个问题筛选出首批试点</td>\n<td>—</td>\n<td>场景高频、耗时、可验收</td>\n</tr>\n<tr>\n<td>接入数据</td>\n<td>把业务系统数据接入 Comate</td>\n<td>连接器 + 数据治理</td>\n<td>AI 能按企业口径读取数据</td>\n</tr>\n<tr>\n<td>封装技能</td>\n<td>把高频任务做成技能</td>\n<td>技能市场</td>\n<td>同岗位的人能直接用</td>\n</tr>\n<tr>\n<td>部署专家</td>\n<td>把技能升级为专家数字员工</td>\n<td>专家 + Wiki</td>\n<td>7×24 可用，产出可追溯</td>\n</tr>\n<tr>\n<td>团队空间</td>\n<td>团队共享技能和资产</td>\n<td>团队空间 + 自动化</td>\n<td>新人加入即继承能力</td>\n</tr>\n</tbody>\n</table>\n<h3 id=\"_11\">行业落地的时间节奏</h3>\n<table>\n<thead>\n<tr>\n<th>阶段</th>\n<th>目标</th>\n<th>典型场景数量</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>第 1 个月</td>\n<td>1 个场景跑通 L1-L2</td>\n<td>1 个</td>\n</tr>\n<tr>\n<td>第 2-3 个月</td>\n<td>1 个岗位的 2-3 个场景进入 L2-L3</td>\n<td>2-3 个</td>\n</tr>\n<tr>\n<td>第 4-6 个月</td>\n<td>1 个部门进入 L3-L4，开始跨岗位协同</td>\n<td>5+ 个</td>\n</tr>\n</tbody>\n</table>\n<h3 id=\"_12\">行业落地的三条底线</h3>\n<ol>\n<li><strong>数据口径底线</strong>：所有行业指标必须在 DataHub 语义层中统一定义，不允许 AI 按通用认知自行解释。</li>\n<li><strong>人工签字底线</strong>：涉及法律效力、财务确认、安全操作的环节，必须保留人工签字确认。</li>\n<li><strong>权限边界底线</strong>：专家数字员工的权限 = MIN(用户权限, 技能声明权限, 企业策略)，任何场景都不能突破。</li>\n</ol>\n<p>行业落地的本质不是\"AI 能做什么\"，而是\"组织愿意把什么交给 AI\"。从第五类问题（最重复、最耗时、最易验收）开始，逐步建立信任和标准，才是行业化的正确路径。</p>", "part": "第四篇 岗位与行业落地", "chapter_num": 31, "prev": "第_30_章_岗位路线图", "next": "附录_A_常用指令模板"}, "附录_A_常用指令模板": {"title": "附录 A 常用指令模板", "html": "<p>本附录提供 10 个高频场景的指令模板，可直接复制到 Comate 对话框使用。使用时将 <code>【】</code> 中的内容替换为实际值。</p>\n<blockquote>\n<p><strong>使用提示</strong>：输入 <code>@</code> 可添加云文档、会议纪要、知识库等作为上下文；输入 <code>/</code> 可唤起技能选择器。</p>\n</blockquote>\n<h2 id=\"a1\">A.1 文档处理</h2>\n<pre class=\"codehilite\"><code class=\"language-text\">请读取这份文档 @【云文档/本地文件】，\n完成以下处理：\n1. 提取核心内容，按&quot;背景、结论、待办、风险&quot;四个维度整理\n2. 标注文档中的关键数字和日期\n3. 如有表格，保留原始结构和数据\n4. 输出一份结构化摘要，不超过 500 字\n</code></pre>\n\n<p><strong>适用场景</strong>：Word/PDF 读取、长文整理、格式转换。<br />\n<strong>人工检查点</strong>：关键数字和日期是否与原文一致。</p>\n<h2 id=\"a2-excel\">A.2 Excel 分析</h2>\n<pre class=\"codehilite\"><code class=\"language-text\">请分析这个 Excel 文件 @【Excel 文件】。\n请输出：\n1. 核心指标：行数、列数、时间范围、关键字段\n2. 异常数据：空值、重复值、离群值\n3. 趋势变化：同比/环比变化及可能原因\n4. 数据透视：按【维度】汇总【指标】\n5. 可视化图表：生成趋势图和分布图\n6. 摘要报告：一段话总结数据特征和建议行动\n</code></pre>\n\n<p><strong>适用场景</strong>：数据透视、异常检测、图表生成。<br />\n<strong>人工检查点</strong>：主键是否正确、口径是否一致、金额是否守恒。</p>\n<h2 id=\"a3-ppt\">A.3 PPT 生成</h2>\n<pre class=\"codehilite\"><code class=\"language-text\">请根据这份文档 @【Word/Markdown 文档】生成一份 PPT 大纲。\n要求：\n1. 10-15 页，每页包含标题和 3-4 个要点\n2. 首页为标题页，末页为总结页\n3. 标注每页建议的图表类型（柱状图/折线图/表格等）\n4. 风格正式，适合【管理层汇报/客户演示/内部培训】\n5. 生成后转为可编辑的 PPT 文件\n</code></pre>\n\n<p><strong>适用场景</strong>：从文档生成 PPT、大纲到成稿。<br />\n<strong>人工检查点</strong>：先确认大纲和证据映射，一页一个结论。</p>\n<h2 id=\"a4\">A.4 会议纪要</h2>\n<pre class=\"codehilite\"><code class=\"language-text\">请整理这段会议内容 @【会议转写/录音文件】。\n输出格式：\n1. 会议信息：主题、时间、参会人\n2. 会议结论：达成共识的决定\n3. 待办事项：任务、负责人、截止时间\n4. 讨论要点：按议题分组\n5. 风险点：未解决的问题和潜在风险\n6. 未决问题：需要后续讨论的事项\n\n注意：区分&quot;已决定&quot;和&quot;讨论中&quot;的内容，不要把推测写成结论。\n</code></pre>\n\n<p><strong>适用场景</strong>：从转写到结构化纪要。<br />\n<strong>人工检查点</strong>：事实、决定、建议和未决问题是否分开标注。</p>\n<h2 id=\"a5\">A.5 行业调研</h2>\n<pre class=\"codehilite\"><code class=\"language-text\">请调研【行业/公司/产品名称】。\n输出：\n1. 市场背景：市场规模、增长率、驱动因素\n2. 主要玩家：Top 5 企业及市场份额\n3. 竞品对比：产品功能、定价、目标客户、差异化优势\n4. 趋势判断：技术趋势、政策趋势、用户需求变化\n5. 机会点：潜在切入方向\n6. 风险点：市场、技术、合规风险\n\n请附上信息来源链接，标注信息日期。\n</code></pre>\n\n<p><strong>适用场景</strong>：市场背景、竞品对比、趋势判断。<br />\n<strong>人工检查点</strong>：信息来源是否可靠、是否过时。</p>\n<h2 id=\"a6\">A.6 销售方案</h2>\n<pre class=\"codehilite\"><code class=\"language-text\">请基于以下客户资料生成一份售前方案。\n客户资料：@【CRM 记录/客户背景文件】\n招标材料：@【招标文件】（如有）\n\n方案包含：\n1. 客户背景：企业概况、业务模式、决策链\n2. 痛点分析：基于客户现状推断的核心痛点\n3. 推荐场景：针对每个痛点的解决方案\n4. 实施路径：分阶段实施计划\n5. 预期收益：可量化的价值指标\n6. 演示流程：汇报大纲和关键话术\n\n注意：不要虚构案例和数据，引用的案例需注明来源。\n</code></pre>\n\n<p><strong>适用场景</strong>：客户背景、痛点分析、推荐场景。<br />\n<strong>人工检查点</strong>：价格、交付周期和案例引用必须人工确认。</p>\n<h2 id=\"a7\">A.7 数据分析</h2>\n<pre class=\"codehilite\"><code class=\"language-text\">请对以下数据进行分析 @【Excel/CSV 文件】。\n分析要求：\n1. 将【表A】和【表B】按【关联字段】合并\n2. 计算指标：【指标名称及计算公式】\n3. 按【维度】分组汇总，生成对比表\n4. 检测异常值：偏离均值 2 个标准差以上的记录\n5. 生成可视化图表：趋势图、对比图、分布图\n6. 输出分析报告：关键发现、异常原因假设、建议行动\n\n注意：合并前检查主键唯一性，指标计算口径需与【业务定义文件】一致。\n</code></pre>\n\n<p><strong>适用场景</strong>：多表合并、指标计算、可视化。<br />\n<strong>人工检查点</strong>：合并主键、口径定义、异常值处理。</p>\n<h2 id=\"a8\">A.8 知识管理</h2>\n<pre class=\"codehilite\"><code class=\"language-text\">请将以下文档导入知识库并建立语义模型 @【文档/文件列表】。\n处理要求：\n1. 解析文档结构，提取标题层级和关键段落\n2. 识别文档中的业务实体（客户、产品、项目等）及其关系\n3. 按知识域归类：【域1、域2、域3】\n4. 生成可问答的编译文章\n5. 建立文档间的交叉引用\n\n导入完成后，请回答以下测试问题：\n- 【测试问题1】\n- 【测试问题2】\n\n回答时请标注信息来源和原文位置。\n</code></pre>\n\n<p><strong>适用场景</strong>：文档入库、语义建模、智能问答。<br />\n<strong>人工检查点</strong>：回答是否带条款来源、未命中是否转人工。</p>\n<h2 id=\"a9\">A.9 自动化任务</h2>\n<pre class=\"codehilite\"><code class=\"language-text\">请创建一个自动化任务：\n- 执行频率：【每天/每周/每小时】的【具体时间】\n- 执行内容：\n  1. 从【系统/文件】获取【数据类型】\n  2. 按【规则】进行处理\n  3. 生成【报告/图表/清单】\n  4. 推送到【工作群/邮件/云文档】\n- 异常处理：如果【异常条件】，发送告警给【负责人】\n- 执行环境：云端托管 / 本机\n\n请先描述任务计划，确认后再创建。\n</code></pre>\n\n<p><strong>适用场景</strong>：定时运行、条件触发、结果推送。<br />\n<strong>人工检查点</strong>：推送对象、数据权限、异常通知是否到位。</p>\n<h2 id=\"a10\">A.10 应用开发</h2>\n<pre class=\"codehilite\"><code class=\"language-text\">请创建一个网页应用：\n应用名称：【应用名称】\n功能描述：【用自然语言描述应用的功能和交互流程】\n数据来源：【Excel/API/手动输入】\n页面结构：\n1. 【页面1】：功能描述\n2. 【页面2】：功能描述\n样式要求：【简洁/商务/科技风格】，支持手机端访问\n\n请先生成应用原型，我确认后再发布。\n</code></pre>\n\n<p><strong>适用场景</strong>：需求描述到网页应用。<br />\n<strong>人工检查点</strong>：发布范围、数据权限、应用内容准确性。</p>", "part": "附录", "prev": "第_31_章_行业路线图", "next": "附录_B_场景速查表"}, "附录_B_场景速查表": {"title": "附录 B 场景速查表", "html": "<h2 id=\"b1\">B.1 岗位 × 场景推荐表</h2>\n<table>\n<thead>\n<tr>\n<th>岗位</th>\n<th>推荐从这些场景开始</th>\n<th>推荐能力</th>\n<th>起始成熟度</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>普通职场人</td>\n<td>会议纪要、日报周报、总结文档、头脑风暴、快速做页面</td>\n<td>任务执行</td>\n<td>L1</td>\n</tr>\n<tr>\n<td>产品经理</td>\n<td>PRD 草稿、竞品分析、用户反馈聚类、需求管理看板、总结长文档</td>\n<td>任务执行 + 技能</td>\n<td>L1-L2</td>\n</tr>\n<tr>\n<td>项目经理</td>\n<td>会后纪要、会前预告、项目进展汇总、重点项目推送</td>\n<td>自动化 + @会议</td>\n<td>L1-L2</td>\n</tr>\n<tr>\n<td>运营与市场</td>\n<td>内容改写、定时收集行业新闻、活动数据整理、H5 页面搭建</td>\n<td>技能 + 任务执行</td>\n<td>L2</td>\n</tr>\n<tr>\n<td>销售与售前</td>\n<td>客户 360° 画像、盲区识别、拜访前推送话术、投标材料</td>\n<td>专家 + 连接器</td>\n<td>L2-L3</td>\n</tr>\n<tr>\n<td>客服与技术支持</td>\n<td>高风险工单预警、待响应催办、来访记录筛选、来电历史抓取</td>\n<td>自动化 + 专家</td>\n<td>L2-L3</td>\n</tr>\n<tr>\n<td>HR 与行政</td>\n<td>制度问答、入职指引、培训材料、考勤整理</td>\n<td>专家 + Wiki</td>\n<td>L2-L3</td>\n</tr>\n<tr>\n<td>财务与法务</td>\n<td>发票识别、合同初审、预算分析、法规变更对比</td>\n<td>数据治理 + 专家</td>\n<td>L3</td>\n</tr>\n<tr>\n<td>研发与 IT</td>\n<td>代码理解、未读消息总结、自动日报、日志分析、CI 诊断</td>\n<td>任务执行（本机引擎）</td>\n<td>L1-L2</td>\n</tr>\n<tr>\n<td>解决方案与知识库</td>\n<td>链接健康检查、知识库变更监控、内容辅助撰写、散落数据串联</td>\n<td>自动化 + Wiki</td>\n<td>L2-L3</td>\n</tr>\n<tr>\n<td>管理层</td>\n<td>经营分析、异常预警、战略提案、工作简报</td>\n<td>高管问数专家 + 自动化</td>\n<td>L3-L4</td>\n</tr>\n<tr>\n<td>企业管理员</td>\n<td>权限配置、用量监控、技能审核、审计日志</td>\n<td>企业管控</td>\n<td>L4</td>\n</tr>\n</tbody>\n</table>\n<h2 id=\"b2\">B.2 基础办公速查</h2>\n<table>\n<thead>\n<tr>\n<th>我想做什么</th>\n<th>推荐能力</th>\n<th>人工检查点</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>把会议内容整理成纪要</td>\n<td>@会议纪要 + 任务执行</td>\n<td>事实、决定、建议和未决问题分开</td>\n</tr>\n<tr>\n<td>根据文档生成 PPT</td>\n<td>任务执行 + PPT 技能</td>\n<td>先确认大纲，一页一个结论</td>\n</tr>\n<tr>\n<td>分析 Excel 数据</td>\n<td>Excel 分析 + 任务执行</td>\n<td>主键、口径、异常值和金额守恒</td>\n</tr>\n<tr>\n<td>合并多个 Excel 并对账</td>\n<td>Excel 分析 + 数据治理</td>\n<td>主键唯一性、口径一致、金额守恒</td>\n</tr>\n<tr>\n<td>比较两版文档差异</td>\n<td>@云文档 + 任务执行</td>\n<td>金额、日期、责任、条件和否定表达</td>\n</tr>\n<tr>\n<td>把公司制度做成问答</td>\n<td>Wiki + 知识库</td>\n<td>回答带条款来源，未命中转人工</td>\n</tr>\n<tr>\n<td>整理邮件并生成回复草稿</td>\n<td>@邮件 + 任务执行</td>\n<td>发件人、对象、附件和发送确认</td>\n</tr>\n<tr>\n<td>根据任务和会议生成周报</td>\n<td>@任务 + @会议 + 自动化</td>\n<td>成果有证据，不把计划写成完成</td>\n</tr>\n<tr>\n<td>批量整理和重命名文件</td>\n<td>任务执行（本机引擎）</td>\n<td>先预览，不覆盖、不删除</td>\n</tr>\n<tr>\n<td>将文档转为可分享的网页应用</td>\n<td>应用开发</td>\n<td>发布范围和数据内容确认</td>\n</tr>\n<tr>\n<td>总结长文档或 PDF</td>\n<td>任务执行</td>\n<td>关键数据和结论与原文一致</td>\n</tr>\n<tr>\n<td>头脑风暴找灵感</td>\n<td>任务执行（多模型对比）</td>\n<td>建议可行性和原创性</td>\n</tr>\n<tr>\n<td>把想法快速做成页面</td>\n<td>应用开发</td>\n<td>页面功能和数据内容确认</td>\n</tr>\n<tr>\n<td>定时执行重复工作</td>\n<td>自动化引擎</td>\n<td>执行频率、推送对象和异常通知</td>\n</tr>\n<tr>\n<td>筛选大量记录并分类</td>\n<td>Excel 分析 + 任务执行</td>\n<td>分类规则和边界情况</td>\n</tr>\n</tbody>\n</table>\n<h2 id=\"b3\">B.3 数据分析速查</h2>\n<table>\n<thead>\n<tr>\n<th>我想做什么</th>\n<th>推荐能力</th>\n<th>人工检查点</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>自然语言查询业务数据</td>\n<td>高管问数专家 + DataHub 语义层</td>\n<td>指标口径与业务定义一致</td>\n</tr>\n<tr>\n<td>多表合并并对账</td>\n<td>Excel 分析 + 数据治理</td>\n<td>主键唯一性、口径一致</td>\n</tr>\n<tr>\n<td>按维度做数据透视</td>\n<td>Excel 分析 + 任务执行</td>\n<td>维度定义和汇总规则</td>\n</tr>\n<tr>\n<td>检测异常值和离群点</td>\n<td>Excel 分析 + 任务执行</td>\n<td>异常判定阈值和业务含义</td>\n</tr>\n<tr>\n<td>生成可视化图表</td>\n<td>任务执行</td>\n<td>图表类型与数据特征匹配</td>\n</tr>\n<tr>\n<td>搭建数据管道（ETL）</td>\n<td>数据治理（数据管道）</td>\n<td>数据源、转换规则和目标表</td>\n</tr>\n<tr>\n<td>定义业务指标口径</td>\n<td>DataHub 语义模型</td>\n<td>指标定义经业务确认后发布</td>\n</tr>\n<tr>\n<td>反向溯源数据来源</td>\n<td>DataHub 数据血缘追溯</td>\n<td>溯源链路完整性</td>\n</tr>\n</tbody>\n</table>\n<h2 id=\"b4\">B.4 知识管理速查</h2>\n<table>\n<thead>\n<tr>\n<th>我想做什么</th>\n<th>建议入口</th>\n<th>人工检查点</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>上传文档到知识库</td>\n<td>Wiki 信息源管理</td>\n<td>文档版本、权限和适用范围</td>\n</tr>\n<tr>\n<td>编译文档为可问答知识</td>\n<td>Wiki 知识编译</td>\n<td>实体识别准确性和知识域归类</td>\n</tr>\n<tr>\n<td>查询已有知识</td>\n<td>Wiki 自然语言问答</td>\n<td>回答是否标注信息来源</td>\n</tr>\n<tr>\n<td>沉淀会议结论为项目记忆</td>\n<td>@会议纪要 + Wiki</td>\n<td>事实、决策、推测和待办分开</td>\n</tr>\n<tr>\n<td>把任务产物归档为知识</td>\n<td>任务执行 → Wiki 编译</td>\n<td>产物经审核后再入库</td>\n</tr>\n<tr>\n<td>定期清理知识库</td>\n<td>Wiki 健康评分</td>\n<td>不自动删除人工笔记</td>\n</tr>\n<tr>\n<td>建立企业语义模型</td>\n<td>DataHub 语义建模</td>\n<td>业务实体定义经业务确认</td>\n</tr>\n<tr>\n<td>共享知识给团队</td>\n<td>团队空间 + Wiki 引用</td>\n<td>团队权限和数据分级</td>\n</tr>\n</tbody>\n</table>\n<h2 id=\"b5-agent\">B.5 自动化与多 Agent 速查</h2>\n<table>\n<thead>\n<tr>\n<th>我想做什么</th>\n<th>推荐能力</th>\n<th>人工检查点</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>创建定时任务</td>\n<td>自动化引擎</td>\n<td>执行频率、推送对象和异常通知</td>\n</tr>\n<tr>\n<td>条件触发任务</td>\n<td>自动化引擎 + 连接器</td>\n<td>触发条件和执行范围</td>\n</tr>\n<tr>\n<td>部署岗位级专家</td>\n<td>专家数字员工</td>\n<td>九大模块配置完整，经审批上线</td>\n</tr>\n<tr>\n<td>多 Agent 协同工作</td>\n<td>团队空间 + 多专家</td>\n<td>任务分工和产出验收</td>\n</tr>\n<tr>\n<td>接入企业业务系统</td>\n<td>连接器（APIHub）</td>\n<td>权限最小化和数据分级</td>\n</tr>\n<tr>\n<td>把技能共享给团队</td>\n<td>团队空间（团队资源）</td>\n<td>技能可见范围和版本管理</td>\n</tr>\n<tr>\n<td>自动扫描群消息提取问题</td>\n<td>专家 + IM 连接器</td>\n<td>问题分类和风险分级规则</td>\n</tr>\n<tr>\n<td>自动生成并推送日报</td>\n<td>自动化 + @任务 + @会议</td>\n<td>数据来源和推送对象</td>\n</tr>\n</tbody>\n</table>\n<h2 id=\"b6\">B.6 安全与治理速查</h2>\n<table>\n<thead>\n<tr>\n<th>我想做什么</th>\n<th>推荐能力</th>\n<th>人工检查点</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>配置数据访问权限</td>\n<td>TrustHub 权限管控（行列权限）</td>\n<td>按角色和数据分级配置</td>\n</tr>\n<tr>\n<td>设置动态脱敏规则</td>\n<td>DataHub 动态脱敏</td>\n<td>脱敏字段和角色对应关系</td>\n</tr>\n<tr>\n<td>审计 AI 操作记录</td>\n<td>TrustHub 审计横切面</td>\n<td>日志完整性和可导出</td>\n</tr>\n<tr>\n<td>控制 Token 用量和成本</td>\n<td>AIHub 配额管控（L0-L4）</td>\n<td>配额分配和用量监控</td>\n</tr>\n<tr>\n<td>审核 Skill 上架</td>\n<td>企业管控（技能管控）</td>\n<td>白名单/黑名单和安全扫描</td>\n</tr>\n<tr>\n<td>管理模型选择和路由</td>\n<td>AIHub 模型管理</td>\n<td>敏感数据强制走私有化模型</td>\n</tr>\n<tr>\n<td>配置私有化部署</td>\n<td>TrustHub 全栈私有化部署</td>\n<td>渠道包准入和更新签名验证</td>\n</tr>\n<tr>\n<td>设置数据分级策略</td>\n<td>DataHub 数据分级（L0-L3）</td>\n<td>分级标准和 AI 访问策略</td>\n</tr>\n</tbody>\n</table>\n<h2 id=\"b7\">B.7 常见问题与故障排除</h2>\n<table>\n<thead>\n<tr>\n<th>问题</th>\n<th>可能原因</th>\n<th>解决方法</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>AI 回答不准确或\"编造\"数据</td>\n<td>未接入企业数据，AI 使用通用认知</td>\n<td>通过 DataHub 接入业务数据并建立语义模型</td>\n</tr>\n<tr>\n<td>指标计算结果与预期不符</td>\n<td>指标口径未定义或不一致</td>\n<td>在 DataHub 语义层统一定义指标口径</td>\n</tr>\n<tr>\n<td>专家无法访问业务系统</td>\n<td>连接器未配置或权限不足</td>\n<td>检查连接器凭证和权限配置</td>\n</tr>\n<tr>\n<td>技能执行报错</td>\n<td>技能版本过旧或参数不匹配</td>\n<td>更新技能版本，检查输入参数格式</td>\n</tr>\n<tr>\n<td>任务执行超时</td>\n<td>任务过于复杂或数据量过大</td>\n<td>拆分任务，或切换到云端引擎</td>\n</tr>\n<tr>\n<td>本地任务无法访问云文档</td>\n<td>本机引擎网络限制</td>\n<td>使用 @添加云文档作为上下文，或切换云端引擎</td>\n</tr>\n<tr>\n<td>Wiki 回答缺少来源</td>\n<td>文档未完成编译或知识域未匹配</td>\n<td>检查 Wiki 健康评分，重新编译相关文档</td>\n</tr>\n<tr>\n<td>自动化任务未执行</td>\n<td>时间配置错误或凭证过期</td>\n<td>检查执行频率和连接器凭证有效期</td>\n</tr>\n<tr>\n<td>专家产出包含敏感信息</td>\n<td>数据分级未配置或脱敏规则缺失</td>\n<td>在 DataHub 配置数据分级和动态脱敏</td>\n</tr>\n<tr>\n<td>团队空间成员看不到技能</td>\n<td>技能可见范围未配置</td>\n<td>在团队资源中设置技能的可见范围</td>\n</tr>\n<tr>\n<td>Token 配额用尽</td>\n<td>部门/角色配额不足</td>\n<td>在 AIHub 配额管控中调整配额</td>\n</tr>\n<tr>\n<td>应用发布后无法访问</td>\n<td>发布范围未包含目标用户</td>\n<td>修改应用的发布范围设置</td>\n</tr>\n</tbody>\n</table>", "part": "附录", "prev": "附录_A_常用指令模板", "next": "附录_C_管理员操作指南"}, "附录_C_管理员操作指南": {"title": "附录 C 管理员操作指南", "html": "<p>本附录面向 WPS Comate 企业管理员，提供从额度配置到渠道上线的全流程操作速查。每节给出关键步骤与核心规则，详细参数说明请查阅管理员操作手册。</p>\n<h2 id=\"c1-ai\">C.1 AI 额度管理</h2>\n<p><strong>配置入口</strong>：AI Hub 后台 → 额度管理（<code>aihub.wps.cn/saas/quota-manage?product=saas-comate-server</code>）</p>\n<p>系统初始化默认全员无限制。管理员可按需设置日/月限额，单位为\"点\"。</p>\n<table>\n<thead>\n<tr>\n<th>配置类型</th>\n<th>适用场景</th>\n<th>优先级</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>默认规则</td>\n<td>全局兜底，设置每人每日/每月限额</td>\n<td>低于自定义规则</td>\n</tr>\n<tr>\n<td>自定义限额规则</td>\n<td>按部门/用户/功能维度精细管控</td>\n<td>高于默认规则</td>\n</tr>\n</tbody>\n</table>\n<p><strong>自定义限额规则创建步骤</strong>：</p>\n<ol>\n<li>点击「添加」，选择适用范围（企业/部门/用户，支持多选）</li>\n<li>设置消耗限额（点/日或点/月），或选择不限额</li>\n<li>保存生效</li>\n</ol>\n<p><strong>规则优先级速记</strong>：</p>\n<table>\n<thead>\n<tr>\n<th>判断原则</th>\n<th>说明</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>成员 &gt; 部门</td>\n<td>用户级规则优先于部门级</td>\n</tr>\n<tr>\n<td>同层级取最小值</td>\n<td>同一层级多条限额规则，取额度最小值生效</td>\n</tr>\n<tr>\n<td>同层级不限额最优</td>\n<td>同一层级中，不限额规则优先</td>\n</tr>\n<tr>\n<td>自定义 &gt; 默认</td>\n<td>命中自定义规则则优先于默认规则</td>\n</tr>\n</tbody>\n</table>\n<p><strong>auto 模式配置</strong>（<code>aihub.wps.cn/saas/quota-manage?product=comate</code>）：默认全员 auto 模式走 flash 通道；可自定义用户是否允许开启 auto 模式、可用通道（pro/flash）及默认通道。</p>\n<h2 id=\"c2\">C.2 模型管理</h2>\n<p><strong>上架入口</strong>：企业管理后台 → 模型管理（<code>365.kdocs.cn/3rd/work/aihub/manage/model/list</code>）</p>\n<blockquote>\n<p>前置条件：需先完成企业认证。系统预置的三个模型（文心一言 ERNIE-4.0-8K、智谱清言 glm-4-air、MiniMax abab6.5s-chat）效果不佳，请勿使用。</p>\n</blockquote>\n<p><strong>推荐模型清单</strong>：</p>\n<table>\n<thead>\n<tr>\n<th>模型厂商</th>\n<th>推荐模型</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>Anthropic</td>\n<td>claude opus 4.6 V1 及以上</td>\n</tr>\n<tr>\n<td>GPT</td>\n<td>gpt-o4 及以上</td>\n</tr>\n<tr>\n<td>DeepSeek</td>\n<td>deepseek-V4-pro、deepseek-V4-flash 及以上</td>\n</tr>\n<tr>\n<td>通义千问</td>\n<td>qwen3.6-flash、qwen3.6-plus 及以上</td>\n</tr>\n<tr>\n<td>Moonshot</td>\n<td>Kimi-k2.5 及以上</td>\n</tr>\n<tr>\n<td>智谱</td>\n<td>glm-5、glm-5-zone 及以上</td>\n</tr>\n<tr>\n<td>MiniMax</td>\n<td>MiniMax-M2.7 及以上</td>\n</tr>\n<tr>\n<td>豆包</td>\n<td>Doubao-Seed-2.0-pro 及以上</td>\n</tr>\n<tr>\n<td>小米</td>\n<td>MiMo-V2-Pro 及以上</td>\n</tr>\n</tbody>\n</table>\n<blockquote>\n<p>注意：应用任务仅支持 deepseek-V4-pro 和 deepseek-V4-flash。</p>\n</blockquote>\n<p><strong>自定义模型上架步骤</strong>：</p>\n<ol>\n<li>点击「添加模型」→ 选择「自定义模型」</li>\n<li>填写模型名称（需与服务商一致，如 <code>kimi-k2.6</code>）、API 地址（须符合 OpenAI 接口规范，以 <code>chat/completions</code> 结尾）、apiKey</li>\n<li>选择模型类型（文本聊天/多模态）、是否支持深度思考、上下文长度（建议先填 32K 尝试）</li>\n<li>点击「联通性测试」，通过即添加成功</li>\n</ol>\n<p><strong>模型策略配置</strong>（<code>aihub.wps.cn/saas/model?product=comate</code>）：</p>\n<table>\n<thead>\n<tr>\n<th>策略类型</th>\n<th>配置维度</th>\n<th>说明</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>普通任务</td>\n<td>按人配置</td>\n<td>未挂载专家的常规任务，每人每日 token 限额</td>\n</tr>\n<tr>\n<td>应用任务</td>\n<td>按人配置</td>\n<td>内容创作、代码开发等应用型任务</td>\n</tr>\n<tr>\n<td>专家</td>\n<td>按功能配置</td>\n<td>专家整体每日 token 限额</td>\n</tr>\n<tr>\n<td>系统调用</td>\n<td>按功能配置</td>\n<td>Wiki 编译、专家简介生成等系统调用，必须配置</td>\n</tr>\n</tbody>\n</table>\n<blockquote>\n<p>关键提醒：如果某功能未配置可用模型（可用模型范围为空），用户将无法访问大模型服务。</p>\n</blockquote>\n<h2 id=\"c3\">C.3 权限管理</h2>\n<p><strong>配置入口</strong>：Comate Studio（<code>comate.wps.cn/studio</code>）→ 平台管理</p>\n<p>首次使用需由「平台超管」（默认为 WPS 365 企业超管）分配角色与权限。</p>\n<table>\n<thead>\n<tr>\n<th>操作</th>\n<th>步骤</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>创建角色</td>\n<td>角色管理 → 新建 → 勾选权限点 → 保存</td>\n</tr>\n<tr>\n<td>分配角色</td>\n<td>用户管理 → 通讯录选择用户 → 分配角色</td>\n</tr>\n<tr>\n<td>多角色权限</td>\n<td>一位用户可拥有多种角色，权限取并集</td>\n</tr>\n</tbody>\n</table>\n<p>权限点按模块划分（专家管理、专家开发、技能管理、连接管理、数据管理、审批管理等）。未勾选的权限点，该角色用户不可访问。</p>\n<h2 id=\"c4\">C.4 专家管理</h2>\n<p><strong>功能入口</strong>：Comate Studio → 专家 → 专家管理</p>\n<p><strong>专家配置工作台九大模块</strong>：</p>\n<table>\n<thead>\n<tr>\n<th>模块</th>\n<th>功能</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>基础信息</td>\n<td>头像、名称、专家 key、描述、说明书</td>\n</tr>\n<tr>\n<td>大模型</td>\n<td>配置驱动模型（单选）</td>\n</tr>\n<tr>\n<td>专家能力</td>\n<td>挂载 Skill、数据、连接</td>\n</tr>\n<tr>\n<td>知识库</td>\n<td>关联 365 智能文档库</td>\n</tr>\n<tr>\n<td>渠道能力</td>\n<td>配置企业自建应用、协作群聊、团队任务、轻审批</td>\n</tr>\n<tr>\n<td>使用范围</td>\n<td>可见范围与开发权限</td>\n</tr>\n<tr>\n<td>调试预览</td>\n<td>对话测试专家效果</td>\n</tr>\n<tr>\n<td>发布与版本</td>\n<td>版本管理与发布审批</td>\n</tr>\n<tr>\n<td>运营统计</td>\n<td>调用量、活跃用户等数据</td>\n</tr>\n</tbody>\n</table>\n<p><strong>创建专家步骤</strong>：</p>\n<ol>\n<li><strong>角色分配</strong>：角色管理 → 新建「专家开发」角色（勾选专家管理和专家开发权限）→ 用户管理 → 分配角色</li>\n<li><strong>新建专家</strong>：点击「新建专家」→ 填写名称、key、描述 → 自动进入配置工作台</li>\n<li><strong>配置模型</strong>：点击「大模型」→ 勾选驱动模型</li>\n<li><strong>添加能力</strong>（可选）：专家能力 → 添加 Skill/数据/连接；知识库 → 关联文档库；渠道能力 → 配置接入</li>\n<li><strong>发布审批</strong>：发布与版本 → 发布新版本 → 填写版本号和说明 → 提交审批</li>\n</ol>\n<p><strong>工作流程编排</strong>：</p>\n<ul>\n<li>通过自然语言描述场景 → 系统生成编排框架 → 进入步骤详细编排</li>\n<li>步骤中通过 <code>@</code> 引入已挂载的 Skill、Action 或连接器</li>\n<li>行为配置：为 AI agent 定义确定性操作接口</li>\n<li>专家助手：挂载特定技能，聚焦步骤执行</li>\n</ul>\n<h2 id=\"c5\">C.5 技能管理</h2>\n<p><strong>功能入口</strong>：Comate Studio → Skill → 技能管理</p>\n<p><strong>技能列表支持筛选维度</strong>：</p>\n<table>\n<thead>\n<tr>\n<th>筛选维度</th>\n<th>选项</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>技能类型</td>\n<td>个人使用 / 共享技能</td>\n</tr>\n<tr>\n<td>技能分类</td>\n<td>办公协作 / 文档处理 / 内容创作 / 开发与代码 / 数据分析 / 安全合规</td>\n</tr>\n<tr>\n<td>企业认证状态</td>\n<td>已认证 / 未认证</td>\n</tr>\n<tr>\n<td>预装状态</td>\n<td>已预装 / 未预装</td>\n</tr>\n<tr>\n<td>安全审查状态</td>\n<td>通过 / 未通过 / 待审查 / 扫描失败</td>\n</tr>\n</tbody>\n</table>\n<p><strong>技能编辑四个 Tab</strong>：</p>\n<table>\n<thead>\n<tr>\n<th>Tab</th>\n<th>功能</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>基本信息</td>\n<td>作者（支持移交）、分类、名称、简介、AI 摘要</td>\n</tr>\n<tr>\n<td>管理配置</td>\n<td>组织认证、预装配置</td>\n</tr>\n<tr>\n<td>安全审查</td>\n<td>查看最新版本安全审查结果</td>\n</tr>\n<tr>\n<td>版本历史</td>\n<td>查看版本记录与技能文件</td>\n</tr>\n</tbody>\n</table>\n<p><strong>官方技能</strong>仅支持查看基本信息、认证状态和修改预装状态。</p>\n<h2 id=\"c6\">C.6 连接管理</h2>\n<p><strong>功能入口</strong>：Comate Studio → 连接</p>\n<p><strong>术语速查</strong>：</p>\n<table>\n<thead>\n<tr>\n<th>术语</th>\n<th>定义</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>连接器</td>\n<td>目标系统的基础配置载体，含 Base URL、鉴权、API 列表</td>\n</tr>\n<tr>\n<td>连接模板</td>\n<td>预配置的系统连接器（如 ONES），可被多个连接器复用</td>\n</tr>\n<tr>\n<td>API</td>\n<td>连接下的具体接口定义，含 HTTP 方法、路径、参数</td>\n</tr>\n<tr>\n<td>预处理脚本</td>\n<td>Lua 编写的请求前逻辑，用于动态鉴权、参数转换</td>\n</tr>\n<tr>\n<td>鉴权配置</td>\n<td>API 调用身份验证规则，支持 Header 键值对注入 Token</td>\n</tr>\n<tr>\n<td>Skill 能力定义</td>\n<td>连接的业务能力说明，供 AI Agent 识别调用</td>\n</tr>\n<tr>\n<td>连接凭证</td>\n<td>集中托管密钥/Token 的安全存储，实现配置与密钥解耦</td>\n</tr>\n</tbody>\n</table>\n<p><strong>API 连接创建四步</strong>：</p>\n<table>\n<thead>\n<tr>\n<th>步骤</th>\n<th>操作</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>1. 创建连接模板</td>\n<td>新建模板 → 填写名称、上游地址 → 选择凭据类型 → 创建</td>\n</tr>\n<tr>\n<td>2. 管理 API</td>\n<td>新增 API → 填写方法/路径（支持 OpenAPI 3 YAML 导入）→ 配置参数 → 可选绑定 Lua 脚本</td>\n</tr>\n<tr>\n<td>3. 创建连接凭证</td>\n<td>新建凭证 → 关联模板 → 填写密钥信息 → 创建</td>\n</tr>\n<tr>\n<td>4. 创建连接器实例</td>\n<td>新建连接器 → 选择模板 → 选择凭证 → 创建</td>\n</tr>\n</tbody>\n</table>\n<p><strong>MCP 连接创建三步</strong>：</p>\n<table>\n<thead>\n<tr>\n<th>步骤</th>\n<th>操作</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>1. 创建 MCP 模板</td>\n<td>新建模板 → 连接类型选 MCP → 填写 Server URL → 配置凭据</td>\n</tr>\n<tr>\n<td>2. 创建连接器</td>\n<td>选择 MCP 模板 → 关联凭证 → 命名</td>\n</tr>\n<tr>\n<td>3. 验证调用</td>\n<td>同 API 连接器调用方式</td>\n</tr>\n</tbody>\n</table>\n<h2 id=\"c7\">C.7 数据管理</h2>\n<p><strong>功能入口</strong>：Comate Studio → 数据</p>\n<p>数据管理分两大模块：数据资产（接入与治理）和语义模型（业务建模）。</p>\n<p><strong>数据资产三视图</strong>：</p>\n<table>\n<thead>\n<tr>\n<th>Tab</th>\n<th>功能</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>数据连接</td>\n<td>管理数据源（Excel、Kafka、数据库等）</td>\n</tr>\n<tr>\n<td>数据管道</td>\n<td>拖拽式可视化 ETL 编辑器，无需写代码</td>\n</tr>\n<tr>\n<td>数据集管理</td>\n<td>管理物理表（Doris BASE TABLE）和数据集视图（SQL 虚拟视图）</td>\n</tr>\n</tbody>\n</table>\n<p><strong>数据管道创建步骤</strong>：</p>\n<ol>\n<li>新建管道 → 填写名称</li>\n<li>从左栏拖拽数据源到画布作为输入节点</li>\n<li>拖拽转换算子（Rename/Select/Filter/Join/Aggregate/Sort）→ 连线建立数据流</li>\n<li>保存 → 点击运行 → Console 面板查看日志</li>\n</ol>\n<p><strong>语义模型六大能力模块</strong>：</p>\n<table>\n<thead>\n<tr>\n<th>模块</th>\n<th>说明</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>对象建模</td>\n<td>定义业务实体与 Schema</td>\n</tr>\n<tr>\n<td>关系建模</td>\n<td>定义对象间关联与 JOIN 条件</td>\n</tr>\n<tr>\n<td>规则属性</td>\n<td>SQL/Cypher/Function 衍生字段</td>\n</tr>\n<tr>\n<td>指标构建</td>\n<td>聚合度量（SUM/COUNT/AVG 等）+ 维度定义</td>\n</tr>\n<tr>\n<td>逻辑编排</td>\n<td>WHEN/IF/THEN 条件逻辑</td>\n</tr>\n<tr>\n<td>动作中心</td>\n<td>通知、事件、写回</td>\n</tr>\n</tbody>\n</table>\n<p><strong>语义模型发布</strong>：配置完成后点击「发布新版本」，下游应用（专家、大模型）即可调用。发布后编辑进入新草稿，需再次发布。历史版本可回溯。</p>\n<h2 id=\"c8\">C.8 渠道管理</h2>\n<p><strong>配置入口</strong>：Comate Studio → 平台管理 → 功能管理 → 渠道配置</p>\n<p>可选渠道：WPS 协作、企业微信、飞书、钉钉。WPS 协作与企业微信在云端托管维度互斥，不可同时启用。</p>\n<p><img alt=\"渠道配置入口\" src=\"img/附录/附录_C_管理员操作指南/img_088.png\" /></p>\n<p><strong>管理员与成员分工</strong>：</p>\n<table>\n<thead>\n<tr>\n<th>事项</th>\n<th>管理员</th>\n<th>成员</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>Studio 渠道凭证与回调</td>\n<td>✓</td>\n<td>—</td>\n</tr>\n<tr>\n<td>飞书/企微平台侧应用配置</td>\n<td>✓</td>\n<td>企微长连接、客户端频道</td>\n</tr>\n<tr>\n<td>成员 Comate 权益</td>\n<td>✓</td>\n<td>—</td>\n</tr>\n<tr>\n<td>个人 OAuth/机器人授权</td>\n<td>—</td>\n<td>✓</td>\n</tr>\n</tbody>\n</table>\n<h3 id=\"_1\">飞书渠道配置</h3>\n<p><strong>第 1 步：Studio 配置</strong></p>\n<p>启用飞书开关，从飞书开放平台复制凭证填入 Studio。</p>\n<p><img alt=\"飞书渠道Studio配置\" src=\"img/附录/附录_C_管理员操作指南/img_089.png\" /></p>\n<table>\n<thead>\n<tr>\n<th>Studio 字段</th>\n<th>飞书获取路径</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>AppID / AppSecret</td>\n<td>飞书开放平台 → 凭证与基础信息</td>\n</tr>\n<tr>\n<td>Verification Token / Encrypt Key</td>\n<td>事件与回调 → 加密策略</td>\n</tr>\n</tbody>\n</table>\n<p>复制面板底部回调地址（固定格式）：</p>\n<pre class=\"codehilite\"><code>https://open.wps.cn/osh/api/v2/comate/channel/callback/feishu/{tenantId}\n</code></pre>\n\n<p><img alt=\"飞书渠道回调配置\" src=\"img/附录/附录_C_管理员操作指南/img_090.png\" /></p>\n<p><strong>第 2 步：飞书开放平台配置</strong></p>\n<ul>\n<li>事件回调：开发配置 → 事件与回调 → 事件配置 → 粘贴回调 URL → 保存并验证 → 订阅所需事件</li>\n</ul>\n<p><img alt=\"飞书事件回调配置\" src=\"img/附录/附录_C_管理员操作指南/img_091.png\" /></p>\n<ul>\n<li>OAuth 重定向：安全设置 → 重定向 URL，添加 <code>https://open.wps.cn/osh/api/v1/oauth/callback</code></li>\n</ul>\n<p><img alt=\"飞书OAuth重定向\" src=\"img/附录/附录_C_管理员操作指南/img_092.png\" /></p>\n<p><strong>第 3 步：成员配置</strong></p>\n<ul>\n<li>Comate 客户端 → 设置 → 频道 → 飞书 → 开启并完成 OAuth 授权</li>\n</ul>\n<p><img alt=\"飞书成员频道配置\" src=\"img/附录/附录_C_管理员操作指南/img_093.png\" /></p>\n<p><img alt=\"飞书成员OAuth授权\" src=\"img/附录/附录_C_管理员操作指南/img_094.png\" /></p>\n<h3 id=\"_2\">企业微信渠道配置</h3>\n<p><strong>第 1 步：Studio 配置</strong></p>\n<p>启用企业微信开关，填写凭证。</p>\n<p><img alt=\"企微Studio配置\" src=\"img/附录/附录_C_管理员操作指南/img_095.png\" /></p>\n<table>\n<thead>\n<tr>\n<th>Studio 字段</th>\n<th>来源</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>Corp ID</td>\n<td>企微管理后台 → 我的企业</td>\n</tr>\n<tr>\n<td>Token / Encoding-AESKey</td>\n<td>企微智能机器人 URL 回调页随机获取</td>\n</tr>\n<tr>\n<td>Bot ID</td>\n<td>成员长连接配置后回填</td>\n</tr>\n</tbody>\n</table>\n<p>回调地址：</p>\n<pre class=\"codehilite\"><code>https://open.wps.cn/osh/api/v2/comate/channel/callback/wecom/{tenantId}\n</code></pre>\n\n<p><img alt=\"企微回调配置\" src=\"img/附录/附录_C_管理员操作指南/img_096.png\" /></p>\n<p><strong>第 2 步：企微智能机器人配置（URL 回调）</strong></p>\n<p>企微客户端 → 工作台 → 智能机器人 → 创建智能机器人 → API 配置选择「使用 URL 回调」：</p>\n<ol>\n<li>URL：粘贴 Studio 回调地址</li>\n<li>Token / EncodingAESKey：随机获取后回填 Studio</li>\n<li>配置可使用的成员，保存并等待验证</li>\n</ol>\n<p><img alt=\"企微智能机器人配置\" src=\"img/附录/附录_C_管理员操作指南/img_097.png\" /></p>\n<p><img alt=\"企微URL回调配置\" src=\"img/附录/附录_C_管理员操作指南/img_098.png\" /></p>\n<blockquote>\n<p>Token / EncodingAESKey 必须在企微侧生成，不可在 Studio 自行编造。</p>\n</blockquote>\n<p><strong>第 3 步：成员配置</strong></p>\n<p><img alt=\"企微成员长连接配置\" src=\"img/附录/附录_C_管理员操作指南/img_099.png\" /></p>\n<p><img alt=\"企微成员客户端频道\" src=\"img/附录/附录_C_管理员操作指南/img_100.png\" /></p>\n<table>\n<thead>\n<tr>\n<th>成员操作</th>\n<th>说明</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>可使用权限授权</td>\n<td>智能机器人 → 编辑 → 可使用权限 → 授权</td>\n</tr>\n<tr>\n<td>配置长连接</td>\n<td>API 配置 → 使用长连接 → 复制 Bot ID + Secret</td>\n</tr>\n<tr>\n<td>客户端频道</td>\n<td>设置 → 频道 → 企业微信 → 填写 Bot ID 与 Key</td>\n</tr>\n<tr>\n<td>Bot ID 回填</td>\n<td>将长连接 Bot ID 告知管理员补填 Studio</td>\n</tr>\n</tbody>\n</table>\n<blockquote>\n<p>企微同一机器人须同时配置 URL 回调（管理员）与长连接（成员），二者不冲突。</p>\n</blockquote>\n<h3 id=\"_3\">管理员检查清单</h3>\n<p><strong>飞书</strong>：</p>\n<ul>\n<li>☐ Studio 已填 AppID、AppSecret、Verification Token（及 Encrypt Key）</li>\n<li>☐ 飞书事件请求地址与 Studio 回调 URL 一致，验证通过</li>\n<li>☐ 飞书安全设置已添加 OAuth 重定向 URL</li>\n<li>☐ 已通知成员完成客户端飞书 OAuth</li>\n</ul>\n<p><strong>企业微信</strong>：</p>\n<ul>\n<li>☐ 未占用 WPS 协作云端托管（或已从协作切换）</li>\n<li>☐ Studio 已填 Corp ID、Token、Encoding-AESKey；Bot ID 已随成员长连接补填</li>\n<li>☐ 企微 URL 回调验证通过；可见范围已覆盖目标成员</li>\n<li>☐ 已通知成员：可使用权限 + 长连接 + 客户端频道</li>\n</ul>\n<p><strong>渠道常见问题</strong>：</p>\n<table>\n<thead>\n<tr>\n<th>现象</th>\n<th>处理</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>飞书回调验证失败</td>\n<td>核对 Verification Token；回调 URL 无多余空格</td>\n</tr>\n<tr>\n<td>飞书 OAuth redirect_uri 不匹配</td>\n<td>安全设置 URL 须与 <code>https://open.wps.cn/osh/api/v1/oauth/callback</code> 完全一致</td>\n</tr>\n<tr>\n<td>企微 URL 保存失败</td>\n<td>确认回调 URL 一致；Token/AESKey 在企微随机获取后回填</td>\n</tr>\n<tr>\n<td>Studio 渠道未连接（企微）</td>\n<td>确认 URL 回调与长连接均已配置；勿将 Secret 误填为 Token</td>\n</tr>\n<tr>\n<td>提示已配置协作无法配企微</td>\n<td>关闭 Studio 中 WPS 协作云端渠道后重试</td>\n</tr>\n</tbody>\n</table>\n<h2 id=\"c9\">C.9 运营统计</h2>\n<p><strong>功能入口</strong>：Comate Studio → 概况</p>\n<p>看板聚合专家、技能、数据、连接、应用五大核心资产的规模与活跃度，支持近 7 天/近 30 天/近 90 天/自定义时间筛选，可导出报表。</p>\n<p><strong>各 Tab 核心指标</strong>：</p>\n<table>\n<thead>\n<tr>\n<th>Tab</th>\n<th>核心指标</th>\n<th>排行榜单</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>专家</td>\n<td>已发布专家数、活跃专家数、调用次数、活跃用户数</td>\n<td>专家活跃用户 Top 5、调用次数 Top 5</td>\n</tr>\n<tr>\n<td>技能</td>\n<td>已上架技能、活跃作者</td>\n<td>安装量/收藏/贡献/团队使用 Top 8</td>\n</tr>\n<tr>\n<td>数据</td>\n<td>数据空间、连接、管道成功率、数据集、语义模型、本体对象、指标</td>\n<td>失效管道 Top 5、最活跃数据集 Top 10</td>\n</tr>\n<tr>\n<td>连接</td>\n<td>连接模版、凭证、连接器、API 数量</td>\n<td>连接器调用 Top 5、连接模版 Top 5</td>\n</tr>\n<tr>\n<td>应用</td>\n<td>应用总数、已发布、访问总量、访问用户数</td>\n<td>应用访问量 Top 5、访问用户 Top 5</td>\n</tr>\n</tbody>\n</table>\n<blockquote>\n<p>注意：「数据」Tab 中若指标显示为 0，表示尚未建模，需先在语义模型模块完成配置。导出报表按当前 Tab 与时间范围导出，跨 Tab 需分别导出。</p>\n</blockquote>\n<h2 id=\"c10\">C.10 管理员快速上手清单</h2>\n<h3 id=\"_4\">首次配置清单（从零到可用）</h3>\n<table>\n<thead>\n<tr>\n<th>序号</th>\n<th>操作</th>\n<th>入口</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>1</td>\n<td>完成企业认证</td>\n<td>WPS 365 企业管理后台</td>\n</tr>\n<tr>\n<td>2</td>\n<td>上架模型（参考推荐清单）</td>\n<td>AI Hub → 模型管理</td>\n</tr>\n<tr>\n<td>3</td>\n<td>配置模型策略（普通任务/应用任务/专家/系统调用）</td>\n<td>AI Hub → 模型策略</td>\n</tr>\n<tr>\n<td>4</td>\n<td>配置 AI 额度规则（默认+自定义）</td>\n<td>AI Hub → 额度管理</td>\n</tr>\n<tr>\n<td>5</td>\n<td>分配角色与权限</td>\n<td>Comate Studio → 角色管理/用户管理</td>\n</tr>\n<tr>\n<td>6</td>\n<td>创建专家并发布审批</td>\n<td>Comate Studio → 专家管理</td>\n</tr>\n<tr>\n<td>7</td>\n<td>配置渠道（飞书/企微/协作）</td>\n<td>Comate Studio → 渠道配置</td>\n</tr>\n<tr>\n<td>8</td>\n<td>通知成员完成个人配置</td>\n<td>客户端频道/OAuth</td>\n</tr>\n</tbody>\n</table>\n<h3 id=\"_5\">日常运营清单</h3>\n<table>\n<thead>\n<tr>\n<th>周期</th>\n<th>巡检项</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>每日</td>\n<td>概况看板查看调用量与活跃度；关注异常数据</td>\n</tr>\n<tr>\n<td>每周</td>\n<td>专家调用趋势；技能安装与使用排行；渠道连接状态</td>\n</tr>\n<tr>\n<td>每月</td>\n<td>AI 额度消耗复盘；模型策略调整；运营报表导出存档；失效管道清理</td>\n</tr>\n</tbody>\n</table>\n<h3 id=\"_6\">常见问题与处理</h3>\n<table>\n<thead>\n<tr>\n<th>问题</th>\n<th>处理方法</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>用户无法使用 AI 功能</td>\n<td>检查模型策略是否配置可用模型；检查额度规则是否限制</td>\n</tr>\n<tr>\n<td>专家调用报错</td>\n<td>检查驱动模型是否上架；检查专家能力中的连接器凭证</td>\n</tr>\n<tr>\n<td>系统调用功能异常</td>\n<td>确认模型策略中「系统调用」已配置可用模型和额度</td>\n</tr>\n<tr>\n<td>数据 Tab 指标为 0</td>\n<td>先在语义模型模块完成对象建模和指标构建</td>\n</tr>\n<tr>\n<td>渠道连接失败</td>\n<td>对照管理员检查清单逐项排查</td>\n</tr>\n<tr>\n<td>Token 配额用尽</td>\n<td>在 AI Hub 配额管控中调整配额或切换模型通道</td>\n</tr>\n</tbody>\n</table>", "part": "附录", "prev": "附录_B_场景速查表", "next": null}};

let currentPageId = null;
let pageOrder = [];

// Build page order from nav tree
function buildPageOrder() {
  pageOrder = [];
  for (const part of NAV_TREE) {
    if (part.children) {
      for (const ch of part.children) {
        pageOrder.push(ch.id);
      }
    }
  }
}

// Render navigation tree
function renderNav() {
  const container = document.getElementById('nav-tree');
  container.innerHTML = '';
  let firstPart = true;

  for (const part of NAV_TREE) {
    const partDiv = document.createElement('div');
    partDiv.className = 'nav-part' + (firstPart ? '' : ' collapsed');
    firstPart = false;

    const titleDiv = document.createElement('div');
    titleDiv.className = 'nav-part-title';
    titleDiv.innerHTML = '<span class="toggle">&#9660;</span> ' + part.title;
    titleDiv.onclick = function() {
      partDiv.classList.toggle('collapsed');
    };

    const childrenDiv = document.createElement('div');
    childrenDiv.className = 'nav-children';

    if (part.children) {
      for (const ch of part.children) {
        const chDiv = document.createElement('div');
        chDiv.className = 'nav-chapter';
        chDiv.textContent = ch.title;
        chDiv.dataset.id = ch.id;
        chDiv.onclick = function() {
          loadPage(ch.id);
        };
        childrenDiv.appendChild(chDiv);
      }
    }

    partDiv.appendChild(titleDiv);
    partDiv.appendChild(childrenDiv);
    container.appendChild(partDiv);
  }
}

// Load a page
function loadPage(pageId) {
  if (!CONTENT[pageId]) return;

  currentPageId = pageId;
  const data = CONTENT[pageId];
  const contentDiv = document.getElementById('content');

  let html = '';
  if (data.is_cover) {
    html = '<div style="text-align:center;padding:60px 0;">' + data.html + '</div>';
  } else {
    html = '<h1>' + data.title + '</h1>' + data.html;
  }
  contentDiv.innerHTML = html;

  // Update active nav item
  document.querySelectorAll('.nav-chapter').forEach(el => {
    el.classList.toggle('active', el.dataset.id === pageId);
  });

  // Expand the part containing this page
  document.querySelectorAll('.nav-part').forEach(partDiv => {
    const chapters = partDiv.querySelectorAll('.nav-chapter');
    let found = false;
    chapters.forEach(ch => {
      if (ch.dataset.id === pageId) found = true;
    });
    if (found) {
      partDiv.classList.remove('collapsed');
    }
  });

  // Update prev/next buttons
  const idx = pageOrder.indexOf(pageId);
  document.getElementById('prev-btn').disabled = idx <= 0;
  document.getElementById('next-btn').disabled = idx >= pageOrder.length - 1;

  // Scroll to top
  window.scrollTo(0, 0);
}

function goPrev() {
  const idx = pageOrder.indexOf(currentPageId);
  if (idx > 0) loadPage(pageOrder[idx - 1]);
}

function goNext() {
  const idx = pageOrder.indexOf(currentPageId);
  if (idx < pageOrder.length - 1) loadPage(pageOrder[idx + 1]);
}

// Search
document.getElementById('search').addEventListener('input', function(e) {
  const query = e.target.value.toLowerCase().trim();
  document.querySelectorAll('.nav-chapter').forEach(el => {
    if (!query) {
      el.style.display = '';
      return;
    }
    const text = el.textContent.toLowerCase();
    el.style.display = text.includes(query) ? '' : 'none';
  });

  // Expand all parts when searching
  if (query) {
    document.querySelectorAll('.nav-part').forEach(p => p.classList.remove('collapsed'));
  }
});

// Back to top
window.addEventListener('scroll', function() {
  const btn = document.getElementById('back-to-top');
  btn.classList.toggle('visible', window.scrollY > 400);
});

function scrollTop() {
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// Keyboard navigation
document.addEventListener('keydown', function(e) {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowLeft') goPrev();
  if (e.key === 'ArrowRight') goNext();
});

// Mobile toggle
document.getElementById('mobile-toggle').addEventListener('click', function() {
  document.getElementById('sidebar').classList.toggle('open');
});

// Init
buildPageOrder();
renderNav();
// Load first page
if (pageOrder.length > 0) {
  loadPage(pageOrder[0]);
}
</script>
