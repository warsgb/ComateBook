<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WPS Comate 红宝书</title>
<style>
:root {
  --sidebar-width: 320px;
  --bg: #ffffff;
  --fg: #1a1a2e;
  --fg-light: #555;
  --sidebar-bg: #f7f8fa;
  --sidebar-hover: #e8eaf0;
  --sidebar-active: #fbe9e7;
  --accent: #c0392b;
  --accent-light: #e74c3c;
  --border: #e2e8f0;
  --code-bg: #f4f4f7;
  --shadow: 0 2px 8px rgba(0,0,0,0.08);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--fg);
  line-height: 1.8;
  -webkit-font-smoothing: antialiased;
}

/* Layout */
#app {
  display: flex;
  min-height: 100vh;
}

/* Sidebar */
#sidebar {
  width: var(--sidebar-width);
  background: var(--sidebar-bg);
  border-right: 1px solid var(--border);
  position: fixed;
  top: 0;
  left: 0;
  bottom: 0;
  overflow-y: auto;
  z-index: 100;
  transition: transform 0.3s ease;
}

#sidebar::-webkit-scrollbar { width: 6px; }
#sidebar::-webkit-scrollbar-track { background: transparent; }
#sidebar::-webkit-scrollbar-thumb { background: #cbd5e0; border-radius: 3px; }

.sidebar-header {
  padding: 20px 16px 16px;
  border-bottom: 1px solid var(--border);
}

.sidebar-header h1 {
  font-size: 18px;
  font-weight: 700;
  color: var(--fg);
  margin-bottom: 4px;
}

.sidebar-header .subtitle {
  font-size: 12px;
  color: var(--fg-light);
}

.search-box {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
}

.search-box input {
  width: 100%;
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 13px;
  outline: none;
  transition: border-color 0.2s;
}

.search-box input:focus {
  border-color: var(--accent-light);
}

/* Navigation tree */
.nav-tree {
  padding: 8px 0;
}

.nav-part {
  margin-bottom: 4px;
}

.nav-part-title {
  padding: 10px 16px 6px;
  font-size: 13px;
  font-weight: 600;
  color: var(--fg-light);
  cursor: pointer;
  user-select: none;
  display: flex;
  align-items: center;
  gap: 6px;
}

.nav-part-title:hover {
  color: var(--accent);
}

.nav-part-title .toggle {
  font-size: 10px;
  transition: transform 0.2s;
  display: inline-block;
}

.nav-part.collapsed .toggle {
  transform: rotate(-90deg);
}

.nav-part.collapsed .nav-children {
  display: none;
}

.nav-children {
  padding: 0 0 4px 0;
}

.nav-chapter {
  padding: 6px 16px 6px 32px;
  font-size: 13px;
  color: var(--fg);
  cursor: pointer;
  transition: background 0.15s;
  border-left: 3px solid transparent;
}

.nav-chapter:hover {
  background: var(--sidebar-hover);
}

.nav-chapter.active {
  background: var(--sidebar-active);
  border-left-color: var(--accent);
  color: var(--accent);
  font-weight: 500;
}

/* Main content */
#main {
  flex: 1;
  margin-left: var(--sidebar-width);
  padding: 40px 60px 80px;
  max-width: 900px;
  min-width: 0;
}

.content-wrapper {
  max-width: 780px;
  margin: 0 auto;
}

/* Typography */
h1, h2, h3, h4, h5, h6 {
  margin-top: 1.5em;
  margin-bottom: 0.6em;
  font-weight: 700;
  line-height: 1.3;
}

h1 {
  font-size: 28px;
  border-bottom: 2px solid var(--border);
  padding-bottom: 12px;
  margin-top: 0;
}

h2 {
  font-size: 22px;
  color: var(--fg);
  border-bottom: 1px solid var(--border);
  padding-bottom: 8px;
}

h3 {
  font-size: 18px;
}

h4 {
  font-size: 16px;
}

p {
  margin-bottom: 1em;
}

a {
  color: var(--accent);
  text-decoration: none;
}

a:hover {
  text-decoration: underline;
}

strong {
  font-weight: 700;
}

blockquote {
  border-left: 4px solid var(--accent-light);
  padding: 8px 16px;
  margin: 1em 0;
  background: #fff5f5;
  color: var(--fg);
  border-radius: 0 4px 4px 0;
}

blockquote p {
  margin-bottom: 0;
}

/* Tables */
table {
  width: 100%;
  border-collapse: collapse;
  margin: 1em 0;
  font-size: 14px;
}

th, td {
  padding: 10px 14px;
  border: 1px solid var(--border);
  text-align: left;
}

th {
  background: var(--sidebar-bg);
  font-weight: 600;
}

tr:nth-child(even) {
  background: #fafbfc;
}

/* Code */
code {
  font-family: "SF Mono", "Fira Code", "JetBrains Mono", Consolas, monospace;
  background: var(--code-bg);
  padding: 2px 6px;
  border-radius: 3px;
  font-size: 0.9em;
}

pre {
  background: #2d2d2d;
  color: #f8f8f2;
  padding: 16px 20px;
  border-radius: 8px;
  overflow-x: auto;
  margin: 1em 0;
  font-size: 13px;
  line-height: 1.5;
}

pre code {
  background: transparent;
  padding: 0;
  color: inherit;
  font-size: inherit;
}

/* Images */
img {
  max-width: 100%;
  height: auto;
  border-radius: 8px;
  box-shadow: var(--shadow);
  margin: 1em 0;
  display: block;
}

/* HR */
hr {
  border: none;
  border-top: 1px solid var(--border);
  margin: 2em 0;
}

/* Lists */
ul, ol {
  padding-left: 1.8em;
  margin-bottom: 1em;
}

li {
  margin-bottom: 0.3em;
}

/* Navigation footer */
.nav-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 48px;
  padding-top: 20px;
  border-top: 1px solid var(--border);
}

.nav-footer button {
  padding: 8px 20px;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--fg);
  border-radius: 6px;
  cursor: pointer;
  font-size: 14px;
  transition: all 0.2s;
}

.nav-footer button:hover {
  background: var(--sidebar-hover);
  border-color: var(--accent-light);
}

.nav-footer button:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

/* Back to top */
#back-to-top {
  position: fixed;
  bottom: 30px;
  right: 30px;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: var(--accent);
  color: white;
  border: none;
  cursor: pointer;
  font-size: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.3s;
  z-index: 99;
  box-shadow: var(--shadow);
}

#back-to-top.visible {
  opacity: 1;
}

#back-to-top:hover {
  background: var(--accent-light);
}

/* Mobile */
#mobile-toggle {
  display: none;
  position: fixed;
  top: 12px;
  left: 12px;
  z-index: 101;
  background: var(--accent);
  color: white;
  border: none;
  width: 40px;
  height: 40px;
  border-radius: 6px;
  font-size: 20px;
  cursor: pointer;
  box-shadow: var(--shadow);
}

@media (max-width: 768px) {
  #sidebar {
    transform: translateX(-100%);
  }

  #sidebar.open {
    transform: translateX(0);
  }

  #main {
    margin-left: 0;
    padding: 60px 20px 60px;
  }

  #mobile-toggle {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .content-wrapper {
    max-width: 100%;
  }
}
</style>

const CONTENT = {"cover": {"title": "封面", "html": "<hr />\n<p>title: WPS Comate 使用手册与场景指南｜31 章完整目录<br />\ntitleTemplate: false<br />\ndescription: WPS Comate 中文使用手册与场景指南，共 31 章，涵盖安装入门、真实场景、技能、专家、连接器、自动化、数据治理与岗位落地。<br />\nbreadcrumbTitle: WPS Comate 红宝书</p>\n<hr />\n<h1 id=\"wps-comate\">WPS Comate 使用手册与场景指南</h1>\n<p><strong>31 章完整目录：从安装入门到组织级 AI 协同</strong></p>\n<p>这是一本以真实办公场景为主线的 WPS Comate 中文使用手册。你可以从下载安装和第一个任务开始，再进入技能、专家、连接器、团队空间、自动化、知识管理，最终把一次成功沉淀为组织可复用的 AI 工作系统。</p>\n<p>WPS Comate 是金山办公推出的企业级人机协同平台。它不是一个孤立的 AI 聊天工具，而是把 AI 深度嵌入企业办公环境，让文档、会议、聊天、应用、知识与团队协作真正串联起来，成为组织智能运行的统一底座。</p>\n<h2 id=\"_1\">章节目录</h2>\n<ul>\n<li><a href=\"%E7%AC%AC%E4%B8%80%E7%AF%87%20%E4%BD%BF%E7%94%A8%E6%89%8B%E5%86%8C%EF%BC%9A%E5%85%88%E6%8A%8A%20WPS%20Comate%20%E7%94%A8%E8%B5%B7%E6%9D%A5/index.md\">第一篇 使用手册：先把 WPS Comate 用起来</a></li>\n<li><a href=\"%E7%AC%AC%E4%BA%8C%E7%AF%87%20%E5%9C%BA%E6%99%AF%E7%AF%87%EF%BC%9A%E4%BB%8E%E4%B8%80%E9%A1%B9%E4%BB%BB%E5%8A%A1%E5%88%B0%E7%BB%84%E7%BB%87%E7%BA%A7%20AI%20%E5%8D%8F%E5%90%8C/index.md\">第二篇 场景篇：从一项任务到组织级 AI 协同</a></li>\n<li><a href=\"%E7%AC%AC%E4%B8%89%E7%AF%87%20%E8%BF%9B%E9%98%B6%E7%AF%87%EF%BC%9A%E6%8A%8A%E5%9C%BA%E6%99%AF%E5%8F%98%E6%88%90%E8%87%AA%E5%B7%B1%E7%9A%84%E5%B7%A5%E4%BD%9C%E7%B3%BB%E7%BB%9F/index.md\">第三篇 进阶篇：把场景变成自己的工作系统</a></li>\n<li><a href=\"%E7%AC%AC%E5%9B%9B%E7%AF%87%20%E5%B2%97%E4%BD%8D%E4%B8%8E%E8%A1%8C%E4%B8%9A%E8%90%BD%E5%9C%B0/index.md\">第四篇 岗位与行业落地</a></li>\n<li><a href=\"%E9%99%84%E5%BD%95/index.md\">附录</a></li>\n<li><a href=\"%E9%99%84%E5%BD%95%20A%20%E5%B8%B8%E7%94%A8%E6%8C%87%E4%BB%A4%E6%A8%A1%E6%9D%BF/index.md\">附录 A 常用指令模板</a></li>\n<li><a href=\"%E9%99%84%E5%BD%95%20B%20%E5%9C%BA%E6%99%AF%E9%80%9F%E6%9F%A5%E8%A1%A8/index.md\">附录 B 场景速查表</a></li>\n<li><a href=\"%E9%99%84%E5%BD%95%20C%20%E7%AE%A1%E7%90%86%E5%91%98%E6%93%8D%E4%BD%9C%E6%8C%87%E5%8D%97/index.md\">附录 C 管理员操作指南</a></li>\n</ul>", "part": "封面", "is_cover": true, "prev": null, "next": "第_1_章_初识_WPS_Comate"}, "第_1_章_初识_WPS_Comate": {"title": "第 1 章 初识 WPS Comate", "html": "<h2 id=\"_1\">它是什么</h2>\n<p>WPS Comate 是金山办公推出的企业级人机协同平台。不是又一个聊天机器人，也不是一个套壳的 AI 对话框——它是一套能真正帮你干活的系统。</p>\n<p>你可以把它理解为：<strong>一个能读你的业务数据、能调用大模型思考、能操作外部系统执行任务、还有权限边界的 AI 同事</strong>。</p>\n<p><img alt=\"WPS Comate 产品封面\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_1_章_初识_WPS_Comate/001_comate_cover.png\" /></p>\n<p>普通 AI 工具的问题是：你问它一句，它答一句，答完就结束了。你还得自己复制粘贴、手动执行。WPS Comate 不一样——你给它一个任务，它自己拆解步骤、调用工具、执行操作、返回结果。你从\"操作员\"变成了\"审核员\"。</p>\n<h2 id=\"_2\">四大中枢</h2>\n<p>WPS Comate 的能力由四大中枢构成。这四个中枢不是噱头概念，它们各自对应你能感知到的具体功能。</p>\n<p><img alt=\"四大中枢架构\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_1_章_初识_WPS_Comate/003_four_hubs.png\" /></p>\n<h3 id=\"datahub\">DataHub——有脑子·懂业务</h3>\n<p>DataHub 解决的是\"AI 不知道你的业务\"的问题。</p>\n<p>普通 AI 工具不知道你公司的数据在哪、格式是什么、哪些能看哪些不能看。DataHub 把你的企业数据（文档、表格、数据库、知识库）接入进来，让 AI 在回答问题、执行任务时能引用你的真实业务数据。</p>\n<p><strong>你能感知到的变化</strong>：问\"上季度华南区销售额是多少\"，它能直接查到数据并回答，而不是泛泛而谈。</p>\n<h3 id=\"aihub\">AIHub——会思考·管模型</h3>\n<p>AIHub 是 AI 的调度中心。它管理多个大语言模型，根据任务类型自动选择最合适的模型。</p>\n<p>你不需要操心\"该用哪个模型\"——写代码的活派给擅长代码的模型，写文案的活派给擅长文案的模型，需要推理的活派给推理能力强的模型。AIHub 帮你做调度。</p>\n<p><strong>你能感知到的变化</strong>：同一个任务，出来的结果质量比单模型稳定得多。</p>\n<h3 id=\"apihub\">APIHub——有手·能做事</h3>\n<p>APIHub 是 WPS Comate 和外部系统之间的桥梁。通过技能（Skill）体系，AI 可以调用各种 API 和工具——发邮件、操作表格、查数据库、调外部系统接口。</p>\n<p>普通 AI 工具只会\"说\"，WPS Comate 会\"做\"。</p>\n<p><strong>你能感知到的变化</strong>：你说\"把这个月的销售数据整理成表格发到群里\"，它真的能做。</p>\n<h3 id=\"trusthub\">TrustHub——有边界·不越权</h3>\n<p>TrustHub 是权限和安全中枢。它管三件事：</p>\n<ul>\n<li><strong>谁能做什么</strong>：不同角色有不同的操作权限</li>\n<li><strong>数据不能乱跑</strong>：敏感数据不会被 AI 随意输出到不该看的地方</li>\n<li><strong>操作要有审批</strong>：关键操作需要人确认后才执行</li>\n</ul>\n<p><strong>你能感知到的变化</strong>：你让它删一批数据，它会先问你\"确定要删吗\"，而不是直接删了。</p>\n<h2 id=\"_3\">端云双引擎</h2>\n<p>WPS Comate 采用端云双引擎架构——本地引擎和云端引擎协同工作。</p>\n<p><img alt=\"端云双引擎架构\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_1_章_初识_WPS_Comate/004_dual_engine.png\" /></p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>本地引擎</th>\n<th>云端引擎</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>运行位置</td>\n<td>你的设备上</td>\n<td>金山云服务器</td>\n</tr>\n<tr>\n<td>数据处理</td>\n<td>敏感数据不出本地</td>\n<td>大规模计算走云端</td>\n</tr>\n<tr>\n<td>响应速度</td>\n<td>本地操作秒级响应</td>\n<td>需要网络传输</td>\n</tr>\n<tr>\n<td>适用场景</td>\n<td>文档操作、本地文件处理</td>\n<td>复杂推理、大数据分析</td>\n</tr>\n<tr>\n<td>安全性</td>\n<td>数据完全在本地</td>\n<td>企业级云安全防护</td>\n</tr>\n</tbody>\n</table>\n<p>这套架构的好处是：<strong>该快的快，该安全的 safe</strong>。本地的活本地干，不用上传；需要大算力的活云端干，不占本地资源。</p>\n<h2 id=\"ai\">AI 办公的三个阶段</h2>\n<p>要理解 WPS Comate 的定位，得先看 AI 办公的演进路线。</p>\n<h3 id=\"10\">1.0 对话时代</h3>\n<p>代表产品：各种 AI 聊天机器人。</p>\n<p>特征：你问一句，AI 答一句。答案在聊天框里，你得自己拿去用。</p>\n<p>问题：<strong>AI 只动嘴，不动手</strong>。它告诉你怎么写邮件，但邮件还得你自己打开客户端、自己粘贴、自己发送。</p>\n<h3 id=\"20\">2.0 任务时代</h3>\n<p>代表产品：早期的 AI Agent 工具。</p>\n<p>特征：AI 能执行多步骤任务，会调用工具。</p>\n<p>问题：<strong>任务能做，但不够好</strong>。要么不够稳定（步骤容易出错），要么不够安全（没有权限管控），要么不够懂业务（不知道你的数据在哪）。</p>\n<h3 id=\"30\">3.0 协同时代</h3>\n<p>代表产品：WPS Comate。</p>\n<p>特征：AI 不只是执行任务，而是<strong>与你在同一个工作流中协同</strong>。它懂你的业务数据、能操作你的办公工具、有明确的权限边界、能端云协同工作。</p>\n<table>\n<thead>\n<tr>\n<th>阶段</th>\n<th>核心能力</th>\n<th>你扮演的角色</th>\n<th>AI 扮演的角色</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>1.0 对话</td>\n<td>回答问题</td>\n<td>操作员</td>\n<td>顾问</td>\n</tr>\n<tr>\n<td>2.0 任务</td>\n<td>执行多步任务</td>\n<td>监督员</td>\n<td>执行者</td>\n</tr>\n<tr>\n<td>3.0 协同</td>\n<td>数据感知 + 工具调用 + 权限管控</td>\n<td>决策者</td>\n<td>协同者</td>\n</tr>\n</tbody>\n</table>\n<h2 id=\"_4\">整体架构一览</h2>\n<p>把四大中枢和端云双引擎放在一起看，WPS Comate 的整体架构如下图：</p>\n<p><img alt=\"整体架构\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_1_章_初识_WPS_Comate/002_architecture.png\" /></p>\n<p>自下而上看：</p>\n<ol>\n<li><strong>数据层</strong>：DataHub 接入企业数据源</li>\n<li><strong>模型层</strong>：AIHub 调度大语言模型</li>\n<li><strong>工具层</strong>：APIHub 通过技能体系连接外部系统</li>\n<li><strong>安全层</strong>：TrustHub 贯穿所有层级，管控权限和数据安全</li>\n<li><strong>交互层</strong>：你在 WPS Comate 界面上与这套系统交互</li>\n</ol>\n<h2 id=\"wps-comate\">WPS Comate 主界面一览</h2>\n<p>打开 WPS Comate 后，你会看到这样的界面：</p>\n<p><img alt=\"WPS Comate 主界面\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_1_章_初识_WPS_Comate/005_homepage.png\" /></p>\n<p>界面的核心区域：</p>\n<ul>\n<li><strong>对话区</strong>：你与 AI 交互的主区域，可以发消息、交代任务</li>\n<li><strong>任务区</strong>：AI 正在执行的任务列表，你可以查看进度、审核结果</li>\n<li><strong>技能区</strong>：已安装的技能列表，点击可以使用</li>\n<li><strong>设置区</strong>：权限配置、数据源接入、模型偏好等设置</li>\n</ul>\n<p>这些区域的具体操作，我们在后续章节会详细展开。</p>\n<h2 id=\"_5\">它适合谁用</h2>\n<p>WPS Comate 适合这几类人：</p>\n<ul>\n<li><strong>每天处理大量文档的办公族</strong>：让 AI 帮你起草、整理、格式化文档</li>\n<li><strong>需要跨系统操作的团队</strong>：让 AI 帮你在不同系统间传递数据、执行操作</li>\n<li><strong>对数据安全有要求的企业用户</strong>：TrustHub 提供权限管控，不用担心 AI 越权</li>\n<li><strong>想用 AI 但不想学 prompt 工程的人</strong>：直接说人话，AI 自己理解和执行</li>\n</ul>\n<h2 id=\"_6\">它不适合什么场景</h2>\n<p>直说几个不适合的：</p>\n<ul>\n<li><strong>纯闲聊</strong>：WPS Comate 不是聊天机器人，它设计来干活的</li>\n<li><strong>零配置即用</strong>：需要接入数据源、配置技能才能发挥最大价值，不是开箱即零配置</li>\n<li><strong>完全替代人工</strong>：它是协同工具，不是替代工具，关键决策还是你来做</li>\n</ul>\n<h2 id=\"_7\">本章小结</h2>\n<p>记住这几个要点就够了：</p>\n<ol>\n<li>WPS Comate 是企业级人机协同平台，不是聊天机器人</li>\n<li>四大中枢各司其职：DataHub 管数据、AIHub 管模型、APIHub 管工具、TrustHub 管权限</li>\n<li>端云双引擎：本地引擎处理敏感数据和快速操作，云端引擎处理复杂计算</li>\n<li>AI 办公已经进入 3.0 协同时代，AI 不再只是回答问题，而是协同工作</li>\n</ol>\n<p>下一章，我们开始动手——下载、安装、登录 WPS Comate。</p>", "part": "第一篇 使用手册：先把 WPS Comate 用起来", "chapter_num": 1, "prev": "cover", "next": "第_2_章_WPS_Comate_的下载、安装与登录"}, "第_2_章_WPS_Comate_的下载、安装与登录": {"title": "第 2 章 WPS Comate 的下载、安装与登录", "html": "<h2 id=\"_1\">系统要求</h2>\n<p>先确认你的设备能不能跑 WPS Comate。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>最低配置</th>\n<th>推荐配置</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>操作系统</td>\n<td>Windows 10 / macOS 12</td>\n<td>Windows 11 / macOS 14+</td>\n</tr>\n<tr>\n<td>内存</td>\n<td>4 GB</td>\n<td>8 GB 及以上</td>\n</tr>\n<tr>\n<td>磁盘空间</td>\n<td>2 GB 可用空间</td>\n<td>5 GB 可用空间</td>\n</tr>\n<tr>\n<td>网络</td>\n<td>需要联网</td>\n<td>稳定的网络连接</td>\n</tr>\n<tr>\n<td>WPS Office</td>\n<td>2023 及以上版本</td>\n<td>最新版本</td>\n</tr>\n</tbody>\n</table>\n<blockquote>\n<p><strong>注意</strong>：WPS Comate 依赖 WPS Office 运行环境。如果你还没装 WPS Office，先去装一个。</p>\n</blockquote>\n<h2 id=\"wps-comate\">下载 WPS Comate</h2>\n<h3 id=\"wps\">方式一：从 WPS 官网下载</h3>\n<ol>\n<li>打开 WPS 官网（<code>www.wps.cn</code>）</li>\n<li>找到 WPS Comate 的下载入口</li>\n</ol>\n<p><img alt=\"WPS 官网下载入口\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_2_章_WPS_Comate_的下载、安装与登录/010_wps_entry.png\" /></p>\n<ol start=\"3\">\n<li>根据你的操作系统选择对应版本（Windows / macOS）</li>\n<li>下载安装包到本地</li>\n</ol>\n<h3 id=\"wps-office\">方式二：从 WPS Office 内下载</h3>\n<p>如果你已经安装了 WPS Office：</p>\n<ol>\n<li>打开 WPS Office</li>\n<li>点击右上角的「Comate」入口或顶部导航中的 AI 按钮</li>\n<li>系统会检测是否已安装 Comate，未安装则引导你下载</li>\n</ol>\n<blockquote>\n<p><strong>[待补充配图]</strong>：此处需要一张 WPS Office 内点击 Comate 入口的截图</p>\n</blockquote>\n<h3 id=\"_2\">方式三：企业统一部署</h3>\n<p>如果你是企业用户，IT 管理员可能会通过以下方式统一部署：</p>\n<ul>\n<li>内部软件分发系统推送</li>\n<li>组策略（Windows）或 MDM（macOS）批量安装</li>\n<li>提供企业内网下载链接</li>\n</ul>\n<p>这种情况下，你只需要等 IT 的通知，按指引安装即可。</p>\n<h2 id=\"_3\">安装步骤</h2>\n<h3 id=\"windows\">Windows 安装</h3>\n<ol>\n<li>双击下载的 <code>.exe</code> 安装包</li>\n<li>如果弹出安全提示，点击「是」允许运行</li>\n<li>选择安装路径（建议使用默认路径）</li>\n<li>点击「立即安装」</li>\n<li>等待安装完成，点击「完成」</li>\n</ol>\n<blockquote>\n<p><strong>[待补充配图]</strong>：此处需要一张 Windows 安装过程的截图</p>\n</blockquote>\n<ol start=\"6\">\n<li>安装完成后，桌面会出现 WPS Comate 快捷方式</li>\n</ol>\n<h3 id=\"macos\">macOS 安装</h3>\n<ol>\n<li>双击下载的 <code>.dmg</code> 文件</li>\n<li>在弹出的窗口中，将 WPS Comate 图标拖到「应用程序」文件夹</li>\n</ol>\n<blockquote>\n<p><strong>[待补充配图]</strong>：此处需要一张 macOS 拖拽安装的截图</p>\n</blockquote>\n<ol start=\"3\">\n<li>打开「启动台」或「应用程序」文件夹，找到 WPS Comate</li>\n<li>首次打开时，macOS 可能提示\"无法验证开发者\"。点击「取消」，然后右键点击图标选择「打开」，在弹窗中再次点击「打开」</li>\n</ol>\n<blockquote>\n<p><strong>提示</strong>：如果右键打开仍然报错，去「系统设置 → 隐私与安全性」中，找到关于 WPS Comate 的安全提示，点击「仍要打开」。</p>\n</blockquote>\n<h2 id=\"_4\">登录</h2>\n<h3 id=\"wps-comate_1\">启动 WPS Comate</h3>\n<p>安装完成后，启动 WPS Comate。你会看到登录界面。</p>\n<blockquote>\n<p><strong>[待补充配图]</strong>：此处需要一张 WPS Comate 登录界面的截图</p>\n</blockquote>\n<h3 id=\"_5\">登录方式</h3>\n<p>WPS Comate 支持以下登录方式：</p>\n<table>\n<thead>\n<tr>\n<th>登录方式</th>\n<th>适用场景</th>\n<th>说明</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>WPS 账号登录</td>\n<td>个人用户</td>\n<td>使用你的 WPS ID 登录（手机号/邮箱/微信）</td>\n</tr>\n<tr>\n<td>企业账号登录</td>\n<td>企业用户</td>\n<td>使用企业统一分配的账号登录</td>\n</tr>\n<tr>\n<td>扫码登录</td>\n<td>快速登录</td>\n<td>使用 WPS 手机版扫码登录</td>\n</tr>\n</tbody>\n</table>\n<h4 id=\"_6\">个人用户登录</h4>\n<ol>\n<li>在登录界面选择「WPS 账号登录」</li>\n<li>输入手机号或邮箱</li>\n<li>输入密码或获取验证码</li>\n<li>点击「登录」</li>\n</ol>\n<p>也可以直接点击微信图标，用微信扫码登录。</p>\n<h4 id=\"_7\">企业用户登录</h4>\n<ol>\n<li>在登录界面选择「企业账号登录」</li>\n<li>输入企业提供的账号信息</li>\n<li>首次登录可能需要绑定手机号</li>\n<li>按提示完成企业身份验证</li>\n</ol>\n<blockquote>\n<p><strong>提示</strong>：如果你同时有个人账号和企业账号，登录后可以在两个身份间切换。但同一个时间只能使用一个身份。</p>\n</blockquote>\n<h2 id=\"_8\">首次登录的初始化</h2>\n<p>第一次登录 WPS Comate 后，系统会引导你完成初始化配置。</p>\n<h3 id=\"1\">步骤 1：选择使用场景</h3>\n<p>系统会问你主要用 WPS Comate 做什么——写文档、做表格、做演示、数据分析等。选择你的主要场景，系统会推荐对应的技能。</p>\n<blockquote>\n<p><strong>[待补充配图]</strong>：此处需要一张选择使用场景的截图</p>\n</blockquote>\n<h3 id=\"2\">步骤 2：配置数据源（可选）</h3>\n<p>如果你有企业数据源需要接入，可以在此步骤配置。也可以跳过，之后在设置中再配。</p>\n<p>常见数据源包括：<br />\n- 企业知识库<br />\n- 共享文件夹<br />\n- 数据库连接</p>\n<blockquote>\n<p><strong>提示</strong>：个人用户通常可以跳过这一步。企业用户建议咨询 IT 管理员后再配置。</p>\n</blockquote>\n<h3 id=\"3\">步骤 3：安装推荐技能</h3>\n<p>系统会根据你选择的场景，推荐一批技能。你可以一键安装，也可以逐个挑选。</p>\n<blockquote>\n<p><strong>[待补充配图]</strong>：此处需要一张安装推荐技能的截图</p>\n</blockquote>\n<h3 id=\"4\">步骤 4：完成</h3>\n<p>点击「进入 WPS Comate」，完成初始化。你会看到主界面。</p>\n<h2 id=\"_9\">登录后的检查清单</h2>\n<p>登录完成后，花两分钟做一下检查：</p>\n<ul>\n<li>[ ] WPS Office 版本是否为最新（设置 → 关于 → 检查更新）</li>\n<li>[ ] 网络连接是否正常（能看到任务区加载即为正常）</li>\n<li>[ ] 数据源是否已接入（设置 → 数据源管理）</li>\n<li>[ ] 是否安装了基本技能（技能区有内容）</li>\n<li>[ ] 权限是否正常（能正常发起任务即为正常）</li>\n</ul>\n<h2 id=\"_10\">常见问题排查</h2>\n<h3 id=\"wps-office_1\">问题：安装时提示\"需要先安装 WPS Office\"</h3>\n<p>WPS Comate 依赖 WPS Office。先去 <code>www.wps.cn</code> 下载安装 WPS Office，完成后再安装 Comate。</p>\n<h3 id=\"macos_1\">问题：macOS 提示\"文件已损坏，无法打开\"</h3>\n<p>这是 macOS 的安全机制。打开终端，执行：</p>\n<pre class=\"codehilite\"><code class=\"language-bash\">sudo xattr -cr /Applications/WPS\\ Comate.app\n</code></pre>\n\n<p>输入开机密码后回车，再尝试打开。</p>\n<h3 id=\"_11\">问题：登录后白屏或加载不出来</h3>\n<ol>\n<li>检查网络连接是否正常</li>\n<li>尝试切换网络（比如从 VPN 切到直连）</li>\n<li>清除缓存：设置 → 通用 → 清除缓存</li>\n<li>重启 WPS Comate</li>\n</ol>\n<h3 id=\"_12\">问题：企业账号无法登录</h3>\n<ol>\n<li>确认企业账号是否已激活——联系 IT 管理员</li>\n<li>确认企业是否已开通 WPS Comate 服务</li>\n<li>检查账号和密码是否正确</li>\n<li>如果是 SSO 登录，确认你的企业 SSO 服务是否正常</li>\n</ol>\n<h3 id=\"_13\">问题：扫码登录没反应</h3>\n<ol>\n<li>确认手机上的 WPS App 已登录</li>\n<li>确认手机网络正常</li>\n<li>二维码可能已过期，点击刷新二维码</li>\n<li>尝试退出 WPS App 重新登录后再扫码</li>\n</ol>\n<h3 id=\"_14\">问题：切换账号后数据没有同步</h3>\n<p>WPS Comate 的数据与账号绑定。切换账号后：</p>\n<ol>\n<li>等待 10-30 秒让数据同步</li>\n<li>如果仍未同步，下拉刷新</li>\n<li>如果问题持续，退出 WPS Comate 重新打开</li>\n</ol>\n<h2 id=\"_15\">本章小结</h2>\n<ul>\n<li>从 WPS 官网或 WPS Office 内下载 WPS Comate</li>\n<li>Windows 用安装包安装，macOS 拖到应用程序文件夹</li>\n<li>支持个人账号、企业账号和扫码三种登录方式</li>\n<li>首次登录完成初始化配置：选场景、配数据源、装技能</li>\n<li>遇到问题先检查 WPS Office 版本和网络连接</li>\n</ul>\n<p>下一章，我们详细介绍 WPS Comate 的主界面和任务系统。</p>", "part": "第一篇 使用手册：先把 WPS Comate 用起来", "chapter_num": 2, "prev": "第_1_章_初识_WPS_Comate", "next": "第_3_章_WPS_Comate_的主界面与任务"}, "第_3_章_WPS_Comate_的主界面与任务": {"title": "第 3 章 WPS Comate 的主界面与任务", "html": "<h2 id=\"_1\">打开界面，认三个地方</h2>\n<p>打开 WPS Comate，你只需要认识三个区域：</p>\n<p><img alt=\"主界面全貌\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_3_章_WPS_Comate_的主界面与任务/011_ui.png\" /></p>\n<table>\n<thead>\n<tr>\n<th>区域</th>\n<th>在哪</th>\n<th>干什么用</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>对话区</strong></td>\n<td>中间</td>\n<td>在这里打字、发任务、看 AI 回复</td>\n</tr>\n<tr>\n<td><strong>任务面板</strong></td>\n<td>右侧</td>\n<td>在这里看任务进度和结果</td>\n</tr>\n<tr>\n<td><strong>侧边导航</strong></td>\n<td>最左</td>\n<td>切换功能模块</td>\n</tr>\n</tbody>\n</table>\n<p>其他的东西（设置、技能管理、数据源），用到的时候再说。</p>\n<h2 id=\"ai\">对话区：你跟 AI 说话的地方</h2>\n<h3 id=\"_2\">输入框</h3>\n<p>底部的输入框就是你打字的地方：</p>\n<p><img alt=\"输入框功能\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_3_章_WPS_Comate_的主界面与任务/017_ui.png\" /></p>\n<p>三种用法：<br />\n- <strong>直接打字</strong>：跟聊天一样，描述你要做什么<br />\n- <strong>拖文件进去</strong>：拖一份 Excel、Word、PDF 进去，AI 会读取内容<br />\n- <strong>用 @ 提及</strong>：输入 <code>@</code> 可以选择技能或数据源</p>\n<h3 id=\"ai_1\">AI 的回复</h3>\n<p>AI 的回复以卡片形式出现在对话区：</p>\n<p><img alt=\"消息卡片\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_3_章_WPS_Comate_的主界面与任务/018_ui.png\" /></p>\n<p>回复可能是文字、表格、文档预览或操作结果。每条回复下面有快捷按钮：复制、重新生成、追问。</p>\n<h2 id=\"_3\">任务面板：看进度和结果</h2>\n<p>你发的任务会出现在右侧的任务面板：</p>\n<p><img alt=\"任务面板\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_3_章_WPS_Comate_的主界面与任务/021_ui.png\" /></p>\n<p>每个任务卡片显示：标题、状态（进行中/已完成/失败）、进度条。点击卡片可以看详情——AI 拆解的每一步在做什么、结果是什么。</p>\n<blockquote>\n<p><strong>重要</strong>：如果任务涉及发邮件、改文件等操作，AI 会在那一步暂停，等你确认后才继续。这叫审批节点。</p>\n</blockquote>\n<h2 id=\"_4\">任务是什么</h2>\n<p>在 WPS Comate 里，<strong>任务 = 你说一个目标 + AI 拆步骤 + 自动执行 + 给你结果</strong>。</p>\n<p>比如你说：</p>\n<pre class=\"codehilite\"><code>帮我整理上周的销售数据，按区域汇总，生成一份带图表的周报。\n数据在共享文件夹的&quot;销售数据&quot;目录下。\n</code></pre>\n\n<p>AI 会自动判断这是个任务（不是简单问答），拆解成读取数据→清洗→汇总→生成图表→生成文档这几个步骤，逐步执行。</p>\n<h3 id=\"_5\">怎么发任务</h3>\n<p>最简单的方式：<strong>在对话区直接用自然语言描述你要做什么</strong>，就像跟同事说话一样。说完 AI 会给你看执行计划，你确认后它就开始干活。</p>\n<blockquote>\n<p><strong>技巧</strong>：你说得越清楚，结果越准确。目标、用什么数据、要什么格式，这三点说清楚就够了。</p>\n</blockquote>\n<h2 id=\"_6\">本章小结</h2>\n<ul>\n<li>认识三个区域：对话区打字、任务面板看结果、侧边导航切功能</li>\n<li>在对话区用自然语言发任务，AI 自动拆解执行</li>\n<li>涉及写操作的步骤会暂停等你确认</li>\n<li>任务结果在任务面板查看</li>\n</ul>\n<p>下一章，我们实际动手完成第一个任务。</p>", "part": "第一篇 使用手册：先把 WPS Comate 用起来", "chapter_num": 3, "prev": "第_2_章_WPS_Comate_的下载、安装与登录", "next": "第_4_章_快速完成第一个_Comate_任务"}, "第_4_章_快速完成第一个_Comate_任务": {"title": "第 4 章 快速完成第一个 Comate 任务", "html": "<h2 id=\"_1\">本章任务</h2>\n<p>干一件实际的事：<strong>用 WPS Comate 把一份杂乱的销售数据整理成一份周报</strong>。</p>\n<p>从头到尾走一遍，做完你就掌握了基本用法。</p>\n<h2 id=\"_2\">准备数据</h2>\n<p>把你的销售数据文件（Excel）放到 Comate 能访问的位置。第一次用建议拿小数据练手（50 行以内）。</p>\n<h2 id=\"_3\">第一步：描述任务</h2>\n<p>在对话区输入：</p>\n<pre class=\"codehilite\"><code>帮我整理这份销售数据，要求：\n1. 去除重复行\n2. 统一日期格式为 YYYY-MM-DD\n3. 按区域汇总销售额和订单数\n4. 生成一份带柱状图的周报\n</code></pre>\n\n<p>然后把 Excel 文件拖入对话框。</p>\n<p><img alt=\"创建任务\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_4_章_快速完成第一个_Comate_任务/047_task.png\" /></p>\n<h2 id=\"_4\">第二步：确认计划</h2>\n<p>AI 会解析你的任务，列出执行计划：</p>\n<p><img alt=\"AI 任务解析\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_4_章_快速完成第一个_Comate_任务/048_task.png\" /></p>\n<table>\n<thead>\n<tr>\n<th>步骤</th>\n<th>操作</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>1</td>\n<td>读取数据文件</td>\n</tr>\n<tr>\n<td>2</td>\n<td>数据清洗（去重、格式化）</td>\n</tr>\n<tr>\n<td>3</td>\n<td>按区域汇总</td>\n</tr>\n<tr>\n<td>4</td>\n<td>生成图表</td>\n</tr>\n<tr>\n<td>5</td>\n<td>组装周报文档</td>\n</tr>\n</tbody>\n</table>\n<p>检查计划，没问题就点\"确认执行\"。需要调整就直接在对话里补充，比如\"图表用饼图\"或\"按产品线再分类\"。</p>\n<p><img alt=\"确认执行\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_4_章_快速完成第一个_Comate_任务/049_task.png\" /></p>\n<blockquote>\n<p><strong>技巧</strong>：这是你调整任务的最佳时机。计划阶段改一句，比执行完了再返工省事得多。</p>\n</blockquote>\n<h2 id=\"_5\">第三步：看它干活</h2>\n<p>点确认后，AI 逐步执行：</p>\n<p><img alt=\"执行过程\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_4_章_快速完成第一个_Comate_任务/050_task.png\" /></p>\n<p>每一步在任务面板里实时更新状态——读取了多少行数据、去重了多少行、汇总结果是什么。如果 AI 不确定某些处理方式（比如空值是填 0 还是删除），会暂停问你。</p>\n<p>汇总结果会以表格展示：</p>\n<table>\n<thead>\n<tr>\n<th>区域</th>\n<th>销售额</th>\n<th>订单数</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>华南</td>\n<td>¥125,600</td>\n<td>34</td>\n</tr>\n<tr>\n<td>华东</td>\n<td>¥98,300</td>\n<td>28</td>\n</tr>\n<tr>\n<td>华北</td>\n<td>¥76,500</td>\n<td>22</td>\n</tr>\n<tr>\n<td>西南</td>\n<td>¥45,200</td>\n<td>15</td>\n</tr>\n<tr>\n<td>西北</td>\n<td>¥32,100</td>\n<td>11</td>\n</tr>\n</tbody>\n</table>\n<p>最后 AI 把汇总表格和图表组装成一份周报文档，自动标注关键数据亮点和结论。</p>\n<p><img alt=\"生成周报\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_4_章_快速完成第一个_Comate_任务/054_task.png\" /></p>\n<h2 id=\"_6\">第四步：审核结果</h2>\n<p>别急着用，先检查：</p>\n<ul>\n<li>[ ] 汇总数值对不对</li>\n<li>[ ] 图表准不准</li>\n<li>[ ] 格式满不满足要求</li>\n</ul>\n<p>发现问题直接在对话里说，比如：</p>\n<pre class=\"codehilite\"><code>华南区的数据好像不对，销售额应该比华东高。\n图表标题改成&quot;各区域销售额对比&quot;。\n</code></pre>\n\n<p>AI 会根据反馈修正后重新生成。<strong>反馈越具体，修正越快。</strong></p>\n<h2 id=\"_7\">第五步：导出使用</h2>\n<p>确认没问题后导出：</p>\n<p><img alt=\"导出周报\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_4_章_快速完成第一个_Comate_任务/056_task.png\" /></p>\n<ul>\n<li><strong>Word</strong>：直接发送或打印</li>\n<li><strong>PDF</strong>：归档或正式分享</li>\n<li><strong>Excel</strong>：包含原始数据和汇总表</li>\n</ul>\n<h2 id=\"_8\">本章小结</h2>\n<ul>\n<li>描述任务 → 确认计划 → AI 执行 → 审核结果 → 导出使用</li>\n<li>计划阶段说清楚要求，比事后返工省事</li>\n<li>结果不对就反馈，越具体越好</li>\n<li>导出支持 Word / PDF / Excel</li>\n</ul>\n<p>下一章，学习加载真正用得上的技能，让 Comate 更能干活。</p>", "part": "第一篇 使用手册：先把 WPS Comate 用起来", "chapter_num": 4, "prev": "第_3_章_WPS_Comate_的主界面与任务", "next": "第_5_章_加载一个真正用得上的技能"}, "第_5_章_加载一个真正用得上的技能": {"title": "第 5 章 加载一个真正用得上的技能", "html": "<h2 id=\"_1\">技能是什么</h2>\n<p>技能（Skill）是 AI 的能力扩展模块。每个技能封装了一组特定能力——处理 PDF、操作 Excel、生成 PPT、发邮件。</p>\n<p>没有技能的 Comate 是个通才，什么都能聊但干不了精细活。<strong>装上技能后，它变成了能干具体活的专家。</strong></p>\n<p><img alt=\"技能系统概览\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_5_章_加载一个真正用得上的技能/146_skill.png\" /></p>\n<blockquote>\n<p><strong>关键</strong>：技能不是给你用的，是给 AI 用的。你不需要学怎么操作技能——你说目标，AI 自己选合适的技能来执行。</p>\n</blockquote>\n<h2 id=\"_2\">去技能市场找技能</h2>\n<p>在侧边导航栏点击\"技能\"进入技能市场：</p>\n<p><img alt=\"技能市场入口\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_5_章_加载一个真正用得上的技能/150_skill.png\" /></p>\n<p>技能市场跟应用商店一样——浏览、搜索、一键安装。</p>\n<h3 id=\"_3\">浏览</h3>\n<p><img alt=\"技能广场\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_5_章_加载一个真正用得上的技能/151_skill.png\" /></p>\n<p>广场页按类别分组：文档处理、表格分析、演示制作、数据接入、系统集成、日常办公。不知道要什么的时候，先逛逛。</p>\n<h3 id=\"_4\">搜索</h3>\n<p>知道要什么就直接搜：</p>\n<p><img alt=\"搜索技能\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_5_章_加载一个真正用得上的技能/155_skill.png\" /></p>\n<p>搜\"PDF\"能找到 PDF 解析、PDF 转 Word、PDF 合并拆分等。搜\"周报\"能找到能生成周报的技能。</p>\n<h2 id=\"_5\">选技能看什么</h2>\n<p><img alt=\"评估指标\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_5_章_加载一个真正用得上的技能/159_skill.png\" /></p>\n<table>\n<thead>\n<tr>\n<th>指标</th>\n<th>怎么看</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>下载量</td>\n<td>1000+ 说明比较成熟</td>\n</tr>\n<tr>\n<td>评分</td>\n<td>4 星以上可用</td>\n</tr>\n<tr>\n<td>更新时间</td>\n<td>3 个月内有更新说明在维护</td>\n</tr>\n<tr>\n<td>开发者</td>\n<td>官方优先</td>\n</tr>\n<tr>\n<td>权限要求</td>\n<td>越少越好，小技能要大权限要警惕</td>\n</tr>\n</tbody>\n</table>\n<h2 id=\"_6\">安装技能</h2>\n<p>选好后点\"安装\"，几秒钟完成：</p>\n<p><img alt=\"安装技能\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_5_章_加载一个真正用得上的技能/163_skill.png\" /></p>\n<h3 id=\"_7\">权限授权</h3>\n<p>如果技能需要额外权限，会弹窗说明：</p>\n<p><img alt=\"权限授权\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_5_章_加载一个真正用得上的技能/164_skill.png\" /></p>\n<p>看清楚它要什么权限、为什么需要。确认后点\"授权\"。<strong>随时可以在设置里撤销。</strong></p>\n<h3 id=\"_8\">安装后配置</h3>\n<p>部分技能装完需要配置才能用，比如：</p>\n<ul>\n<li><strong>数据库技能</strong>：填数据库地址和账号</li>\n<li><strong>邮件技能</strong>：填 SMTP 服务器和发件箱</li>\n</ul>\n<p><img alt=\"安装后配置\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_5_章_加载一个真正用得上的技能/165_skill.png\" /></p>\n<p>配好后点\"测试连接\"验证。</p>\n<h2 id=\"_9\">启用和禁用</h2>\n<p>安装后默认启用。不用的技能可以关掉：</p>\n<p><img alt=\"启用禁用\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_5_章_加载一个真正用得上的技能/168_skill.png\" /></p>\n<p>禁用后 AI 不会调用它，但配置数据保留，随时可以重新打开。暂时不用的建议禁用而不是卸载。</p>\n<h2 id=\"_10\">必装技能推荐</h2>\n<p><img alt=\"必装技能\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_5_章_加载一个真正用得上的技能/177_skill.png\" /></p>\n<table>\n<thead>\n<tr>\n<th>技能</th>\n<th>用途</th>\n<th>为什么装</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>文档摘要</td>\n<td>自动总结长文档</td>\n<td>看长报告必备</td>\n</tr>\n<tr>\n<td>表格清洗</td>\n<td>自动整理脏数据</td>\n<td>处理数据必备</td>\n</tr>\n<tr>\n<td>格式转换</td>\n<td>PDF/Word/Excel 互转</td>\n<td>格式问题一键解决</td>\n</tr>\n<tr>\n<td>邮件助手</td>\n<td>起草和发送邮件</td>\n<td>高频使用</td>\n</tr>\n<tr>\n<td>会议纪要</td>\n<td>从录音生成纪要</td>\n<td>开会后自动出纪要</td>\n</tr>\n</tbody>\n</table>\n<p>其他实用技能：数据可视化、合同审查、日历同步、批量处理、快捷模板。</p>\n<h2 id=\"_11\">本章小结</h2>\n<ul>\n<li>技能是给 AI 用的能力扩展——你说目标，AI 选技能执行</li>\n<li>去技能市场搜索、浏览、一键安装</li>\n<li>选技能看下载量、评分、更新时间、权限要求</li>\n<li>装完需要配置的按提示填写</li>\n<li>必装五件套：文档摘要、表格清洗、格式转换、邮件助手、会议纪要</li>\n</ul>\n<p>到这里，Comate 的基础操作部分就结束了。你已经知道 Comate 是什么、怎么装、界面怎么用、怎么发任务、怎么加技能。接下来还有专家、连接器、团队空间和自动化四个进阶功能（第 6–9 章），然后进入第二篇\"场景篇\"，看 Comate 在具体工作场景里怎么帮你解决问题。</p>", "part": "第一篇 使用手册：先把 WPS Comate 用起来", "chapter_num": 5, "prev": "第_4_章_快速完成第一个_Comate_任务", "next": "第_6_章_专家数字员工"}, "第_6_章_专家数字员工": {"title": "第 6 章 专家数字员工", "html": "<h2 id=\"_1\">专家是什么</h2>\n<p>前面我们讲了技能——它让 AI 会做具体的事。但一个真正的\"数字同事\"，光会做事还不够。它还需要懂你的业务、了解你的数据、遵守你的流程。</p>\n<p>专家（Expert）就是这样一个角色：<strong>懂业务、会做事、可复用的岗位级 AI 虚拟员工</strong>。</p>\n<p><img alt=\"专家数字员工概览\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_6_章_专家数字员工/058_expert.png\" /></p>\n<p>拆开来看：</p>\n<ul>\n<li><strong>懂业务</strong>：通过 DataHub 连接企业的真实业务系统，能读取考勤、财务、销售等数据。它不是靠猜，是靠活数据。</li>\n<li><strong>会做事</strong>：把资深员工的业务经验萃取出来，沉淀为可复用的技能组合。新人不必重走弯路，直接调用专家的\"肌肉记忆\"。</li>\n<li><strong>可复用</strong>：一个专家配置好以后，全团队都能申请使用。不是一个人的外挂，是整个组织的数字资产。</li>\n</ul>\n<blockquote>\n<p><strong>一句话理解</strong>：通用 AI 助手是\"你能帮我做什么\"，专家是\"我在这个岗位上应该做什么\"——它知道上下文、知道流程、知道数据在哪。</p>\n</blockquote>\n<h2 id=\"ai\">专家与通用 AI 助手的区别</h2>\n<p>不要把专家当成\"高级版通用助手\"。它们的底层逻辑完全不同。</p>\n<p><img alt=\"专家与通用AI助手对比\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_6_章_专家数字员工/059_expert.png\" /></p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>通用 AI 助手</th>\n<th>专家数字员工</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>本质</td>\n<td>对话式工具</td>\n<td>岗位级虚拟员工</td>\n</tr>\n<tr>\n<td>类比</td>\n<td>实习生，什么都能聊一点</td>\n<td>老员工，精通特定岗位职责</td>\n</tr>\n<tr>\n<td>数据能力</td>\n<td>仅依赖用户上传的临时数据</td>\n<td>通过 DataHub 读取企业系统活数据</td>\n</tr>\n<tr>\n<td>创建者</td>\n<td>产品方预设</td>\n<td>业务部门根据岗位需求自主创建</td>\n</tr>\n<tr>\n<td>创建方式</td>\n<td>开箱即用</td>\n<td>九大模块深度配置（基础信息/大模型/专家能力/知识库等）</td>\n</tr>\n<tr>\n<td>权限体系</td>\n<td>用户级权限</td>\n<td>岗位级权限，可精确到字段和数据行</td>\n</tr>\n<tr>\n<td>使用方式</td>\n<td>对话即完成</td>\n<td>申请权限 → 选中专家 → 专属会话</td>\n</tr>\n</tbody>\n</table>\n<blockquote>\n<p><strong>核心差异</strong>：通用助手是你问它答，专家是你把事交给它自己办。它懂这个岗位的输入是什么、输出是什么、中间该走什么流程。</p>\n</blockquote>\n<h2 id=\"datahub\">专家的\"懂业务\"：DataHub 数据连接</h2>\n<p>一个不懂你公司数据的 AI，再好用也只是\"通用答案生成器\"。专家的\"懂业务\"，靠的是 <strong>DataHub</strong>。</p>\n<p><img alt=\"DataHub 数据连接\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_6_章_专家数字员工/060_expert.png\" /></p>\n<p>DataHub 是 WPS Comate 的企业数据连接中枢，它的作用是把散落在各个业务系统中的数据统一接入 AI：</p>\n<ul>\n<li><strong>考勤系统</strong> → 读取员工的打卡记录、请假申请、加班申请</li>\n<li><strong>财务系统</strong> → 读取报销单、预算数据、审批流程</li>\n<li><strong>销售系统（CRM）</strong> → 读取客户信息、商机阶段、合同金额</li>\n<li><strong>项目管理系统</strong> → 读取任务进度、工时登记、里程碑</li>\n<li><strong>自定义数据源</strong> → 支持数据库直连、API 对接、文件导入</li>\n</ul>\n<p>DataHub 接入数据后，专家就能在对话中直接引用真实业务数据，而不是凭空猜测。</p>\n<blockquote>\n<p><strong>举例</strong>：你问\"上个月谁请假最多\"，通用助手只能给你一段关于\"如何统计请假\"的方法论。而人力考勤专家会直接查询考勤系统，返回具体的人名和天数。</p>\n</blockquote>\n<h2 id=\"_2\">专家的\"会做事\"：经验萃取与技能沉淀</h2>\n<p>数据只是原材料，真正让专家\"会做事\"的，是把老员工的经验变成可复用的流程。</p>\n<p><img alt=\"经验萃取\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_6_章_专家数字员工/061_expert.png\" /></p>\n<p>这个过程分三步：</p>\n<ol>\n<li><strong>梳理</strong>：业务负责人梳理岗位的核心职责和标准工作流。例如人力专家需要掌握\"查询考勤 → 识别异常 → 生成汇总报表 → 答复员工咨询\"。</li>\n<li><strong>配置</strong>：在专家配置中绑定对应的技能，并为每类任务写好指令模板。比如答复员工咨询时，自动调取该员工的考勤记录作为上下文。</li>\n<li><strong>上线</strong>：配置完成后发布审批，审批通过后团队内所有人可用。</li>\n</ol>\n<p>这样，一个拥有 5 年经验的 HR 老员工的工作方式，就被固化成了专家数字员工。以后任何人来问考勤问题，专家都能用同样的标准和流程来回答。</p>\n<h2 id=\"_3\">创建专家：从零搭建一个数字员工</h2>\n<h3 id=\"_4\">整体流程</h3>\n<p>创建专家的完整流程是：<strong>申请权限 → 新建专家 → 配置九大模块 → 发布审批 → 上线</strong>。</p>\n<p><img alt=\"创建专家流程\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_6_章_专家数字员工/062_expert.png\" /></p>\n<h3 id=\"1\">第 1 步：申请创建权限</h3>\n<p>不是所有用户都能创建专家。你需要先申请\"专家创建者\"角色权限，由管理员在团队空间后台审批。</p>\n<h3 id=\"2\">第 2 步：新建专家</h3>\n<p>在专家管理页面点击\"新建专家\"：<br />\n- 填写专家名称（如\"人力考勤专家\"）<br />\n- 选择专家头像<br />\n- 选择所属团队空间<br />\n- 填写一句话简介</p>\n<h3 id=\"3\">第 3 步：配置九大模块</h3>\n<p>这是专家配置的核心环节。每个模块决定了专家的一项基本能力。</p>\n<p><img alt=\"九大模块配置\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_6_章_专家数字员工/063_expert.png\" /></p>\n<table>\n<thead>\n<tr>\n<th>配置模块</th>\n<th>作用</th>\n<th>关键设置</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>基础信息</td>\n<td>定义专家的身份标识</td>\n<td>头像、名称、专家 key、描述、说明书</td>\n</tr>\n<tr>\n<td>大模型</td>\n<td>选择驱动专家的 AI 模型</td>\n<td>从已上架模型中选择一个驱动模型</td>\n</tr>\n<tr>\n<td>专家能力</td>\n<td>给专家装上执行能力</td>\n<td>挂载 Skill、绑定数据源、配置连接器</td>\n</tr>\n<tr>\n<td>知识库</td>\n<td>加载岗位相关知识文档</td>\n<td>关联 365 智能文档库</td>\n</tr>\n<tr>\n<td>渠道能力</td>\n<td>配置专家的触达渠道</td>\n<td>企业自建应用、协作群聊、团队任务、轻审批</td>\n</tr>\n<tr>\n<td>使用范围</td>\n<td>设定专家的可见范围和权限</td>\n<td>谁能看到、谁能使用、开发权限</td>\n</tr>\n<tr>\n<td>调试预览</td>\n<td>上线前测试专家效果</td>\n<td>对话测试，验证配置是否生效</td>\n</tr>\n<tr>\n<td>发布与版本</td>\n<td>管理专家的发布和迭代</td>\n<td>版本号、发布说明、审批流程</td>\n</tr>\n<tr>\n<td>运营统计</td>\n<td>监控专家的使用情况</td>\n<td>调用量、活跃用户、趋势分析</td>\n</tr>\n</tbody>\n</table>\n<p><img alt=\"模块配置详情\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_6_章_专家数字员工/064_expert.png\" /></p>\n<blockquote>\n<p><strong>关键</strong>：专家能力（挂载 Skill/数据/连接）和知识库是\"懂业务\"的基础。如果这两个模块配置不对，专家就是个空壳，什么业务数据都拿不到。</p>\n</blockquote>\n<h3 id=\"4\">第 4 步：发布审批</h3>\n<p>配置完成后点击\"发布\"。专家会进入\"审批中\"状态：</p>\n<p><img alt=\"发布审批\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_6_章_专家数字员工/065_expert.png\" /></p>\n<p>管理员审核配置的合理性和安全性，审批通过后专家正式上线，出现在团队的专家列表中可供申请使用。</p>\n<h2 id=\"_5\">使用专家：把活交给它</h2>\n<h3 id=\"_6\">使用流程</h3>\n<p>使用专家非常简单：<strong>申请权限 → 选中专家 → 进入专属会话 → 自然语言对话</strong>。</p>\n<p><img alt=\"选择专家\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_6_章_专家数字员工/066_expert.png\" /></p>\n<ol>\n<li><strong>申请权限</strong>：在专家列表中找到需要的专家，点击\"申请使用\"。管理员审批后开通权限。</li>\n<li><strong>选中专家</strong>：在工作台侧边栏切换到你申请到的专家。</li>\n<li><strong>进入专属会话</strong>：切换后进入该专家的专属对话窗口，界面会显示专家名称、简介和可用能力。</li>\n<li><strong>自然语言对话</strong>：像和同事说话一样，直接下达任务。</li>\n</ol>\n<p><img alt=\"专家专属会话\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_6_章_专家数字员工/067_expert.png\" /></p>\n<blockquote>\n<p><strong>体验上的差异</strong>：在通用模式下，你需要交代很多背景信息。切到专家后，你只需要说\"帮我查一下张三上个月的考勤异常\"——专家自己知道去哪找数据、怎么查、格式怎么输出。</p>\n</blockquote>\n<h2 id=\"_7\">场景案例：人力考勤专家</h2>\n<p>我们用一个人力资源部的真实场景来展示专家的价值。</p>\n<h3 id=\"2_1\">旧模式：每天 2 小时的重复工作</h3>\n<p><img alt=\"旧模式痛点\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_6_章_专家数字员工/068_expert.png\" /></p>\n<p>传统的人力考勤管理流程：</p>\n<table>\n<thead>\n<tr>\n<th>环节</th>\n<th>做法</th>\n<th>耗时（平均每天）</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>打开考勤系统</td>\n<td>登录系统 → 进入考勤报表</td>\n<td>5 分钟</td>\n</tr>\n<tr>\n<td>手工筛选异常</td>\n<td>逐条比对打卡记录，找迟到/早退/缺卡</td>\n<td>30 分钟</td>\n</tr>\n<tr>\n<td>汇总核算</td>\n<td>导出 Excel，手动做透视表</td>\n<td>20 分钟</td>\n</tr>\n<tr>\n<td>发邮件通知</td>\n<td>给异常员工发提醒邮件</td>\n<td>15 分钟</td>\n</tr>\n<tr>\n<td>回复员工咨询</td>\n<td>员工来问\"我怎么缺卡了\"\"为什么扣钱了\"</td>\n<td>40 分钟</td>\n</tr>\n<tr>\n<td>周报/月报</td>\n<td>每周整理数据生成汇报</td>\n<td>每周 2 小时</td>\n</tr>\n</tbody>\n</table>\n<p><strong>痛点</strong>：工作重复、数据容易出错、员工等回复要排队、月底忙到崩溃。</p>\n<h3 id=\"_8\">新模式：专家一站式搞定</h3>\n<p><img alt=\"新模式流程\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_6_章_专家数字员工/069_expert.png\" /></p>\n<p>创建\"人力考勤专家\"后，整个流程变成了：</p>\n<ol>\n<li><strong>数据自动接入</strong>：专家通过 DataHub 直连考勤系统，实时读取打卡数据。</li>\n<li><strong>异常自动识别</strong>：根据预设规则（迟到 30 分钟以上、缺卡、加班超过 3 小时等），自动标记异常记录。</li>\n<li><strong>一键生成报表</strong>：对着专家说\"生成本周考勤异常汇总\"，3 秒出一份包含部门、姓名、异常类型、时长的表格。</li>\n<li><strong>自动发送通知</strong>：专家调用邮件技能，给异常员工发送提醒，同时抄送部门负责人。</li>\n<li><strong>员工自助查询</strong>：员工切到考勤专家，直接问\"我上个月出勤怎么样\"，专家自动调取该员工的记录并回复。</li>\n<li><strong>周报自动生成</strong>：设置自动化任务，每周五下午 5 点自动生成考勤周报并发送到管理者邮箱。</li>\n</ol>\n<p><img alt=\"效果展示\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_6_章_专家数字员工/070_expert.png\" /></p>\n<h3 id=\"_9\">效果对比</h3>\n<table>\n<thead>\n<tr>\n<th>指标</th>\n<th>旧模式</th>\n<th>新模式</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>日均耗时</td>\n<td>2 小时</td>\n<td>10 分钟（审核 + 处理特殊情况）</td>\n</tr>\n<tr>\n<td>出错率</td>\n<td>5%（手工统计）</td>\n<td>0%（系统自动计算）</td>\n</tr>\n<tr>\n<td>员工咨询响应时间</td>\n<td>平均 2 小时</td>\n<td>即时</td>\n</tr>\n<tr>\n<td>报表生成</td>\n<td>手动做，30 分钟</td>\n<td>一句话，10 秒</td>\n</tr>\n<tr>\n<td>新人上手</td>\n<td>需培训 3 天</td>\n<td>只需知道问什么问题</td>\n</tr>\n</tbody>\n</table>\n<blockquote>\n<p><strong>本质变化</strong>：人力专员从\"做考勤数据\"变成了\"管理考勤专家\"。她的工作不再是重复筛选和统计，而是处理特殊情况、优化规则、提升团队效率。</p>\n</blockquote>\n<h2 id=\"_10\">更多专家场景</h2>\n<p>除了人力考勤，以下场景同样适合创建专家：</p>\n<table>\n<thead>\n<tr>\n<th>专家类型</th>\n<th>核心能力</th>\n<th>典型任务</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>财务报销专家</td>\n<td>报销审核、预算查询</td>\n<td>审核报销单合规性、查询部门预算余额</td>\n</tr>\n<tr>\n<td>IT 支持专家</td>\n<td>设备报修、软件故障排查</td>\n<td>接收报修工单、提供标准解决方案</td>\n</tr>\n<tr>\n<td>销售赋能专家</td>\n<td>客户信息查询、商机分析</td>\n<td>查询客户历史、生成拜访准备材料</td>\n</tr>\n<tr>\n<td>客服专家</td>\n<td>知识库问答、工单处理</td>\n<td>回答产品问题、创建工单并跟踪进度</td>\n</tr>\n<tr>\n<td>项目管理专家</td>\n<td>进度跟踪、风险预警</td>\n<td>查询项目里程碑、识别延期风险</td>\n</tr>\n</tbody>\n</table>\n<h2 id=\"faq\">常见问题 FAQ</h2>\n<p><img alt=\"专家 FAQ\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_6_章_专家数字员工/071_expert.png\" /></p>\n<p><strong>Q：一个团队可以创建多少个专家？</strong><br />\nA：根据团队空间的配置，通常不限数量。但建议从 1-2 个高频场景开始，跑顺了再扩展。</p>\n<p><strong>Q：专家能跨团队使用吗？</strong><br />\nA：默认在创建团队内使用。如果需要跨团队共享，需要管理员在专家的\"使用范围\"模块中配置跨团队访问。</p>\n<p><strong>Q：专家会误操作企业数据吗？</strong><br />\nA：有两个保障机制：一是 DataHub 可配置只读权限；二是\"使用范围\"模块可设置关键操作需人工确认。</p>\n<p><strong>Q：专家能处理多轮复杂对话吗？</strong><br />\nA：能。专家有记忆能力，可以在多轮对话中记住上下文。比如先说\"查张三考勤\"，再说\"把他的异常记录导出表格\"，专家知道说的\"他\"是张三。</p>\n<p><strong>Q：专家的回答会不会\"幻觉\"？</strong><br />\nA：相比通用 AI，专家的幻觉概率低得多。因为它有明确的指令模板、限定的知识库、真实的 DataHub 数据，而不是从海量训练数据中\"猜\"答案。</p>\n<p><strong>Q：谁适合来创建专家？</strong><br />\nA：业务负责人或资深员工。因为他们最了解这个岗位的工作流和数据需求。不需要写代码，全程界面配置。</p>\n<h2 id=\"_11\">本章小结</h2>\n<ul>\n<li>专家不是通用助手的高级版，而是懂业务、会做事、可复用的岗位级虚拟员工</li>\n<li>懂业务靠 DataHub（连接企业数据），会做事靠经验萃取（沉淀技能和流程）</li>\n<li>创建专家需配置九大模块，核心是专家能力（Skill/数据/连接）和知识库</li>\n<li>使用专家只需申请权限后切到专属会话，自然语言下达任务</li>\n<li>人力考勤专家案例：日均耗时从 2 小时降到 10 分钟，出错率归零</li>\n<li>一个专家配置好，全团队受益——这就是\"数字资产\"的意义</li>\n</ul>\n<blockquote>\n<p><strong>[待补充配图汇总]</strong>：本章所有图片均已引用 assets 目录中实际存在的文件（058_expert.png ~ 071_expert.png），无需补充。</p>\n</blockquote>", "part": "第一篇 使用手册：先把 WPS Comate 用起来", "chapter_num": 6, "prev": "第_5_章_加载一个真正用得上的技能", "next": "第_7_章_连接器：让_AI_接入你的业务系统"}, "第_7_章_连接器：让_AI_接入你的业务系统": {"title": "第 7 章 连接器：让 AI 接入你的业务系统", "html": "<h2 id=\"_1\">连接器解决什么问题</h2>\n<p>技能让 AI 会做事，DataHub 让专家能读数据。但还有一个关键问题没解决：<strong>AI 怎么操作你的业务系统</strong>？</p>\n<p>比如：<br />\n- 怎么在 OA 里发起一个审批？<br />\n- 怎么在 CRM 里创建一个客户？<br />\n- 怎么在 ERP 里查询库存？</p>\n<p>这些系统的 API 千差万别，鉴权方式各异、参数命名不统一、返回格式五花八门。如果每一个都要单独开发对接，企业根本吃不消。</p>\n<p><strong>连接器（Connector）就是解决这个问题的</strong>。它让 WPS Comate 能够通过标准化的方式接入并操作企业的 OA、CRM、ERP 等业务系统，而且<strong>企业不需要改造现有信息系统</strong>。</p>\n<blockquote>\n<p><strong>一句话理解</strong>：连接器是 AI 和业务系统之间的万能转接头。一次配置，AI 就能像操作自己内部的工具一样操作你的所有系统。</p>\n</blockquote>\n<h2 id=\"apihub\">APIHub：四步标准化接入流程</h2>\n<p>连接器的核心是 <strong>APIHub</strong>，它用四步标准流程把任意业务系统的 API 变成 AI 可调用的能力。</p>\n<h3 id=\"1\">第 1 步：创建连接模板</h3>\n<p>连接模板定义了目标系统的 API 列表和鉴权方式。管理员在 Comate Studio 中按以下步骤创建：</p>\n<ol>\n<li>进入左侧菜单「连接」→「连接模板」，点击右上角「新建连接模板」</li>\n<li>填写基础信息：模板名称（如\"GitLab 代码仓\"）、连接类型（默认选择「API 连接」）、上游地址（如 <code>https://gitlab.example.com</code>）、描述（可选）</li>\n<li>配置凭据类型：从下拉列表选择认证方式（如 <code>custom_header</code> 自定义请求头、<code>bearer_token</code> 等），按类型配置表单字段</li>\n<li>点击「创建模板」完成</li>\n</ol>\n<p><img alt=\"\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_7_章_连接器：让_AI_接入你的业务系统/img_075.png\" /></p>\n<p>两种创建方式：</p>\n<ul>\n<li><strong>手动配置</strong>：在界面上逐条添加 API 的路径、方法（GET/POST/PUT/DELETE）、参数、返回值。</li>\n<li><strong>导入 OpenAPI 3 YAML</strong>：如果你已经有 Swagger/OpenAPI 文档，直接上传 YAML 文件，APIHub 会自动解析并生成模板。</li>\n</ul>\n<table>\n<thead>\n<tr>\n<th>创建方式</th>\n<th>适用场景</th>\n<th>优点</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>手动配置</td>\n<td>没有 API 文档、需要少量 API</td>\n<td>灵活，可按需增减</td>\n</tr>\n<tr>\n<td>导入 YAML</td>\n<td>已有 OpenAPI 规范文件</td>\n<td>快速，一次性导入全部 API</td>\n</tr>\n</tbody>\n</table>\n<h3 id=\"2-api\">第 2 步：管理 API</h3>\n<p>模板创建好后，进入 API 管理环节，对每条 API 做精细配置。</p>\n<p><strong>新增 API</strong>：在连接详情页点击「新增 API」，弹出创建弹窗。支持通过 OpenAPI 3 YAML 导入接口定义，系统自动解析并生成请求/响应参数文档，大幅减少手动配置成本。也可手动填写 API 名称、请求方法（GET/POST/PUT/DELETE 等）、请求路径和描述。</p>\n<p><img alt=\"\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_7_章_连接器：让_AI_接入你的业务系统/img_076.png\" /></p>\n<p>三项核心配置：</p>\n<p><strong>配置请求/响应参数</strong>：定义每条 API 的入参和出参。比如\"发起审批\"接口，入参是审批类型、申请人、金额、理由；出参是审批单号和状态。进入 API 详情页，可手动补充或修改参数配置：</p>\n<ul>\n<li>请求参数：支持配置 Path 参数、Query 参数、Body 参数、Header 参数，支持定义参数类型、示例值、说明</li>\n<li>响应参数：配置成功响应的 HTTP 状态码、Content-Type，定义响应数据模型</li>\n</ul>\n<p><img alt=\"\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_7_章_连接器：让_AI_接入你的业务系统/img_077.png\" /></p>\n<p><strong>绑定预处理脚本</strong>：有些系统的 API 不是\"拿来就能调\"的。APIHub 支持 <strong>Lua 脚本</strong>在请求前后做数据加工：<br />\n- 请求前：把 AI 出的自然语言参数转成 API 要求的格式<br />\n- 请求后：把 API 返回的原始数据转成 AI 能理解的描述</p>\n<p>管理员在 API 详情页的「绑定脚本」模块点击「编辑」，进入脚本编辑弹窗，填写脚本说明后编写 Lua 脚本，也可从文件导入。保存后脚本将在该 API 请求发送前自动执行。</p>\n<p><img alt=\"\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_7_章_连接器：让_AI_接入你的业务系统/img_078.png\" /></p>\n<p><strong>动态鉴权</strong>：尤其重要。很多企业系统的 Token 需要定期刷新、临时获取或通过复杂流程生成。Lua 脚本可以在每次调用前自动获取最新 Token，而不是写死一个会过期的 Key。</p>\n<blockquote>\n<p><strong>提示</strong>：Lua 脚本是连接器的\"润滑剂\"。如果你的系统 API 比较标准（RESTful + 固定 Token），可以不用脚本。但企业级系统几乎都需要用它来处理鉴权和格式转换。</p>\n</blockquote>\n<p><strong>Skill 能力定义</strong>：配置完 API 后，可以为当前模板绑定 Skill 能力，使连接器具备的业务能力能被专家自动识别并调用。管理员在连接模板详情页的「Skill 能力」模块中，为每条 API 定义功能特性说明，供 AI Agent 在运行时自动匹配和调用。</p>\n<p><img alt=\"\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_7_章_连接器：让_AI_接入你的业务系统/img_079.png\" /></p>\n<h3 id=\"3\">第 3 步：创建连接凭证</h3>\n<p>API 的配置（模板）和密钥（凭证）要分开管理——这是企业级架构的基本原则。</p>\n<p>管理员创建连接凭证的操作步骤：</p>\n<ol>\n<li>进入左侧菜单「连接」→「连接凭证」，点击右上角「新建凭证」</li>\n<li>选择关联模板（必须与第 1 步创建的模板对应）</li>\n<li>填写凭证信息：凭证名称（如\"GitLab 生产环境 Token\"）、按模板配置的字段填写身份信息（如 Token 值）</li>\n<li>可选设置过期时间（过期后凭证自动失效）</li>\n<li>点击「创建凭证」完成</li>\n</ol>\n<p><img alt=\"\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_7_章_连接器：让_AI_接入你的业务系统/img_080.png\" /></p>\n<p>连接凭证集中托管以下信息：<br />\n- API Key<br />\n- Access Token<br />\n- OAuth Client ID / Secret<br />\n- 签名密钥<br />\n- 自定义 Header 认证信息</p>\n<p>所有凭证加密存储，明文不可见。配置团队和调用团队的权限是隔离的——管钥匙的人不写代码，写代码的人看不到钥匙。</p>\n<blockquote>\n<p><strong>安全原则</strong>：凭证与配置解耦。即使配置被导出或分享，也不会泄露密钥。这是企业安全合规的基本要求。</p>\n</blockquote>\n<h3 id=\"4\">第 4 步：创建连接器实例</h3>\n<p>最后一步，把模板和凭证组合起来，生成一个<strong>可用的连接器实例</strong>。</p>\n<p>管理员创建连接器实例的操作步骤：</p>\n<ol>\n<li>进入左侧菜单「连接」→「连接器」，点击右上角「新建连接器」</li>\n<li>选择已创建的连接模板，点击「下一步」</li>\n<li>填写连接器信息：连接器名称（如\"PMS（专家版）\"）、选择对应的连接凭证</li>\n<li>点击「创建连接器」，完成后即可在列表中查看</li>\n</ol>\n<p><img alt=\"\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_7_章_连接器：让_AI_接入你的业务系统/img_081.png\" /></p>\n<p>一个模板可以绑定多套凭证，生成多个连接器实例：<br />\n- 测试环境连接器：绑定测试系统的凭证<br />\n- 生产环境连接器：绑定生产系统的凭证<br />\n- 不同区域连接器：绑定不同区域的系统实例</p>\n<p>连接器实例创建后，可以<strong>绑定到技能或专家</strong>，让 AI 具备操作该业务系统的能力。</p>\n<h2 id=\"_2\">连接器与数据治理的协同闭环</h2>\n<p>连接器不只是\"让 AI 能调 API\"。它还是企业数据治理的重要一环。</p>\n<p>WPS Comate 中的三层数据关系：</p>\n<table>\n<thead>\n<tr>\n<th>层次</th>\n<th>组件</th>\n<th>职责</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>数据读取</td>\n<td>DataHub</td>\n<td>连接数据库→让 AI 读懂数据</td>\n</tr>\n<tr>\n<td>数据操作</td>\n<td>连接器</td>\n<td>连接业务系统 API→让 AI 操作系统</td>\n</tr>\n<tr>\n<td>数据治理</td>\n<td>权限体系</td>\n<td>控制谁能看什么、能做什么</td>\n</tr>\n</tbody>\n</table>\n<p>三层协同形成闭环：DataHub 让 AI 知道\"现在是什么情况\"，连接器让 AI 能\"按情况采取行动\"，权限体系管住\"什么事它能做\"。</p>\n<h2 id=\"_3\">连接器的权限管理</h2>\n<p>连接器不是\"装上就能用全场\"。它的权限严格遵守<strong>最小权限原则</strong>。</p>\n<h3 id=\"iamrbac\">继承现有 IAM/RBAC 体系</h3>\n<p>连接器不创建新的账号体系，而是<strong>继承企业现有的身份和权限管理</strong>：</p>\n<ul>\n<li><strong>LDAP/AD 认证</strong>：员工登录 WPS Comate 后，连接器自动获取其企业身份</li>\n<li><strong>RBAC 角色权限</strong>：财务角色的用户，连接器只开放财务相关 API；销售角色只开放销售相关 API</li>\n<li><strong>审批流程</strong>：敏感操作（如大额审批、合同签署）可以触发企业的审批流程</li>\n</ul>\n<h3 id=\"_4\">权限粒度</h3>\n<p>连接器的权限在 Comate Studio 的角色管理中统一配置，支持四层粒度控制：</p>\n<table>\n<thead>\n<tr>\n<th>粒度</th>\n<th>说明</th>\n<th>示例</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>连接器级</td>\n<td>谁能使用这个连接器</td>\n<td>只有财务部成员能使用\"财务系统连接器\"</td>\n</tr>\n<tr>\n<td>API 级</td>\n<td>连接器内哪些 API 可用</td>\n<td>可以查询报销单，但不能发起付款</td>\n</tr>\n<tr>\n<td>字段级</td>\n<td>API 返回哪些字段可见</td>\n<td>可以看到报销金额，但看不到报销人的银行卡号</td>\n</tr>\n<tr>\n<td>操作级</td>\n<td>读/写权限分离</td>\n<td>只能查询客户信息，不能修改或删除</td>\n</tr>\n</tbody>\n</table>\n<h3 id=\"_5\">审计日志</h3>\n<p>所有通过连接器的 API 调用都有完整日志：<br />\n- 谁在什么时间调了什么接口<br />\n- 传了什么参数，返回了什么结果<br />\n- 是否成功，耗时多少</p>\n<blockquote>\n<p><strong>合规要求</strong>：连接器日志支持对接企业 SIEM/SOC 系统，满足等保和 SOX 合规审计需求。</p>\n</blockquote>\n<h2 id=\"_6\">企业无需改造系统</h2>\n<p>这是连接器最核心的价值主张。</p>\n<p>传统方案要让 AI 对接企业系统，通常需要：<br />\n- 系统改造，增加新的 API 接口<br />\n- 中间件开发，做数据格式转换<br />\n- 安全网关开发，做鉴权对接<br />\n- 每个系统都要单独做一次</p>\n<p><strong>连接器的做法</strong>：直接用系统现有的 API，通过配置模板 + Lua 脚本适配，零改造接入。</p>\n<p>你需要的只是：<br />\n1. 系统的 API 文档（有 OpenAPI YAML 更好）<br />\n2. 系统的访问凭证（API Key 或 Token）<br />\n3. 1-2 个懂该系统接口的人配合配置</p>\n<blockquote>\n<p><strong>真实场景</strong>：一家 200 人的公司，有 OA、CRM、财务三个系统。用连接器接入只需一天，不用写一行代码。</p>\n</blockquote>\n<h2 id=\"mcp-mcp\">MCP 连接：支持 MCP 协议接入</h2>\n<p>除了标准的 REST API 连接，WPS Comate 还支持 <strong>MCP（Model Context Protocol）</strong> 协议接入。MCP 是一种面向大模型应用的标准化上下文协议，支持将 MCP Server 的能力直接接入 Comate 的专家体系。</p>\n<h3 id=\"mcp\">创建 MCP 连接模板</h3>\n<ol>\n<li>在左侧导航栏点击「连接」→「连接模板」，点击右上角「新建连接模板」</li>\n<li>填写模板信息：</li>\n</ol>\n<table>\n<thead>\n<tr>\n<th>字段</th>\n<th>说明</th>\n<th>示例</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>模板名称</td>\n<td>目标系统的名称</td>\n<td>企查查</td>\n</tr>\n<tr>\n<td>连接类型</td>\n<td>选择「MCP」</td>\n<td>MCP 连接</td>\n</tr>\n<tr>\n<td>MCP Server URL</td>\n<td>完整的 MCP Server 端点地址，路径部分会自动拆分为 API Route</td>\n<td><code>https://mcp.tianyancha.com/v1</code></td>\n</tr>\n<tr>\n<td>模板描述</td>\n<td>简要说明用途</td>\n<td>查询企业信息</td>\n</tr>\n<tr>\n<td>模板开场词</td>\n<td>Comate 对话中展示给用户的连接器开场词</td>\n<td>帮我查询金山软件公司的工商信息</td>\n</tr>\n<tr>\n<td>凭据配置</td>\n<td>选择凭据类型并定义字段</td>\n<td>根据目标系统要求配置</td>\n</tr>\n</tbody>\n</table>\n<ol start=\"3\">\n<li>点击「确定」完成创建</li>\n</ol>\n<p><img alt=\"\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_7_章_连接器：让_AI_接入你的业务系统/img_082.png\" /></p>\n<h3 id=\"mcp_1\">创建 MCP 连接器</h3>\n<p>MCP 模板创建完成后，在连接器页面基于模板创建连接器实例：</p>\n<table>\n<thead>\n<tr>\n<th>字段</th>\n<th>说明</th>\n<th>示例</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>关联模板</td>\n<td>选择已创建的 MCP 连接模板</td>\n<td>天眼查 MCP</td>\n</tr>\n<tr>\n<td>关联凭证</td>\n<td>选择已创建的连接凭证或新建凭证</td>\n<td>client id</td>\n</tr>\n<tr>\n<td>连接器名称</td>\n<td>便于识别的名称</td>\n<td>天眼查 MCP 的连接器</td>\n</tr>\n<tr>\n<td>描述</td>\n<td>可选</td>\n<td>查询企业信息</td>\n</tr>\n</tbody>\n</table>\n<p><img alt=\"\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_7_章_连接器：让_AI_接入你的业务系统/img_083.png\" /></p>\n<p>MCP 连接器创建后，调用方式与 API 连接器一致，可直接绑定到专家使用。</p>\n<h2 id=\"faq\">常见问题 FAQ</h2>\n<p><strong>Q：连接器支持哪些协议？</strong><br />\nA：核心支持 REST API（HTTP/HTTPS）。对于 SOAP、GraphQL、gRPC 等协议，可通过预处理 Lua 脚本适配。</p>\n<p><strong>Q：Lua 脚本不会写怎么办？</strong><br />\nA：连接器内置了常用场景的脚本模板（动态鉴权、格式转换、参数映射）。大多数情况下直接套用模板即可，不需要从零写。</p>\n<p><strong>Q：连接器和技能是什么关系？</strong><br />\nA：连接器提供系统的 API 调用能力，技能封装具体的业务逻辑。一个技能可以调用多个连接器。比如\"请假审批技能\"同时调了 OA 连接器（发起审批）和邮件连接器（发送通知）。</p>\n<p><strong>Q：API 调用失败了怎么办？</strong><br />\nA：连接器有重试机制和降级策略。遇到失败会返回可读的错误描述给 AI，AI 可以理解并告知用户原因，或自动尝试备选方案。</p>\n<p><strong>Q：连接器能处理高并发吗？</strong><br />\nA：APIHub 内置了限流和排队机制。对于有 QPS 限制的企业系统，连接器能自动控制调用频率，避免打爆别人的服务器。</p>\n<h2 id=\"_7\">本章小结</h2>\n<ul>\n<li>连接器解决的根本问题：AI 如何操作企业已有的业务系统</li>\n<li>APIHub 四步接入：创建模板 → 管理 API → 创建凭证 → 创建实例</li>\n<li>支持导入 OpenAPI 3 YAML 快速生成模板</li>\n<li>Lua 脚本是处理动态鉴权和格式转换的关键能力</li>\n<li>连接器与 DataHub、权限体系协同形成数据治理闭环</li>\n<li>无需改造现有系统，基于系统现有 API 零代码接入</li>\n<li>权限继承企业 IAM/RBAC 体系，支持连接器级、API 级、字段级、操作级四层控制</li>\n<li>支持 MCP 协议接入，通过 MCP Server URL 和凭据配置即可创建 MCP 连接器</li>\n</ul>", "part": "第一篇 使用手册：先把 WPS Comate 用起来", "chapter_num": 7, "prev": "第_6_章_专家数字员工", "next": "第_8_章_团队空间：多人多_Agent_协同工作"}, "第_8_章_团队空间：多人多_Agent_协同工作": {"title": "第 8 章 团队空间：多人多 Agent 协同工作", "html": "<h2 id=\"_1\">团队空间是什么</h2>\n<p>前面几章，我们一直在讲\"一个人 + AI\"的协作模式。但现实工作中，绝大部分任务不是一个人能完成的。一份周报需要多人提供素材，一个审批需要跨部门流转，一个项目需要多个角色配合。</p>\n<p><strong>团队空间</strong>就是为此而生。它将 AI 能力从个人助手升级为<strong>团队基础设施</strong>，让多人、多 Agent 在同一空间内协同工作。</p>\n<p><img alt=\"团队空间概览\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_8_章_团队空间：多人多_Agent_协同工作/072_team.png\" /></p>\n<blockquote>\n<p><strong>一句话理解</strong>：个人助手是你和 AI 的二人转，团队空间是一个有 AI 同事加入的完整剧组。分工、协作、沉淀，都在一个地方。</p>\n</blockquote>\n<h2 id=\"-\">三大模块：管理-协作-沉淀闭环</h2>\n<p>团队空间的架构围绕三个核心模块展开：</p>\n<p><img alt=\"三大模块\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_8_章_团队空间：多人多_Agent_协同工作/073_team.png\" /></p>\n<table>\n<thead>\n<tr>\n<th>模块</th>\n<th>做什么</th>\n<th>解决什么问题</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>团队管理</td>\n<td>建团队、管成员、分角色</td>\n<td>\"谁能一起用\"</td>\n</tr>\n<tr>\n<td>团队协作任务</td>\n<td>多人多 Agent 围绕主题协作</td>\n<td>\"怎么一起干\"</td>\n</tr>\n<tr>\n<td>团队资源</td>\n<td>技能、应用、Wiki、自动化、资产的统一管理</td>\n<td>\"干完之后留下什么\"</td>\n</tr>\n</tbody>\n</table>\n<p>三者形成闭环：团队管理搭好舞台 → 协作任务上演工作流 → 资源模块把成果沉淀为团队资产。下一次协作，直接在资产基础上继续，不再从零开始。</p>\n<p><img alt=\"闭环\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_8_章_团队空间：多人多_Agent_协同工作/074_team.png\" /></p>\n<h2 id=\"_2\">团队管理</h2>\n<h3 id=\"_3\">创建团队</h3>\n<p>在侧边栏点击\"创建团队\"开始：</p>\n<p><img alt=\"创建团队\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_8_章_团队空间：多人多_Agent_协同工作/075_team.png\" /></p>\n<p>需要设置：<br />\n- <strong>团队名称</strong>：建议用部门名或项目名，方便识别<br />\n- <strong>团队简介</strong>：简要说明团队的目标和协作范围<br />\n- <strong>关联云文档团队</strong>：绑定 WPS 云文档的团队空间，协作任务产出的文档自动存储到云文档</p>\n<p><img alt=\"创建团队配置\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_8_章_团队空间：多人多_Agent_协同工作/076_team.png\" /></p>\n<p>创建完成后，你会成为该团队的\"拥有者\"。</p>\n<h3 id=\"_4\">三类角色</h3>\n<p>团队空间有三种角色，各司其职：</p>\n<p><img alt=\"角色管理\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_8_章_团队空间：多人多_Agent_协同工作/077_team.png\" /></p>\n<table>\n<thead>\n<tr>\n<th>角色</th>\n<th>能做什么</th>\n<th>适用人群</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>拥有者</td>\n<td>管理团队、删除团队、分配管理员</td>\n<td>部门负责人 / 项目负责人</td>\n</tr>\n<tr>\n<td>管理员</td>\n<td>管理成员、审核申请、管理团队资源</td>\n<td>团队主管 / PM</td>\n</tr>\n<tr>\n<td>成员</td>\n<td>创建和参与协作任务、使用团队资源</td>\n<td>团队成员</td>\n</tr>\n</tbody>\n</table>\n<p>所有操作都有操作日志，确保团队变更有迹可循。</p>\n<h3 id=\"_5\">邀请与审批</h3>\n<p><img alt=\"邀请成员\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_8_章_团队空间：多人多_Agent_协同工作/078_team.png\" /></p>\n<p>添加成员有两种方式：<br />\n- <strong>直接邀请</strong>：输入成员账号名，一键拉入<br />\n- <strong>链接邀请</strong>：生成邀请链接，通过 IM 或邮件发送</p>\n<p>成员加入后，可以在成员列表看到每个人的角色和活跃状态。</p>\n<p><img alt=\"成员列表\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_8_章_团队空间：多人多_Agent_协同工作/079_team.png\" /></p>\n<h3 id=\"_6\">团队设置</h3>\n<p><img alt=\"团队设置\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_8_章_团队空间：多人多_Agent_协同工作/080_team.png\" /></p>\n<p>管理员可以配置：<br />\n- 团队头像和名称修改<br />\n- 成员加入方式（开放加入 / 需审批）<br />\n- 对外可见性（是否在搜索中展示）<br />\n- 数据统计开关<br />\n- Token 消耗上限</p>\n<h2 id=\"_7\">团队协作任务</h2>\n<h3 id=\"_8\">什么是团队协作任务</h3>\n<p>个人任务是你和 AI 的一对一对话。团队协作任务是把任务上升到团队层面：<strong>以主题为中心，多人、多 Agent 共同参与</strong>。</p>\n<p><img alt=\"协作任务概览\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_8_章_团队空间：多人多_Agent_协同工作/081_team.png\" /></p>\n<h3 id=\"_9\">创建团队任务</h3>\n<p>在团队空间内点击\"新建任务\"：</p>\n<p><img alt=\"新建任务\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_8_章_团队空间：多人多_Agent_协同工作/082_team.png\" /></p>\n<p>需要设置：<br />\n- <strong>任务主题</strong>：清晰描述要完成什么（比如\"Q3 产品发布会筹备\"）<br />\n- <strong>任务描述</strong>：补充背景信息和具体需求<br />\n- <strong>添加协作者</strong>：选择参与的团队成员<br />\n- <strong>添加 Agent</strong>：选择需要参与这个任务的 AI Agent（可选添加团队专家）</p>\n<h3 id=\"_10\">任务沙箱机制</h3>\n<p>每个团队任务运行在自己的\"沙箱\"中：</p>\n<p><img alt=\"任务沙箱\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_8_章_团队空间：多人多_Agent_协同工作/083_team.png\" /></p>\n<p>沙箱自动装载：<br />\n- <strong>团队共享技能</strong>：团队空间中配置的所有技能<br />\n- <strong>团队知识库/Wiki</strong>：团队沉淀的文档和知识<br />\n- <strong>团队专家</strong>：团队创建的专家数字员工<br />\n- <strong>任务上下文</strong>：任务中所有人的对话和产出</p>\n<blockquote>\n<p><strong>关键设计</strong>：沙箱让每个任务有独立的上下文环境。任务 A 的对话不会干扰任务 B，但两个任务可以共享团队的资源和资产。</p>\n</blockquote>\n<h3 id=\"agent\">多 Agent 协同</h3>\n<p>任务中可以添加多个 AI Agent 协同工作：</p>\n<p><img alt=\"多Agent协同-添加\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_8_章_团队空间：多人多_Agent_协同工作/084_team.png\" /></p>\n<p>典型的分工场景：</p>\n<table>\n<thead>\n<tr>\n<th>任务</th>\n<th>参加的 Agent</th>\n<th>分工</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>市场方案撰写</td>\n<td>文案专家 + 数据分析专家</td>\n<td>文案写方案正文，数据专家附数据支撑</td>\n</tr>\n<tr>\n<td>技术方案评审</td>\n<td>架构专家 + 安全专家</td>\n<td>架构审结构，安全审风险</td>\n</tr>\n<tr>\n<td>客户提案准备</td>\n<td>行业专家 + 设计专家</td>\n<td>行业专家提供洞察，设计专家生成图表</td>\n</tr>\n</tbody>\n</table>\n<p>多 Agent 在同一个对话上下文中协作——一个 Agent 的输出可以成为另一个 Agent 的输入。</p>\n<p><img alt=\"多Agent协同-对话\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_8_章_团队空间：多人多_Agent_协同工作/085_team.png\" /></p>\n<h3 id=\"_11\">任务管理</h3>\n<p><img alt=\"任务管理\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_8_章_团队空间：多人多_Agent_协同工作/086_team.png\" /></p>\n<p>团队管理员可以：<br />\n- 查看所有进行中的任务<br />\n- 分配任务参与者<br />\n- 归档已完成的任务<br />\n- 从已完成任务中提取经验沉淀到团队 Wiki</p>\n<h2 id=\"_12\">团队资源</h2>\n<p>团队资源是\"协作之后留下了什么\"——这是团队空间区别于临时协作的关键。</p>\n<h3 id=\"_13\">技能共享</h3>\n<p><img alt=\"技能共享\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_8_章_团队空间：多人多_Agent_协同工作/087_team.png\" /></p>\n<p>团队管理员可以将技能共享到团队空间：<br />\n- 一个人安装和配置的技能，变成全团队可用的共享能力<br />\n- 任务沙箱自动加载共享技能<br />\n- 技能更新后团队内自动同步</p>\n<blockquote>\n<p><strong>价值</strong>：不再每个人重复配置。一个人搞定，全团队受益。</p>\n</blockquote>\n<h3 id=\"_14\">应用发布</h3>\n<p><img alt=\"应用发布\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_8_章_团队空间：多人多_Agent_协同工作/088_team.png\" /></p>\n<p>基于团队任务成果，可以将高频任务模板发布为\"应用\"：<br />\n- 比如把\"周报生成\"任务发布为应用，团队成员一键使用<br />\n- 应用封装了提示词、技能组合和输出格式<br />\n- 降低重复任务的门槛</p>\n<p><img alt=\"应用列表\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_8_章_团队空间：多人多_Agent_协同工作/089_team.png\" /></p>\n<h3 id=\"wiki\">Wiki 引用</h3>\n<p><img alt=\"Wiki引用\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_8_章_团队空间：多人多_Agent_协同工作/090_team.png\" /></p>\n<p>团队 Wiki 是知识沉淀的载体：<br />\n- 团队的项目方案、会议纪要、经验总结都可以存到 Wiki<br />\n- 任务中的 AI Agent 可以自动引用 Wiki 内容作为上下文<br />\n- 新成员加入团队后，AI 自动根据 Wiki 内容回答常见问题</p>\n<p><img alt=\"Wiki内容\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_8_章_团队空间：多人多_Agent_协同工作/091_team.png\" /></p>\n<blockquote>\n<p><strong>价值</strong>：Wiki 是团队的\"集体记忆\"。人可能离职，但知识和经验留在 Wiki 里，AI Agent 可以继续使用。</p>\n</blockquote>\n<h3 id=\"_15\">自动化</h3>\n<p><img alt=\"自动化\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_8_章_团队空间：多人多_Agent_协同工作/092_team.png\" /></p>\n<p>在团队层面配置自动化任务：<br />\n- 团队成员创建的自动化任务自动归入团队自动化列表<br />\n- 管理员可以统一管理和监控<br />\n- 定时任务产出可以直接存入团队资产库</p>\n<p>（自动化详见第 9 章）</p>\n<h3 id=\"_16\">资产：文档自动存储</h3>\n<p><img alt=\"资产\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_8_章_团队空间：多人多_Agent_协同工作/093_team.png\" /></p>\n<p>团队任务中产出的文档、表格、演示文稿会自动存储到绑定的云文档团队：<br />\n- 按任务自动归类<br />\n- 支持版本回溯<br />\n- 成员按权限访问</p>\n<p><img alt=\"文档存储\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_8_章_团队空间：多人多_Agent_协同工作/094_team.png\" /></p>\n<p><img alt=\"资产浏览\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_8_章_团队空间：多人多_Agent_协同工作/095_team.png\" /></p>\n<h2 id=\"_17\">数据统计</h2>\n<p>团队空间提供数据看板，让管理者了解团队的 AI 使用情况：</p>\n<p><img alt=\"数据统计\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_8_章_团队空间：多人多_Agent_协同工作/096_team.png\" /></p>\n<table>\n<thead>\n<tr>\n<th>统计维度</th>\n<th>内容</th>\n<th>用途</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>成员活跃度</td>\n<td>每个人的任务创建数、参与数、活跃天数</td>\n<td>了解团队使用情况</td>\n</tr>\n<tr>\n<td>任务量统计</td>\n<td>任务总数、完成数、进行中数、平均完成周期</td>\n<td>评估协作效率</td>\n</tr>\n<tr>\n<td>Token 消耗</td>\n<td>按任务/按人/按时间统计 Token 消耗</td>\n<td>控制成本、识别高频场景</td>\n</tr>\n</tbody>\n</table>\n<p><img alt=\"活跃度\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_8_章_团队空间：多人多_Agent_协同工作/097_team.png\" /><br />\n<img alt=\"任务统计\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_8_章_团队空间：多人多_Agent_协同工作/098_team.png\" /><br />\n<img alt=\"Token消耗\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_8_章_团队空间：多人多_Agent_协同工作/099_team.png\" /></p>\n<blockquote>\n<p><strong>管理价值</strong>：数据看板回答了\"投入 AI 后到底有没有用\"这个问题。不是凭感觉，是看数据。</p>\n</blockquote>\n<h2 id=\"_18\">最佳实践</h2>\n<h3 id=\"_19\">实践一：基于部门小组创建团队</h3>\n<p><img alt=\"部门团队\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_8_章_团队空间：多人多_Agent_协同工作/106_team.png\" /></p>\n<p><strong>场景</strong>：市场部 8 个人，日常工作涉及方案撰写、竞品分析、活动策划。</p>\n<p><strong>做法</strong>：<br />\n1. 创建\"市场部\"团队空间，绑定市场部云文档<br />\n2. 共享技能：PPT 生成、竞品数据采集、邮件撰写<br />\n3. 创建专家：市场方案专家、竞品分析专家<br />\n4. 日常任务按主题创建协作任务，多人多 Agent 参与</p>\n<p><strong>效果</strong>：方案产出效率提升 60%，竞品分析从周更变为日更。</p>\n<h3 id=\"_20\">实践二：基于项目创建临时团队</h3>\n<p><img alt=\"项目团队\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_8_章_团队空间：多人多_Agent_协同工作/109_team.png\" /></p>\n<p><strong>场景</strong>：要启动一个跨部门的产品发布会项目，参与人来自市场、产品、设计三个部门，工期 2 个月。</p>\n<p><strong>做法</strong>：<br />\n1. 创建\"Q3 发布会\"临时团队，协作人拉入跨部门成员<br />\n2. 为项目创建专属 Agent：活动筹备专家、物料设计专家<br />\n3. 创建多个协作任务：策划方案、设计物料、演讲稿撰写、媒体通稿<br />\n4. 项目结束后归档团队，Wiki 和资产保留供未来参考</p>\n<p><strong>效果</strong>：跨部门沟通成本降低 70%，所有产出自动归入项目文档库。</p>\n<h3 id=\"_21\">实践三：基于客户创建团队</h3>\n<p><img alt=\"客户团队\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_8_章_团队空间：多人多_Agent_协同工作/112_team.png\" /></p>\n<p><strong>场景</strong>：服务大客户的专属团队（销售 + 售前 + 客户成功），需要长期跟踪客户需求和项目进展。</p>\n<p><strong>做法</strong>：<br />\n1. 创建以客户名称命名的团队空间<br />\n2. 将 DataHub 中的该客户业务数据接入团队专家<br />\n3. 客户拜访方案、提案、合同等都在团队协作任务中完成<br />\n4. Wiki 沉淀该客户的项目经验和解决方案</p>\n<p><strong>效果</strong>：客户需求响应速度提升 50%，即使人员变动，客户历史和对策完整保留。</p>\n<h2 id=\"agent_1\">多 Agent 协同：进阶玩法</h2>\n<h3 id=\"_22\">串行协同</h3>\n<p>一个 Agent 完成第一步，结果交给下一个 Agent 继续：</p>\n<p><img alt=\"串行协同\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_8_章_团队空间：多人多_Agent_协同工作/115_team.png\" /></p>\n<blockquote>\n<p>\"市场方案专家\"先出策略框架 → \"数据专家\"补充市场数据 → \"文案专家\"生成终稿。</p>\n</blockquote>\n<h3 id=\"_23\">并行协同</h3>\n<p>多个 Agent 同时从不同维度工作：</p>\n<p><img alt=\"并行协同\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_8_章_团队空间：多人多_Agent_协同工作/116_team.png\" /></p>\n<blockquote>\n<p>\"技术专家\"审查技术方案 + \"安全专家\"评估安全风险 + \"成本专家\"核算预算——三个 Agent 并行，产出在同一个对话中汇总。</p>\n</blockquote>\n<h3 id=\"_24\">人机混合</h3>\n<p>人和 Agent 在同一任务中交替协作：</p>\n<p><img alt=\"人机混合\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_8_章_团队空间：多人多_Agent_协同工作/117_team.png\" /></p>\n<blockquote>\n<p>Agent 先出初稿 → 人类审阅并提供修改意见 → Agent 根据意见修改 → 人类最终确认。</p>\n<p><strong>最佳配比</strong>：Agent 负责\"出\"（快速产出初稿和数据支撑），人负责\"断\"（判断、决策、质量把关）。</p>\n</blockquote>\n<h2 id=\"faq\">常见问题 FAQ</h2>\n<p><img alt=\"FAQ-1\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_8_章_团队空间：多人多_Agent_协同工作/118_team.png\" /><br />\n<img alt=\"FAQ-2\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_8_章_团队空间：多人多_Agent_协同工作/119_team.png\" /><br />\n<img alt=\"FAQ-3\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_8_章_团队空间：多人多_Agent_协同工作/120_team.png\" /></p>\n<p><strong>Q：团队空间和云文档团队有什么关系？</strong><br />\nA：团队空间是 AI 协作的工作台，云文档团队是文档的存储位置。两者绑定后，协作产出的文档自动存储到云文档，团队成员可以在云文档中直接访问和编辑。</p>\n<p><strong>Q：一个人可以加入多个团队空间吗？</strong><br />\nA：可以。每个人可以同时是多个团队的成员。在侧边栏切换团队空间即可。</p>\n<p><strong>Q：Agent 能看到所有对话内容吗？</strong><br />\nA：Agent 只能看到它所在的任务沙箱内的对话。任务之间上下文隔离。同一个团队空间的不同任务，Agent 看不到彼此的内容。</p>\n<p><strong>Q：团队 Wiki 和个人的知识库有什么区别？</strong><br />\nA：个人知识库是你自己的，别人看不到也搜不到。团队 Wiki 是共享的，团队内的所有人（包括 Agent）都能引用。Wiki 是团队知识的\"公共货架\"。</p>\n<p><strong>Q：临时团队用完可以删除吗？</strong><br />\nA：可以归档（推荐）或删除。归档保留所有文档和对话记录；删除会清空数据。建议至少归档，不要直接删除——未来怎么知道什么时候用得上。</p>\n<p><strong>Q：Token 消耗怎么分摊？</strong><br />\nA：团队空间按团队统计 Token 消耗，管理员可以在数据看板看到每个人的用量。企业按团队做预算管理，超支可以设置提醒或上限。</p>\n<h2 id=\"_25\">本章小结</h2>\n<ul>\n<li>团队空间将 AI 从个人助手升级为团队基础设施，支持多人多 Agent 协同</li>\n<li>三大模块：团队管理（搭舞台）、协作任务（演戏）、团队资源（沉淀资产）</li>\n<li>三种角色：拥有者、管理员、成员，各有明确权限</li>\n<li>任务沙箱自动加载团队技能和知识库，任务间上下文隔离</li>\n<li>多 Agent 支持串行、并行、人机混合三种协同模式</li>\n<li>三种最佳实践：部门团队（常态协作）、项目团队（阶段性协作）、客户团队（长期跟踪）</li>\n<li>数据看板让 AI 投入产出有据可查</li>\n</ul>\n<blockquote>\n<p><strong>[待补充配图汇总]</strong>：本章所有图片均已引用 assets 目录中实际存在的文件（072_team.png ~ 120_team.png），无需补充。</p>\n</blockquote>", "part": "第一篇 使用手册：先把 WPS Comate 用起来", "chapter_num": 8, "prev": "第_7_章_连接器：让_AI_接入你的业务系统", "next": "第_9_章_自动化：让任务_7×24_小时运转"}, "第_9_章_自动化：让任务_7×24_小时运转": {"title": "第 9 章 自动化：让任务 7×24 小时运转", "html": "<h2 id=\"_1\">自动化的两种类型</h2>\n<p>前面所有章节讲的都是\"人在线，触发 AI\"的模式——你说一句，AI 做一步。但很多任务不需要人守着。比如每天早上 8 点收集行业资讯，每周五下午自动生成周报——这些事，AI 应该自己跑。</p>\n<p>WPS Comate 的自动化支持两种触发方式：</p>\n<p><img alt=\"自动化概览\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_9_章_自动化：让任务_7×24_小时运转/127_auto.png\" /></p>\n<table>\n<thead>\n<tr>\n<th>类型</th>\n<th>触发方式</th>\n<th>典型场景</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>定时任务</td>\n<td>按预设时间自动执行</td>\n<td>每日资讯早报、每周工作周报、每月数据汇总</td>\n</tr>\n<tr>\n<td>触发任务</td>\n<td>事件驱动自动执行</td>\n<td>新日程创建时提醒、新待办生成时分析、收到新邮件时处理</td>\n</tr>\n</tbody>\n</table>\n<h2 id=\"_2\">定时任务</h2>\n<h3 id=\"vs\">云端定时 vs 本地定时</h3>\n<p>定时任务有两种运行模式：</p>\n<p><img alt=\"定时任务类型\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_9_章_自动化：让任务_7×24_小时运转/128_auto.png\" /></p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>云端定时任务</th>\n<th>本地定时任务</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>运行环境</td>\n<td>WPS 云端服务器</td>\n<td>你的本地电脑</td>\n</tr>\n<tr>\n<td>依赖条件</td>\n<td>无需开机、无需登录客户端</td>\n<td>电脑未休眠 + WPS Comate 客户端启动</td>\n</tr>\n<tr>\n<td>适用场景</td>\n<td>数据查询、报告生成、信息推送</td>\n<td>涉及本地文件操作、需要本地软件配合</td>\n</tr>\n<tr>\n<td>错过处理</td>\n<td>不会错过</td>\n<td>错过时自动补偿执行</td>\n</tr>\n<tr>\n<td>推荐度</td>\n<td>优先推荐</td>\n<td>仅在必须操作本地文件时使用</td>\n</tr>\n</tbody>\n</table>\n<blockquote>\n<p><strong>建议</strong>：除非任务必须操作本地文件，否则一律用云端定时。不依赖你的电脑状态，稳定可靠。</p>\n</blockquote>\n<h3 id=\"_3\">创建定时任务</h3>\n<p>三步完成创建：</p>\n<p><strong>第 1 步：点击新建</strong></p>\n<p>在自动化页面点击\"新建定时任务\"。</p>\n<p><img alt=\"新建定时任务\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_9_章_自动化：让任务_7×24_小时运转/129_auto.png\" /></p>\n<p><strong>第 2 步：选择模式</strong></p>\n<p>WPS Comate 支持两种创建方式：</p>\n<p><img alt=\"选择模式\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_9_章_自动化：让任务_7×24_小时运转/130_auto.png\" /></p>\n<ul>\n<li><strong>对话创建</strong>：用自然语言描述需求，AI 自动生成任务配置。适合大多数场景。</li>\n<li><strong>手动配置</strong>：自己填写触发时间、任务内容、执行参数。适合对任务配置有精确要求的场景。</li>\n</ul>\n<blockquote>\n<p><strong>推荐对话创建</strong>。直接说\"每天早上9点帮我收集昨天AI行业的新闻并生成摘要\"，AI 会自动理解你的意图并配置好任务。</p>\n</blockquote>\n<p><strong>第 3 步：确认创建</strong></p>\n<p><img alt=\"确认创建\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_9_章_自动化：让任务_7×24_小时运转/131_auto.png\" /></p>\n<p>AI 会基于你的描述生成任务配置预览：<br />\n- 任务名称<br />\n- 执行时间和频率<br />\n- 执行内容<br />\n- 输出格式和存储位置</p>\n<p>确认无误后点击\"创建\"，任务立即生效。</p>\n<h3 id=\"_4\">定时规则配置</h3>\n<p>定时规则支持多种频率：</p>\n<p><img alt=\"定时规则\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_9_章_自动化：让任务_7×24_小时运转/132_auto.png\" /></p>\n<table>\n<thead>\n<tr>\n<th>频率</th>\n<th>示例</th>\n<th>适合场景</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>每天</td>\n<td>每天 08:00</td>\n<td>每日资讯汇总、晨报生成</td>\n</tr>\n<tr>\n<td>每周</td>\n<td>每周五 17:00</td>\n<td>周报生成、周度数据分析</td>\n</tr>\n<tr>\n<td>每月</td>\n<td>每月 1 号 09:00</td>\n<td>月度报表、月度总结</td>\n</tr>\n<tr>\n<td>自定义</td>\n<td>每 3 小时一次</td>\n<td>高频监控、实时数据更新</td>\n</tr>\n<tr>\n<td>工作日</td>\n<td>周一至周五 09:00</td>\n<td>工作日打卡提醒、日间汇报</td>\n</tr>\n</tbody>\n</table>\n<h3 id=\"_5\">日历视图</h3>\n<p>所有定时任务以日历视图呈现，一目了然：</p>\n<p><img alt=\"日历视图\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_9_章_自动化：让任务_7×24_小时运转/133_auto.png\" /></p>\n<p>日历视图的功能：<br />\n- <strong>按日期查看</strong>：每天有哪些任务会执行<br />\n- <strong>查看执行实例</strong>：每个任务过去每次执行的状态（成功/失败/执行中）<br />\n- <strong>点击查看详情</strong>：点击某个执行实例，查看具体执行结果和输出</p>\n<p><img alt=\"执行实例\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_9_章_自动化：让任务_7×24_小时运转/134_auto.png\" /></p>\n<blockquote>\n<p><strong>实用技巧</strong>：每天早上花 1 分钟看一下日历视图，确认今天会执行的任务是否正常。如果有连续失败的任务，优先排查。</p>\n</blockquote>\n<h3 id=\"_6\">查看执行结果</h3>\n<p>每次任务执行后都可以点进去看详情：</p>\n<p><img alt=\"执行结果\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_9_章_自动化：让任务_7×24_小时运转/135_auto.png\" /></p>\n<p>查看内容：<br />\n- 执行时间、耗时<br />\n- 输出内容（生成的报告、分析的表格）<br />\n- 是否有错误（错误原因和报错信息）<br />\n- 生成的输出文件（如果有）</p>\n<h3 id=\"_7\">暂停和继续</h3>\n<p>如果任务需要临时调整，可以暂停执行：</p>\n<p><img alt=\"暂停任务\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_9_章_自动化：让任务_7×24_小时运转/136_auto.png\" /></p>\n<p>暂停期间任务不会执行，恢复后从下一个触发时间继续。暂停不会丢失任务配置和已执行记录。</p>\n<h3 id=\"_8\">从结果继续对话</h3>\n<p>看到执行结果不满意？可以直接基于结果继续对话优化：</p>\n<p><img alt=\"继续对话\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_9_章_自动化：让任务_7×24_小时运转/137_auto.png\" /></p>\n<blockquote>\n<p>比如周报生成的格式不是你想要的，点击\"继续对话\"后说\"把格式改成按部门分组，每个部门标注完成率\"，AI 会在当前任务上下文的基础上修改配置，下次执行就按新逻辑来。</p>\n</blockquote>\n<h3 id=\"_9\">任务管理</h3>\n<p>自动化页面提供完整的任务管理能力：</p>\n<p><img alt=\"任务管理\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_9_章_自动化：让任务_7×24_小时运转/138_auto.png\" /></p>\n<table>\n<thead>\n<tr>\n<th>操作</th>\n<th>说明</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>立即执行</td>\n<td>不等定时触发，手动执行一次</td>\n</tr>\n<tr>\n<td>编辑</td>\n<td>修改任务配置（名称、时间、内容、输出格式）</td>\n</tr>\n<tr>\n<td>删除</td>\n<td>删除任务和所有执行历史</td>\n</tr>\n<tr>\n<td>启用/停用</td>\n<td>临时开关某个任务</td>\n</tr>\n<tr>\n<td>查看运行历史</td>\n<td>查看该任务所有历史执行记录</td>\n</tr>\n</tbody>\n</table>\n<p><img alt=\"运行历史\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_9_章_自动化：让任务_7×24_小时运转/139_auto.png\" /></p>\n<h2 id=\"_10\">触发任务</h2>\n<p>触发任务不是\"到时间了做\"，而是\"发生了一件事才做\"。它基于<strong>事件驱动</strong>架构。</p>\n<h3 id=\"_11\">支持的触发事件</h3>\n<p><img alt=\"触发事件\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_9_章_自动化：让任务_7×24_小时运转/140_auto.png\" /></p>\n<p>目前支持以下事件类型：</p>\n<table>\n<thead>\n<tr>\n<th>事件源</th>\n<th>触发条件</th>\n<th>自动执行示例</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>新日程</td>\n<td>飞书/日历中创建了新日程</td>\n<td>自动分析日程内容，生成会前准备清单</td>\n</tr>\n<tr>\n<td>新待办</td>\n<td>飞书任务/个人待办中创建了新任务</td>\n<td>自动拆解任务步骤，推荐执行方案</td>\n</tr>\n<tr>\n<td>轻审批</td>\n<td>收到新的审批申请</td>\n<td>自动检查审批内容合规性，标注风险点</td>\n</tr>\n<tr>\n<td>新邮件</td>\n<td>收到新邮件</td>\n<td>自动摘要邮件内容，紧急邮件推送提醒</td>\n</tr>\n<tr>\n<td>会议 AI 纪要</td>\n<td>飞书会议结束后纪要完成</td>\n<td>自动提取待办事项，同步到任务系统</td>\n</tr>\n</tbody>\n</table>\n<h3 id=\"_12\">创建触发任务</h3>\n<p><img alt=\"创建触发任务\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_9_章_自动化：让任务_7×24_小时运转/141_auto.png\" /></p>\n<ol>\n<li>选择触发事件类型（如\"新邮件\"）</li>\n<li>设置触发条件（如\"发件人包含'客户'关键词\"）</li>\n<li>定义执行动作（如\"生成邮件摘要并推送到指定群聊\"）</li>\n<li>绑定执行所需的技能（如邮件解析技能、消息推送技能）</li>\n</ol>\n<p>每次触发事件发生时，自动化任务自动执行。</p>\n<h3 id=\"_13\">触发任务的执行链</h3>\n<p>一个触发任务可以串联多个动作：</p>\n<p><img alt=\"执行链\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_9_章_自动化：让任务_7×24_小时运转/142_auto.png\" /></p>\n<blockquote>\n<p>示例：收到审批邮件 → 自动解析审批内容 → 查询关联预算数据 → 标注异常项 → 将审核意见发送给审批人</p>\n</blockquote>\n<p>这种\"一个事件触发一条自动流水线\"的方式，才是真正的 AI 自动化。</p>\n<h2 id=\"_14\">最佳实践</h2>\n<h3 id=\"_15\">实践一：每日行业资讯早报</h3>\n<p><img alt=\"资讯早报\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_9_章_自动化：让任务_7×24_小时运转/143_auto.png\" /></p>\n<p><strong>需求</strong>：每天早上 9 点前，收集过去 24 小时的行业新闻，生成摘要，发送到团队群。</p>\n<p><strong>配置</strong>：<br />\n1. 创建云端定时任务，每天 08:30 执行<br />\n2. 任务内容：\"搜索昨日的 AI 行业新闻，按「产品发布」「融资」「政策」「技术突破」分类，每类选 3 条最重要的，生成摘要发送到团队飞书群\"<br />\n3. 绑定资讯采集技能和消息推送连接器</p>\n<p><strong>效果</strong>：每天早上 9 点团队准时收到早报，0 人工投入。</p>\n<h3 id=\"_16\">实践二：每周工作周报自动生成</h3>\n<p><img alt=\"周报生成\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_9_章_自动化：让任务_7×24_小时运转/144_auto.png\" /></p>\n<p><strong>需求</strong>：每周五下午 5 点，汇总本周团队在 Comate 中的产出，生成周报草案。</p>\n<p><strong>配置</strong>：<br />\n1. 创建云端定时任务，每周五 17:00 执行<br />\n2. 任务内容：\"汇总本周团队空间中所有已完成的任务，提取关键产出和进展，按项目分组生成周报，存为云文档并分享给团队成员\"<br />\n3. 绑定文档生成技能和团队空间数据</p>\n<p><strong>效果</strong>：周五下班前周报自动出现在云文档里，成员只需做少量补充和确认。</p>\n<h2 id=\"faq\">常见问题 FAQ</h2>\n<p><img alt=\"FAQ\" src=\"img/第一篇_使用手册：先把_WPS_Comate_用起来/第_9_章_自动化：让任务_7×24_小时运转/145_auto.png\" /></p>\n<p><strong>Q：本地定时任务错过了怎么办？</strong><br />\nA：本地定时任务有\"错过补偿\"机制。比如你的任务每天 9:00 执行，但 9:00 时电脑关机了。下次开机并启动 Comate 后，系统会自动补执行一次。云端定时任务不存在这个问题。</p>\n<p><strong>Q：定时任务能设置多个执行时间吗？</strong><br />\nA：可以。同一个任务可以设置多个执行时间。比如\"早 9 点、中 12 点、晚 6 点各一次\"。</p>\n<p><strong>Q：触发任务能同时订阅多个事件吗？</strong><br />\nA：可以。一个触发任务可以订阅多个事件源，当任意一个事件触发时执行。</p>\n<p><strong>Q：自动化任务出错了会通知我吗？</strong><br />\nA：会。任务连续失败或执行异常时，系统会在 Comate 内推送通知。你可以在自动化页面查看失败原因和详细日志。</p>\n<p><strong>Q：定时任务的执行时间是严格精确的吗？</strong><br />\nA：云端定时任务的误差通常在 1 分钟以内。如果当前时间段任务较多，系统会排队执行，可能会有几分钟延迟。</p>\n<p><strong>Q：自动化任务能调用连接器吗？</strong><br />\nA：能。定时任务和触发任务都可以绑定连接器，实现\"定时/事件触发 → 调用企业系统 API\"的完整链路。</p>\n<h2 id=\"_17\">本章小结</h2>\n<ul>\n<li>自动化任务让 AI 在无人值守状态下 7×24 运作</li>\n<li>定时任务分云端和本地两种，优先使用云端定时</li>\n<li>对话式创建：用自然语言描述需求，AI 自动生成任务配置</li>\n<li>日历视图直观查看执行计划和历史状态，可随时暂停/恢复/继续对话优化</li>\n<li>触发任务基于事件驱动（新日程、新待办、审批、邮件、会议纪要）</li>\n<li>两个经典实践：每日资讯早报 + 每周周报自动生成，零人工投入</li>\n<li>错过执行自动补偿，出错自动通知</li>\n</ul>\n<blockquote>\n<p><strong>[待补充配图汇总]</strong>：本章所有图片均已引用 assets 目录中实际存在的文件（127_auto.png ~ 145_auto.png），无需补充。</p>\n</blockquote>", "part": "第一篇 使用手册：先把 WPS Comate 用起来", "chapter_num": 9, "prev": "第_8_章_团队空间：多人多_Agent_协同工作", "next": "课外阅读：一章看懂_AI_操作系统"}, "课外阅读：一章看懂_AI_操作系统": {"title": "课外阅读：一章看懂 AI 操作系统", "html": "<h2 id=\"_1\">不是工具叠加，而是统一底座</h2>\n<p>如果你一路读完了前面 9 章的\"使用手册\"，可能会产生一个疑问：WPS Comate 到底是一个工具，还是一堆工具的集合？</p>\n<p>答案是：<strong>它是一套 AI 操作系统</strong>。</p>\n<p>不是把 AI 对话、文档处理、数据分析、团队协作、自动化做了个\"全家桶\"，而是把它们架构在一个统一底座上，让 AI 深度融入你的办公环境，而不是成为你的第 N 个要打开的应用。</p>\n<blockquote>\n<p>传统办公：打开 Word 写稿 → 打开 Excel 做表 → 打开飞书沟通 → 打开邮箱发件。每个工具是孤立的，数据是割裂的，AI 只能\"外挂\"在某个工具上。</p>\n<p>AI 操作系统：你只需要描述目标。文档在哪生成、数据从哪来、消息发给谁——系统自己调度。</p>\n</blockquote>\n<h2 id=\"ai-ai\">AI 操作系统与普通 AI 工具的根本区别</h2>\n<p>这不是营销概念，而是架构上的本质差异：</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>普通 AI 工具</th>\n<th>AI 操作系统</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>能力来源</td>\n<td>仅靠模型本身的能力</td>\n<td>模型 × 数据 × 工具 × 记忆 × 工作空间的组合</td>\n</tr>\n<tr>\n<td>进化方式</td>\n<td>等模型升级，否则能力不变</td>\n<td>越用越强：不断接入更多数据、沉淀更多技能、积累更多业务知识</td>\n</tr>\n<tr>\n<td>不可替代性</td>\n<td>低。换个模型就能换掉工具</td>\n<td>高。数据资产、业务流程、团队协作记录都在里面，搬不走</td>\n</tr>\n<tr>\n<td>集成深度</td>\n<td>浅。需要手动把数据喂给 AI</td>\n<td>深。AI 直接连接企业数据源和业务系统</td>\n</tr>\n<tr>\n<td>协作模式</td>\n<td>一对一（人 → AI）</td>\n<td>多对多（多人 → 多 Agent → 多系统）</td>\n</tr>\n<tr>\n<td>适用层级</td>\n<td>个人提效</td>\n<td>个人提效 + 团队协作 + 组织沉淀</td>\n</tr>\n</tbody>\n</table>\n<blockquote>\n<p><strong>一句话概括</strong>：普通 AI 工具给你一个更聪明的搜索引擎。AI 操作系统给你一个能接管工作流的数字组织。</p>\n</blockquote>\n<h2 id=\"ai\">AI 办公的三个阶段</h2>\n<p>把时间拉长来看，AI 在办公领域的演进正在经历三个清晰的阶段：</p>\n<h3 id=\"10-20232024\">1.0 对话时代（2023–2024）</h3>\n<p><strong>特征</strong>：你说一句，AI 答一句。</p>\n<p>这是 ChatGPT 开启的时代。人们发现了对话式 AI 的便利性，开始用它写邮件、改文案、翻译文档、解释概念。</p>\n<p><strong>局限</strong>：每次对话都是\"从零开始\"。AI 不知道你的身份、不了解你的业务、不认识你的同事、也看不到你的数据。你说什么，它回什么——仅此而已。</p>\n<h3 id=\"20-20242025\">2.0 任务时代（2024–2025）</h3>\n<p><strong>特征</strong>：AI 能完成一个完整的任务，不只是回答问题。</p>\n<p>这个阶段的标志是\"Agent\"概念的成熟。AI 不再只是生成文字，而是能拆解你的需求、调用工具、分步执行、输出落地的成果。你说\"帮我做一份竞品分析报告\"，它不只是给你一段分析文字，而是真的搜索数据、整理结构、生成图表、输出一个可交付的文件。</p>\n<p><strong>局限</strong>：任务仍然是一次性的。AI 完成一个任务后回到原点，不会\"记住\"你、不会\"融入\"你的工作流。</p>\n<h3 id=\"30-2025\">3.0 协同时代（2025–现在）</h3>\n<p><strong>特征</strong>：AI 成为组织的常驻成员，而不是临时工。</p>\n<p>这就是 WPS Comate 所定位的阶段。AI 不再是\"被呼叫的助手\"，而是：<br />\n- 有角色（专家数字员工）<br />\n- 有记忆（知识库和 Wiki）<br />\n- 能操作系统（连接器）<br />\n- 能加入团队（团队空间）<br />\n- 能自主运转（自动化）</p>\n<blockquote>\n<p>1.0 解决了\"对话\"，2.0 解决了\"任务\"，3.0 解决的是\"组织\"。AI 从\"工具\"变成了\"基础设施\"。</p>\n</blockquote>\n<h2 id=\"ai_1\">企业 AI 落地的四大困局</h2>\n<p>既然 AI 这么强，为什么大多数企业的 AI 落地仍然磕磕绊绊？因为四个困局挡在前面：</p>\n<h3 id=\"_2\">困局一：投入无据</h3>\n<p>企业买了 AI 工具，但说不出\"到底有没有用\"。效率提升靠\"感觉\"，投入产出算不清楚。</p>\n<p><strong>Comate 解法</strong>：团队空间的数据看板。成员活跃度、任务完成量、Token 消耗——每项投入都有账可查。不是感觉 AI 有用，是数据证明 AI 有用。</p>\n<h3 id=\"_3\">困局二：烟囱林立</h3>\n<p>每个部门各用各的 AI 工具——市场部用 A 工具写稿，技术部用 B 工具写代码，HR 用 C 工具筛简历。工具之间不互通，数据无法共享，知识沉淀不了一处。</p>\n<p><strong>Comate 解法</strong>：统一底座 + 连接器体系。所有部门用同一套 AI 操作系统，不同岗位有不同的专家数字员工，但底层数据、知识库、权限体系是统一的。</p>\n<h3 id=\"_4\">困局三：语义断层</h3>\n<p>AI 能理解通用知识，但读不懂企业专属的知识——比如内部的业务流程、历史上的项目文档、行业特有的术语和规则。</p>\n<p><strong>Comate 解法</strong>：DataHub 连接企业数据 + Wiki 沉淀组织知识 + 专家数字员工绑定岗位技能。AI 不是\"空降\"的，是\"入职\"的。</p>\n<h3 id=\"_5\">困局四：知识离散</h3>\n<p>员工离职带走经验，新人进来从头学。有价值的业务知识只存在于人脑中，无法传承。</p>\n<p><strong>Comate 解法</strong>：团队空间 → 协作任务 → Wiki 沉淀的闭环。每次协作、每个项目，产出自动归档。人走，知识不走。新人入职，AI 能带着他基于 Wiki 快速上手。</p>\n<h2 id=\"_6\">人机协同的三层体系</h2>\n<p>WPS Comate 的设计逻辑可以用一个三层体系来理解：</p>\n<pre class=\"codehilite\"><code>           ┌─────────────────────────────┐\n           │    专家数字员工（组织层）      │  ← 懂业务、会做事、可复用的岗位级 AI\n           │    Expert Digital Worker     │\n           ├─────────────────────────────┤\n           │    团队空间（协作层）           │  ← 多人多 Agent 协同的工作台\n           │    Team Space                │\n           ├─────────────────────────────┤\n           │    个人助理（个体层）           │  ← 人+AI的一对一协作\n           │    Personal Assistant        │\n           └─────────────────────────────┘\n</code></pre>\n\n<p><strong>第一层：个人助理</strong>。每个人都有一个 AI 助手，帮自己处理日常任务——写文档、做表格、搜信息、排日程。</p>\n<p><strong>第二层：团队空间</strong>。AI 从个人的\"私人物品\"变成团队的\"公共设施\"。多人多 Agent 在一个空间内协作，知识在组织的层面沉淀和流通。</p>\n<p><strong>第三层：专家数字员工</strong>。AI 不再只是\"帮忙的\"，而是承担了明确的岗位职责。它对特定业务领域的了解甚至超过真实员工——因为它是全公司经验和数据的\"聚集体\"。</p>\n<p>三层不是替代关系，而是叠加关系。你的个人助手帮你解决日常琐事，团队空间让你的协作有规范有沉淀，专家的存在让你可以跨越能力半径去完成更复杂的任务。</p>\n<h2 id=\"l1-l4\">应用成熟度：从 L1 到 L4</h2>\n<p>上面讲了三层体系和三个阶段，但落到实际使用中，你和你的团队到底处在哪个深度？这就需要一个衡量标尺。</p>\n<p>WPS Comate 定义了 <strong>四级应用成熟度模型</strong>，从 L1 到 L4 逐级递进：</p>\n<table>\n<thead>\n<tr>\n<th>等级</th>\n<th>工作方式</th>\n<th>典型形态</th>\n<th>进入下一级的条件</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>L1 单次辅助</strong></td>\n<td>人给完整材料，AI 生成草稿</td>\n<td>纪要、摘要、表格、PPT</td>\n<td>输出可验收，连续成功 3 次</td>\n</tr>\n<tr>\n<td><strong>L2 固定模板</strong></td>\n<td>使用技能和标准输出</td>\n<td>周报、复盘、客户简报</td>\n<td>输入字段和验收规则稳定</td>\n</tr>\n<tr>\n<td><strong>L3 工作流</strong></td>\n<td>技能 + 知识库 + 连接器协作</td>\n<td>内容流、知识流、报表流</td>\n<td>有负责人、日志和异常处理</td>\n</tr>\n<tr>\n<td><strong>L4 团队能力</strong></td>\n<td>专家数字员工 + 团队空间 + 自动化</td>\n<td>部门级数字员工</td>\n<td>权限、成本和资产治理到位</td>\n</tr>\n</tbody>\n</table>\n<p>每一级对应的 Comate 能力：</p>\n<table>\n<thead>\n<tr>\n<th>成熟度</th>\n<th>Comate 能力</th>\n<th>说明</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>L1</td>\n<td>任务执行（自然语言对话）</td>\n<td>直接在对话框输入需求，上传文件即可</td>\n</tr>\n<tr>\n<td>L2</td>\n<td>技能（/ 唤起技能选择器）</td>\n<td>把高频任务封装为技能，输入字段固定</td>\n</tr>\n<tr>\n<td>L3</td>\n<td>专家数字员工 + 连接器 + Wiki</td>\n<td>专家连接业务系统，Wiki 提供知识底座</td>\n</tr>\n<tr>\n<td>L4</td>\n<td>团队空间 + 自动化引擎 + 数据治理</td>\n<td>团队共享技能和资产，自动化 7×24 运转</td>\n</tr>\n</tbody>\n</table>\n<p>几个关键认知：</p>\n<ul>\n<li><strong>不是所有任务都要到 L4</strong>。低频、差异大或责任重的工作，保持\"AI 辅助 + 人工决策\"（L1–L2）反而更合理。盲目追高只会增加维护成本。</li>\n<li><strong>L1 是所有人的起点</strong>。先用对话把一个具体任务做出来——写一份纪要、整理一个表格。能稳定交付了，再考虑封装成技能（L2）。</li>\n<li><strong>从 L2 到 L3 是质变</strong>。L2 是一个人用技能，L3 是技能连上了业务系统和知识库——这一步需要 IT 或管理员介入配置连接器和 Wiki。</li>\n<li><strong>L4 意味着组织级的承诺</strong>。团队空间、自动化引擎、数据治理——这不是个人能推动的，需要部门负责人拍板。</li>\n</ul>\n<blockquote>\n<p>如果你是第一次接触 WPS Comate，现在大概率在 L1。别急——先把手头的活用 AI 做出来，剩下的会自然发生。本书第四篇第 30 章有针对不同岗位的成熟度路径详细说明。</p>\n</blockquote>\n<h2 id=\"_7\">从\"企业级\"走向\"生态级\"</h2>\n<p>如果只看到\"AI 帮企业提效\"这一步，视野还是窄了。</p>\n<p>WPS Comate 正在让 AI 成为一种组织能力。当每个企业、每个团队都拥有自己的 AI 操作系统时，一个有趣的演化将发生：</p>\n<ul>\n<li>企业 A 的销售专家可以调用企业 B 的供应商数据（通过连接器）</li>\n<li>企业 C 的行业报告可以授权给企业 D 的分析专家使用（通过技能市场）</li>\n<li>采购方和供应方的 AI 专家可以直接对话确认订单条款（通过跨团队任务）</li>\n</ul>\n<p><strong>AI 不再只是工具，而是与人类共同构成组织的\"智能体网络\"</strong>。</p>\n<p>这不是科幻。连接器解决了跨系统调用，技能市场解决了能力共享，团队空间解决了多方协作——技术基础已经存在。剩下的，是组织习惯和信任关系的建立。</p>\n<h2 id=\"_8\">最后的话</h2>\n<p>这篇\"课外阅读\"放在了使用手册的最后，是因为它需要你先了解前面的所有内容才能真正理解。</p>\n<p>但换个角度看——它也完全可以放在第一章。</p>\n<p>因为理解 WPS Comate 的\"操作系统\"本质，比掌握每一个按钮的位置更重要。按钮可以自己摸索，但如果用普通 AI 工具的心态来用 WPS Comate，你只会用到它 10% 的能力。</p>\n<p>记住三点：</p>\n<ol>\n<li><strong>它不是工具，是底座</strong>。你越用它，它越懂你；你越给它接数据，它越能干。</li>\n<li><strong>它不是一个人的，是组织的</strong>。技能可以共享、专家可以复用、知识可以沉淀——这些是组织和团队的资产，不是你一个人的外挂。</li>\n<li><strong>它不是在\"帮忙\"，它是在承担岗位职责</strong>。从个人助手到团队空间到专家数字员工，AI 在逐步嵌入组织构架，而不是飘在组织旁边。</li>\n</ol>\n<p>最好的 AI 是你感觉不到它在\"帮你\"——你只是在正常工作，而一切变得更顺畅。</p>\n<blockquote>\n<p><strong>[待补充配图汇总]</strong>：本章为概念性章节，无需操作截图。如需配图，可考虑：<br />\n- AI 办公三阶段演进示意图<br />\n- 企业 AI 落地四大困局与解法对照图<br />\n- 人机协同三层体系架构图</p>\n</blockquote>", "part": "第一篇 使用手册：先把 WPS Comate 用起来", "chapter_num": null, "prev": "第_9_章_自动化：让任务_7×24_小时运转", "next": "第_10_章_办公三件套：文档、表格、演示"}, "第_10_章_办公三件套：文档、表格、演示": {"title": "第 10 章 办公三件套：文档、表格、演示", "html": "<p>文档、表格、演示——这三样东西，几乎构成了每个职场人 80% 的日常工作产出。但说实话，大多数人在这三件事上耗费的时间，远比想象中多：</p>\n<ul>\n<li>一份 50 页的行业报告，花两小时逐段读完，总结写出来还不够精炼；</li>\n<li>一张报表要合并三个数据源，公式写错一行，整张表报废；</li>\n<li>周五下班前要交汇报 PPT，从空白幻灯片开始排版，一做就是半晚上。</li>\n</ul>\n<p>Comate 的思路很直接：<strong>这些重复性极高的任务，不该由人手动完成，AI 应该直接接管。</strong></p>\n<hr />\n<h2 id=\"101\">10.1 文档场景：总结、撰写、整理</h2>\n<h3 id=\"_1\">痛点</h3>\n<p>文档工作有两个极端：要么信息太多需要压缩，要么信息太少需要生成。</p>\n<table>\n<thead>\n<tr>\n<th>痛点类型</th>\n<th>典型场景</th>\n<th>传统方式耗时</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>信息过载</td>\n<td>总结一份 50 页的行业白皮书</td>\n<td>2-3 小时</td>\n</tr>\n<tr>\n<td>信息稀缺</td>\n<td>从零写一份 PRD 文档</td>\n<td>4-6 小时</td>\n</tr>\n<tr>\n<td>信息分散</td>\n<td>整理群聊消息做成日报</td>\n<td>30-60 分钟</td>\n</tr>\n<tr>\n<td>信息重复</td>\n<td>每周五手动写周报</td>\n<td>20-30 分钟</td>\n</tr>\n</tbody>\n</table>\n<p>每一个场景都在重复同一件事：<strong>人替机器做了本可以自动化的信息加工。</strong></p>\n<h3 id=\"_2\">解决方案</h3>\n<p>Comate 针对文档场景提供了四个核心能力：</p>\n<p><strong>1. 总结超长材料</strong></p>\n<p><img alt=\"\" src=\"img/第二篇_场景篇：从一项任务到组织级_AI_协同/第_10_章_办公三件套：文档、表格、演示/day_001.png\" /></p>\n<p>直接把文档丢给 Comate，一句话搞定：</p>\n<blockquote>\n<p>\"帮我总结这份文档的要点，列出来\"</p>\n</blockquote>\n<p>Comate 会自动提取关键论点、数据结论和行动建议，输出结构化的摘要。不再需要逐页翻阅。</p>\n<p><img alt=\"\" src=\"img/第二篇_场景篇：从一项任务到组织级_AI_协同/第_10_章_办公三件套：文档、表格、演示/day_002.png\" /></p>\n<p><strong>2. 写文档</strong></p>\n<p><img alt=\"\" src=\"img/第二篇_场景篇：从一项任务到组织级_AI_协同/第_10_章_办公三件套：文档、表格、演示/day_003.png\" /></p>\n<p>从 PRD 到运营文案，从会议纪要到项目复盘，告诉 Comate 你要写什么、写给谁、什么风格：</p>\n<blockquote>\n<p>\"帮我写一份用户增长项目的 PRD 文档，目标受众是产品团队，风格要专业简洁\"</p>\n</blockquote>\n<p>Comate 根据你的输入生成完整文档初稿，你只需要在关键细节上做修正，而不是从空白页面开始。</p>\n<p><img alt=\"\" src=\"img/第二篇_场景篇：从一项任务到组织级_AI_协同/第_10_章_办公三件套：文档、表格、演示/day_004.png\" /></p>\n<p><strong>3. 总结群消息</strong></p>\n<p><img alt=\"\" src=\"img/第二篇_场景篇：从一项任务到组织级_AI_协同/第_10_章_办公三件套：文档、表格、演示/day_005.png\" /></p>\n<p>群聊信息最大的问题不是信息量，而是<strong>信噪比极低</strong>。100 条消息里可能只有 5 条是有价值的决策或结论。</p>\n<blockquote>\n<p>\"整理今天项目群的讨论，做成日报格式，重点标记决策项和待办项\"</p>\n</blockquote>\n<p>Comate 自动过滤噪音，提取结论和行动项，直接输出可发送的日报。</p>\n<p><img alt=\"\" src=\"img/第二篇_场景篇：从一项任务到组织级_AI_协同/第_10_章_办公三件套：文档、表格、演示/day_006.png\" /></p>\n<p><strong>4. 生成周报</strong></p>\n<p><img alt=\"\" src=\"img/第二篇_场景篇：从一项任务到组织级_AI_协同/第_10_章_办公三件套：文档、表格、演示/day_007.png\" /></p>\n<p>周报是最典型的\"每周重复但每次都要手动写\"的任务。Comate 的做法是：<strong>自动化接管，人只做审核。</strong></p>\n<blockquote>\n<p>\"根据本周的项目进展和任务完成情况，生成一份周报\"</p>\n</blockquote>\n<p>更进一步——设置定时自动化，每周五下午自动生成周报并发送到指定群聊。从此周五不再有\"赶周报\"这件事。</p>\n<p><img alt=\"\" src=\"img/第二篇_场景篇：从一项任务到组织级_AI_协同/第_10_章_办公三件套：文档、表格、演示/day_008.png\" /></p>\n<hr />\n<h2 id=\"102\">10.2 表格场景：数据分析、批量处理、报表生成</h2>\n<h3 id=\"_3\">痛点</h3>\n<p>表格是办公室里最\"硬核\"的工具，也是最容易让人崩溃的工具。</p>\n<table>\n<thead>\n<tr>\n<th>痛点类型</th>\n<th>具体表现</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>公式复杂</td>\n<td>VLOOKUP 嵌套三层，写错一个参数整张表崩</td>\n</tr>\n<tr>\n<td>数据分散</td>\n<td>三个系统导出三种格式，合并前要先统一列名</td>\n</tr>\n<tr>\n<td>重复劳动</td>\n<td>每月报表格式一样，数据不一样，但每次都要重新做</td>\n</tr>\n<tr>\n<td>分析门槛</td>\n<td>不是每个人都会写透视表和条件格式</td>\n</tr>\n</tbody>\n</table>\n<p>核心矛盾：<strong>表格的强大功能和高使用门槛之间的鸿沟。</strong> 大多数人只需要\"帮我算一下\"和\"帮我做一张表\"，却被挡在公式和函数之外。</p>\n<h3 id=\"_4\">解决方案</h3>\n<p>Comate 在表格场景的介入方式：<strong>用自然语言替代公式，用自动化替代重复操作。</strong></p>\n<p><strong>1. 数据分析——问一句，算出来</strong></p>\n<p><img alt=\"\" src=\"img/第二篇_场景篇：从一项任务到组织级_AI_协同/第_10_章_办公三件套：文档、表格、演示/day_009.png\" /></p>\n<blockquote>\n<p>\"这个月的销售额比上个月增长了多少？哪个区域增长最快？\"</p>\n</blockquote>\n<p>Comate 直接读取表格数据，完成计算和对比，输出结论。不需要你写 SUMIF，不需要你建透视表。</p>\n<p><img alt=\"\" src=\"img/第二篇_场景篇：从一项任务到组织级_AI_协同/第_10_章_办公三件套：文档、表格、演示/day_010.png\" /></p>\n<p><strong>2. 批量处理——一句话搞定整列操作</strong></p>\n<p><img alt=\"\" src=\"img/第二篇_场景篇：从一项任务到组织级_AI_协同/第_10_章_办公三件套：文档、表格、演示/day_011.png\" /></p>\n<blockquote>\n<p>\"把这列日期格式统一改成 YYYY-MM-DD，空值填'未知'\"</p>\n<p>\"根据姓名列自动填充部门列\"</p>\n</blockquote>\n<p>这些都是典型的\"低智力高重复\"操作，Comate 执行起来又快又准，不会因为疲劳而出错。</p>\n<p><img alt=\"\" src=\"img/第二篇_场景篇：从一项任务到组织级_AI_协同/第_10_章_办公三件套：文档、表格、演示/day_012.png\" /></p>\n<p><strong>3. 报表生成——模板+数据，自动产出</strong></p>\n<p><img alt=\"\" src=\"img/第二篇_场景篇：从一项任务到组织级_AI_协同/第_10_章_办公三件套：
